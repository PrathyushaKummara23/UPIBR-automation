name: Switch to SRF Build User New Workflow
on:
  workflow_dispatch:

jobs:
  switch-user:
    runs-on: [self-hosted, node16]
    outputs:
      switched_user: ${{ steps.user-switch.outputs.current_user }}
      working_directory: ${{ steps.user-switch.outputs.working_dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Authenticate sudo session once
        run: |
          echo "Authenticating sudo session..."
          expect << 'EOF'
          set timeout 30
          spawn sudo -v
          expect "Authenticate with pkummara's password:"
          send "Putti1!2@\r"
          expect eof
          EOF

      - name: Switch to SRF build user (using cached session)
        id: user-switch
        run: |
          TARGET_USER="grp_srf_fit1_build"
          
          echo "Switching to user: $TARGET_USER using cached sudo session"
          
          # Now sudo commands should work without password prompts
          CURRENT_USER=$(sudo -u "$TARGET_USER" whoami)
          echo "Current user: $CURRENT_USER"
          
          WORKING_DIR=$(sudo -u "$TARGET_USER" pwd)
          echo "Working directory: $WORKING_DIR"
          
          # Test groups and home
          sudo -u "$TARGET_USER" groups
          sudo -u "$TARGET_USER" bash -c 'echo "Home: $HOME"'
          
          # Set outputs
          echo "current_user=$CURRENT_USER" >> $GITHUB_OUTPUT
          echo "working_dir=$WORKING_DIR" >> $GITHUB_OUTPUT

      - name: Execute SRF operations (using cached session)
        run: |
          echo "Executing SRF build operations..."
          
          # These should work without password prompts now
          sudo -u grp_srf_fit1_build bash -c "
            cd /nfs/site/disks/dcsg_0729/patches/GNR/B0/staging/uCode/prod/ && 
            echo 'Current location:' && 
            pwd && 
            echo 'Directory contents:' && 
            ls -la | head -10
          "
          
          echo "SRF operations completed successfully"

      - name: Additional SRF commands
        run: |
          echo "Running additional SRF commands..."
          
          # Multiple commands in sequence
          sudo -u grp_srf_fit1_build whoami
          sudo -u grp_srf_fit1_build pwd
          sudo -u grp_srf_fit1_build bash -c "echo 'Available patches:' && ls /nfs/site/disks/dcsg_0729/patches/GNR/B0/staging/uCode/prod/ | grep 25ww"

  post-switch-operations:
    needs: switch-user
    runs-on: [self-hosted, node16]
    steps:
      - name: Verify switch results
        run: |
          echo "User switch completed successfully!"
          echo "Switched to user: ${{ needs.switch-user.outputs.switched_user }}"
          echo "Working directory: ${{ needs.switch-user.outputs.working_directory }}"
