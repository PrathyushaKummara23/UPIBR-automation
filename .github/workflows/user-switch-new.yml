name: Switch to SRF Build User (Ultra Simple)
on:
  workflow_dispatch:

jobs:
  switch-user:
    runs-on: [self-hosted, node16]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Test user switch
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Testing basic user switch..."
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build whoami

      - name: Execute SRF operations
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Executing SRF operations..."
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'User: $(whoami)'
            echo 'Directory: $(pwd)'
            cd /nfs/site/disks/dcsg_0729/patches/GNR/B0/staging/uCode/prod/
            echo 'SRF Directory: $(pwd)'
            ls -la | head -5
          "
