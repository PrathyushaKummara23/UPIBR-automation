name: Switch to SRF Build User
on:
  workflow_dispatch:
    inputs:
      target_user:
        description: 'Target user to switch to'
        required: false
        default: 'grp_srf_fit1_build'
        type: string

jobs:
  switch-user:
    runs-on: [self-hosted, node16]
    outputs:
      switched_user: ${{ steps.user-switch.outputs.current_user }}
      working_directory: ${{ steps.user-switch.outputs.working_dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate current user
        run: |
          echo "Current user before switch: $(whoami)"
          echo "Current directory: $(pwd)"

      - name: Switch to SRF build user (Method 1 - Direct sudo su)
        id: user-switch
        run: |
          TARGET_USER="grp_srf_fit1_build"
          
          # Method 1: Use sudo su directly (matches your permissions)
          echo "Switching to user: $TARGET_USER using sudo su"
          
          # Test basic switch
          sudo su - "$TARGET_USER" -c "
            echo 'SUCCESS: Switched to user: $(whoami)'
            echo 'Working directory: $(pwd)'
            echo 'Groups: $(groups)'
            echo 'Home directory: $HOME'
          "
          
          # Set outputs
          CURRENT_USER=$(sudo su - "$TARGET_USER" -c "whoami")
          WORKING_DIR=$(sudo su - "$TARGET_USER" -c "pwd")
          
          echo "current_user=$CURRENT_USER" >> $GITHUB_OUTPUT
          echo "working_dir=$WORKING_DIR" >> $GITHUB_OUTPUT

      - name: Execute SRF operations as switched user
        run: |
          echo "Executing SRF build operations..."
          sudo su - grp_srf_fit1_build -c "
            cd /nfs/site/disks/dcsg_0729/patches/GNR/B0/staging/uCode/prod/
            echo 'Current location: $(pwd)'
            ls -la
            echo 'SRF operations completed successfully'
          "

      - name: Alternative method if above fails
        if: failure()
        run: |
          echo "Trying alternative method with expect..."
          expect << 'EOF'
          spawn sudo su grp_srf_fit1_build
          expect "Authenticate with pkummara's password:"
          send "Putti1!2@\r"
          expect "grp_srf_fit1_build@"
          send "whoami\r"
          send "pwd\r"
          send "exit\r"
          expect eof
          EOF
