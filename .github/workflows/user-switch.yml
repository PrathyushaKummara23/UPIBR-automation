name: Switch to SRF Build User
on:
  workflow_dispatch:
    inputs:
      target_user:
        description: 'Target user to switch to'
        required: false
        default: 'grp_srf_fit1_build'
        type: string

jobs:
  switch-user:
    runs-on: [self-hosted, node16]
    outputs:
      switched_user: ${{ steps.user-switch.outputs.current_user }}
      working_directory: ${{ steps.user-switch.outputs.working_dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate current user
        run: |
          echo "Current user before switch: $(whoami)"
          echo "Current directory: $(pwd)"

      - name: Test basic user switch
        run: |
          echo "Testing basic user switch..."
          sudo su - grp_srf_fit1_build -c "whoami"

      - name: Switch to SRF build user
        id: user-switch
        run: |
          TARGET_USER="grp_srf_fit1_build"
          
          echo "Switching to user: $TARGET_USER"
          
          # Test individual commands
          echo "=== Testing whoami ==="
          CURRENT_USER=$(sudo su - "$TARGET_USER" -c "whoami")
          echo "Current user: $CURRENT_USER"
          
          echo "=== Testing pwd ==="
          WORKING_DIR=$(sudo su - "$TARGET_USER" -c "pwd")
          echo "Working directory: $WORKING_DIR"
          
          echo "=== Testing groups ==="
          sudo su - "$TARGET_USER" -c "groups"
          
          echo "=== Testing home directory ==="
          sudo su - "$TARGET_USER" -c "echo \$HOME"
          
          # Set outputs
          echo "current_user=$CURRENT_USER" >> $GITHUB_OUTPUT
          echo "working_dir=$WORKING_DIR" >> $GITHUB_OUTPUT

      - name: Execute SRF operations as switched user
        run: |
          echo "Executing SRF build operations..."
          
          echo "=== Checking current location ==="
          sudo su - grp_srf_fit1_build -c "pwd"
          
          echo "=== Navigating to SRF directory ==="
          sudo su - grp_srf_fit1_build -c "cd /nfs/site/disks/dcsg_0729/patches/GNR/B0/staging/uCode/prod/ && pwd"
          
          echo "=== Listing directory contents ==="
          sudo su - grp_srf_fit1_build -c "cd /nfs/site/disks/dcsg_0729/patches/GNR/B0/staging/uCode/prod/ && ls -la"
          
          echo "SRF operations completed successfully"

  post-switch-operations:
    needs: switch-user
    runs-on: [self-hosted, node16]
    steps:
      - name: Verify switch results
        run: |
          echo "User switch completed successfully"
          echo "Switched to user: ${{ needs.switch-user.outputs.switched_user }}"
          echo "Working directory: ${{ needs.switch-user.outputs.working_directory }}"
          
      - name: Test additional commands as switched user
        run: |
          echo "Testing additional commands..."
          sudo su - grp_srf_fit1_build -c "whoami"
          sudo su - grp_srf_fit1_build -c "pwd"
          sudo su - grp_srf_fit1_build -c "echo 'Testing file access...'"
