name: Switch to SRF Build User
on:
  workflow_dispatch:
    inputs:
      target_user:
        description: 'Target user to switch to'
        required: false
        default: 'grp_srf_fit1_build'
        type: string

jobs:
  switch-user:
    runs-on: [self-hosted, node16]
    outputs:
      switched_user: ${{ steps.user-switch.outputs.current_user }}
      working_directory: ${{ steps.user-switch.outputs.working_dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate current user
        run: |
          echo "Current user before switch: $(whoami)"
          echo "Current directory: $(pwd)"

      - name: Test basic user switch - Method 1
        run: |
          echo "Testing Method 1: sudo -u grp_srf_fit1_build"
          sudo -u grp_srf_fit1_build whoami

      - name: Switch to SRF build user
        id: user-switch
        run: |
          TARGET_USER="grp_srf_fit1_build"
          
          echo "Switching to user: $TARGET_USER using sudo -u"
          
          # Test individual commands using sudo -u
          echo "=== Testing whoami ==="
          CURRENT_USER=$(sudo -u "$TARGET_USER" whoami)
          echo "Current user: $CURRENT_USER"
          
          echo "=== Testing pwd ==="
          WORKING_DIR=$(sudo -u "$TARGET_USER" pwd)
          echo "Working directory: $WORKING_DIR"
          
          echo "=== Testing groups ==="
          sudo -u "$TARGET_USER" groups
          
          echo "=== Testing home directory ==="
          sudo -u "$TARGET_USER" bash -c 'echo $HOME'
          
          # Set outputs
          echo "current_user=$CURRENT_USER" >> $GITHUB_OUTPUT
          echo "working_dir=$WORKING_DIR" >> $GITHUB_OUTPUT

      - name: Execute SRF operations as switched user
        run: |
          echo "Executing SRF build operations..."
          
          echo "=== Checking current location ==="
          sudo -u grp_srf_fit1_build pwd
          
          echo "=== Navigating to SRF directory ==="
          sudo -u grp_srf_fit1_build bash -c "cd /nfs/site/disks/dcsg_0729/patches/GNR/B0/staging/uCode/prod/ && pwd"
          
          echo "=== Listing directory contents ==="
          sudo -u grp_srf_fit1_build bash -c "cd /nfs/site/disks/dcsg_0729/patches/GNR/B0/staging/uCode/prod/ && ls -la"
          
          echo "SRF operations completed successfully"

      - name: Alternative method if sudo -u fails
        if: failure()
        run: |
          echo "Trying alternative method with interactive su..."
          echo "Creating script file..."
          cat > /tmp/test_switch.sh << 'EOF'
          #!/bin/bash
          whoami
          pwd
          groups
          echo $HOME
          EOF
          chmod +x /tmp/test_switch.sh
          
          # Try with expect
          expect << 'EXPECT_EOF'
          spawn sudo su - grp_srf_fit1_build
          expect "Authenticate with pkummara's password:"
          send "Putti1!2@\r"
          expect "$ "
          send "/tmp/test_switch.sh\r"
          expect "$ "
          send "exit\r"
          expect eof
          EXPECT_EOF

  post-switch-operations:
    needs: switch-user
    runs-on: [self-hosted, node16]
    steps:
      - name: Verify switch results
        run: |
          echo "User switch completed successfully"
          echo "Switched to user: ${{ needs.switch-user.outputs.switched_user }}"
          echo "Working directory: ${{ needs.switch-user.outputs.working_directory }}"
