name: Open VNC Connection
on:
  workflow_dispatch:
    inputs:
      vnc_host:
        description: 'VNC Host IP/Hostname'
        required: true
        default: '192.168.1.100'
      vnc_port:
        description: 'VNC Port'
        required: true
        default: '5900'
      vnc_username:
        description: 'VNC Username'
        required: false
      connection_name:
        description: 'Connection Name'
        required: false
        default: 'Remote-Host'

jobs:
  vnc-connection:
    runs-on: windows-latest
    
    steps:
    - name: Download and Install RealVNC Viewer
      run: |
        # Download RealVNC Viewer
        $url = "https://downloads.realvnc.com/download/file/viewer.files/VNC-Viewer-7.8.0-Windows.exe"
        $output = "$env:TEMP\vnc-viewer-installer.exe"
        
        Write-Host "Downloading RealVNC Viewer..."
        Invoke-WebRequest -Uri $url -OutFile $output
        
        # Install silently
        Write-Host "Installing RealVNC Viewer..."
        Start-Process -FilePath $output -ArgumentList "/S" -Wait
        
        # Wait for installation to complete
        Start-Sleep -Seconds 30
      shell: powershell

    - name: Setup VNC Connection
      run: |
        # Create VNC connection file
        $vncHost = "${{ github.event.inputs.vnc_host }}"
        $vncPort = "${{ github.event.inputs.vnc_port }}"
        $connectionName = "${{ github.event.inputs.connection_name }}"
        
        # VNC connection string
        $vncConnection = "${vncHost}::${vncPort}"
        
        Write-Host "Setting up VNC connection to: $vncConnection"
        
        # Create a batch file to launch VNC
        $batchContent = @"
        @echo off
        echo Launching VNC Viewer...
        echo Target: $vncConnection
        
        REM Try different possible installation paths
        if exist "C:\Program Files\RealVNC\VNC Viewer\vncviewer.exe" (
            "C:\Program Files\RealVNC\VNC Viewer\vncviewer.exe" $vncConnection
        ) else if exist "C:\Program Files (x86)\RealVNC\VNC Viewer\vncviewer.exe" (
            "C:\Program Files (x86)\RealVNC\VNC Viewer\vncviewer.exe" $vncConnection
        ) else (
            echo VNC Viewer not found in standard locations
            echo Please check installation
        )
        
        pause
"@
        
        $batchFile = "$env:TEMP\launch_vnc.bat"
        $batchContent | Out-File -FilePath $batchFile -Encoding ASCII
        
        Write-Host "Created launch script at: $batchFile"
      shell: powershell

    - name: Launch VNC Viewer
      run: |
        $batchFile = "$env:TEMP\launch_vnc.bat"
        
        Write-Host "Launching VNC Viewer..."
        Write-Host "This will open VNC Viewer window"
        Write-Host "Target: ${{ github.event.inputs.vnc_host }}:${{ github.event.inputs.vnc_port }}"
        
        # Launch the batch file
        Start-Process -FilePath $batchFile -Wait
        
        # Alternative direct launch
        $vncPath = "C:\Program Files\RealVNC\VNC Viewer\vncviewer.exe"
        if (Test-Path $vncPath) {
            $vncTarget = "${{ github.event.inputs.vnc_host }}::${{ github.event.inputs.vnc_port }}"
            Write-Host "Direct launch: $vncPath $vncTarget"
            Start-Process -FilePath $vncPath -ArgumentList $vncTarget
        }
        
        # Keep the job running for a while to allow interaction
        Write-Host "VNC session active. Keeping job alive for 30 minutes..."
        Start-Sleep -Seconds 1800  # 30 minutes
      shell: powershell

    - name: Cleanup
      if: always()
      run: |
        Write-Host "Cleaning up temporary files..."
        Remove-Item "$env:TEMP\launch_vnc.bat" -ErrorAction SilentlyContinue
        Remove-Item "$env:TEMP\vnc-viewer-installer.exe" -ErrorAction SilentlyContinue
      shell: powershell
