name: GNR Debug Patch Build

on:
  workflow_dispatch:
    inputs:
      baseline_version:
        description: 'Baseline version'
        required: true
        type: string
      new_version:
        description: 'New debug patch version'
        required: true
        type: string
      icode:
        description: 'ICODE path'
        required: false
        type: string
      oobmsm:
        description: 'OOBMSM path'
        required: false
        type: string
      s3m:
        description: 'S3M path'
        required: false
        type: string
      pcode_io:
        description: 'PCODE-IO path'
        required: false
        type: string
      pcode_c:
        description: 'PCODE-C path'
        required: false
        type: string
      ucode:
        description: 'UCODE path'
        required: false
        type: string
      xucode:
        description: 'XUCODE path'
        required: false
        type: string
      mcheck:
        description: 'MCHECK path'
        required: false
        type: string
      tcode:
        description: 'TCODE path'
        required: false
        type: string
      acode:
        description: 'ACODE path'
        required: false
        type: string
      patch_description:
        description: 'Patch description'
        required: false
        type: string
        default: 'GNR Debug Patch Automated Build'

permissions:
  contents: read

env:
  BUILD_BASE_PATH: /nfs/site/disks/dcsg_0729/users/pkummara
  PATCHES_BASE_PATH: /nfs/site/disks/dcsg_0729/patches/GNR/B0
  KTAB_PATH: /usr/intel/bin/ktab
  KCRON_PATH: /usr/intel/bin/kcron
  PYTHON_PATH: /usr/intel/bin/python3.7.4
  FXT_TOOL_PATH: /nfs/site/disks/dcsg_0729/fxt-tools/MUPPET/fxtMuppet.py
  EXPECT_PATH: /usr/bin/expect
  FACELESS_USER: grp_gnr_fit1_build

jobs:
  prepare-config:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    outputs:
      config_file: ${{ steps.generate-config.outputs.config_file }}

    steps:
      - name: Checkout repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          WORKDIR="${GITHUB_WORKSPACE}"
          PARENT_DIR="$(dirname "$WORKDIR")"
          REPO_DIR="$(basename "$WORKDIR")"
          BRANCH="${{ github.ref_name }}"

          mkdir -p "$PARENT_DIR"
          cd "$PARENT_DIR"

          if [ -d "$WORKDIR/.git" ]; then
            cd "$WORKDIR"
            git remote set-url origin "$REPO_URL"
            git fetch --depth=1 origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
          else
            rm -rf "$WORKDIR"
            git clone --depth=1 --branch "$BRANCH" "$REPO_URL" "$REPO_DIR"
            cd "$WORKDIR"
          fi

          git config --global --add safe.directory "$WORKDIR"

      - name: Switch to faceless account and verify
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Switching to faceless account for path validation..."
          CURRENT_USER=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" whoami )

          echo "Expected user: ${{ env.FACELESS_USER }}"
          echo "Actual user: $CURRENT_USER"

          if [ "$CURRENT_USER" = "${{ env.FACELESS_USER }}" ]; then
            echo "SUCCESS: User switch to faceless account successful"
            echo "Running as: $CURRENT_USER"
          else
            echo "FAILURE: User switch failed"
            echo "Expected: ${{ env.FACELESS_USER }}"
            echo "Got: $CURRENT_USER"
            exit 1
          fi

      - name: Validate versions
        shell: bash
        run: |
          set -euo pipefail

          BASELINE_CLEAN="${{ github.event.inputs.baseline_version }}"
          NEW_CLEAN="${{ github.event.inputs.new_version }}"
          BASELINE_CLEAN="${BASELINE_CLEAN#0x}"
          BASELINE_CLEAN="${BASELINE_CLEAN#0X}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          NEW_CLEAN="${NEW_CLEAN#0X}"

          if [[ ! "$BASELINE_CLEAN" =~ ^[0-9A-Fa-f]{8}$ ]]; then
            echo "Error: Invalid baseline version format: $BASELINE_CLEAN"
            exit 1
          fi

          if [[ ! "$NEW_CLEAN" =~ ^[0-9A-Fa-f]{8}$ ]]; then
            echo "Error: Invalid new version format: $NEW_CLEAN"
            exit 1
          fi

          echo "Version validation passed"
          echo "  - Baseline: $BASELINE_CLEAN"
          echo "  - New: $NEW_CLEAN"

      - name: Validate baseline config exists
        id: validate-baseline
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          BASELINE_CLEAN="${{ github.event.inputs.baseline_version }}"
          BASELINE_CLEAN="${BASELINE_CLEAN#0x}"
          BASELINE_CLEAN="${BASELINE_CLEAN#0X}"

          SOURCE_CONFIG="${{ env.PATCHES_BASE_PATH }}/build/${BASELINE_CLEAN}/release/config_${BASELINE_CLEAN}.ini"

          echo "Checking baseline config as faceless account..."
          echo "Config path: $SOURCE_CONFIG"

          CONFIG_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '$SOURCE_CONFIG' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          " )

          if [[ "$CONFIG_CHECK" == "EXISTS" ]]; then
            echo "Baseline config found: $SOURCE_CONFIG"
            echo "baseline_config=$SOURCE_CONFIG" >> "$GITHUB_OUTPUT"
          else
            echo "Error: Baseline config not found: $SOURCE_CONFIG"
            exit 1
          fi

      - name: Validate provided paths exist
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Validating user-provided paths..."

          check_path() {
            local name="$1"
            local path="$2"

            if [[ -z "$path" ]]; then
              return 0
            fi

            echo "Checking $name: $path"

            PATH_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
              if [[ -f '$path' ]]; then
                echo 'EXISTS'
              else
                echo 'NOT_FOUND'
              fi
            " )

            if [[ "$PATH_CHECK" == "EXISTS" ]]; then
              echo "PASS $name: $path"
              return 0
            else
              echo "ERROR: $name path does not exist: $path"
              return 1
            fi
          }

          declare -a PATHS=(
            "${{ github.event.inputs.icode }}"
            "${{ github.event.inputs.oobmsm }}"
            "${{ github.event.inputs.s3m }}"
            "${{ github.event.inputs.pcode_io }}"
            "${{ github.event.inputs.pcode_c }}"
            "${{ github.event.inputs.ucode }}"
            "${{ github.event.inputs.xucode }}"
            "${{ github.event.inputs.mcheck }}"
            "${{ github.event.inputs.tcode }}"
            "${{ github.event.inputs.acode }}"
          )

          declare -a PATH_NAMES=(
            "ICODE"
            "OOBMSM"
            "S3M"
            "PCODE-IO"
            "PCODE-C"
            "UCODE"
            "XUCODE"
            "MCHECK"
            "TCODE"
            "ACODE"
          )

          PROVIDED_PATHS=0
          FAILED_PATHS=0

          for i in "${!PATHS[@]}"; do
            path="${PATHS[$i]}"
            name="${PATH_NAMES[$i]}"
            if [[ -n "$path" ]]; then
              PROVIDED_PATHS=$((PROVIDED_PATHS + 1))
              if ! check_path "$name" "$path"; then
                FAILED_PATHS=$((FAILED_PATHS + 1))
              fi
            fi
          done

          if [[ $PROVIDED_PATHS -eq 0 ]]; then
            echo "No user-provided paths to validate (using baseline paths)"
          elif [[ $FAILED_PATHS -eq 0 ]]; then
            echo "All $PROVIDED_PATHS provided paths validated successfully"
          else
            echo "ERROR: $FAILED_PATHS out of $PROVIDED_PATHS provided paths failed validation"
            exit 1
          fi

      - name: Validate baseline config paths
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Validating paths from baseline config..."

          SOURCE_CONFIG="${{ steps.validate-baseline.outputs.baseline_config }}"

          ICODE_INPUT="${{ github.event.inputs.icode }}"
          OOBMSM_INPUT="${{ github.event.inputs.oobmsm }}"
          S3M_INPUT="${{ github.event.inputs.s3m }}"
          PCODE_IO_INPUT="${{ github.event.inputs.pcode_io }}"
          PCODE_C_INPUT="${{ github.event.inputs.pcode_c }}"
          UCODE_INPUT="${{ github.event.inputs.ucode }}"
          XUCODE_INPUT="${{ github.event.inputs.xucode }}"
          MCHECK_INPUT="${{ github.event.inputs.mcheck }}"
          TCODE_INPUT="${{ github.event.inputs.tcode }}"
          ACODE_INPUT="${{ github.event.inputs.acode }}"

          validate_baseline_path() {
            local name="$1"
            local path="$2"
            local is_provided="$3"

            if [[ "$path" == "none" || -z "$path" ]]; then
              echo "SKIP $name: $path (skipped)"
              return 0
            fi

            PATH_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
              if [[ -f '$path' ]]; then
                echo 'EXISTS'
              else
                echo 'NOT_FOUND'
              fi
            " )

            if [[ "$PATH_CHECK" == "EXISTS" ]]; then
              if [[ "$is_provided" == "true" ]]; then
                echo "PASS $name: $path (exists, will be overridden)"
              else
                echo "PASS $name: $path (exists, using baseline)"
              fi
              return 0
            else
              if [[ "$is_provided" == "true" ]]; then
                echo "WARNING $name: $path (baseline missing, but will be overridden)"
                return 0
              else
                echo "WARNING $name: $path (baseline missing, using as-is)"
                echo "Note: This may cause issues during build, but continuing anyway"
                return 0
              fi
            fi
          }

          ICODE_PATH=$(grep '^icode = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)
          OOBMSM_PATH=$(grep '^oobmsm = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)
          S3M_PATH=$(grep '^s3m = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)
          PCODE_IO_PATH=$(grep '^pcode-io = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)
          PCODE_C_PATH=$(grep '^pcode-c = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)
          UCODE_PATH=$(grep '^ucode = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)
          XUCODE_PATH=$(grep '^xucode = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)
          MCHECK_PATH=$(grep '^mcheck = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)
          TCODE_PATH=$(grep '^tcode = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)
          ACODE_PATH=$(grep '^acode = ' "$SOURCE_CONFIG" | cut -d'=' -f2 | xargs || true)

          validate_baseline_path 'ICODE' "$ICODE_PATH" "$([[ -n "$ICODE_INPUT" ]] && echo true || echo false)"
          validate_baseline_path 'OOBMSM' "$OOBMSM_PATH" "$([[ -n "$OOBMSM_INPUT" ]] && echo true || echo false)"
          validate_baseline_path 'S3M' "$S3M_PATH" "$([[ -n "$S3M_INPUT" ]] && echo true || echo false)"
          validate_baseline_path 'PCODE-IO' "$PCODE_IO_PATH" "$([[ -n "$PCODE_IO_INPUT" ]] && echo true || echo false)"
          validate_baseline_path 'PCODE-C' "$PCODE_C_PATH" "$([[ -n "$PCODE_C_INPUT" ]] && echo true || echo false)"
          validate_baseline_path 'UCODE' "$UCODE_PATH" "$([[ -n "$UCODE_INPUT" ]] && echo true || echo false)"
          validate_baseline_path 'XUCODE' "$XUCODE_PATH" "$([[ -n "$XUCODE_INPUT" ]] && echo true || echo false)"
          validate_baseline_path 'MCHECK' "$MCHECK_PATH" "$([[ -n "$MCHECK_INPUT" ]] && echo true || echo false)"
          validate_baseline_path 'TCODE' "$TCODE_PATH" "$([[ -n "$TCODE_INPUT" ]] && echo true || echo false)"
          validate_baseline_path 'ACODE' "$ACODE_PATH" "$([[ -n "$ACODE_INPUT" ]] && echo true || echo false)"

          echo "Baseline config path validation completed"

      - name: Copy and generate config
        id: generate-config
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          BASELINE_CLEAN="${{ github.event.inputs.baseline_version }}"
          NEW_CLEAN="${{ github.event.inputs.new_version }}"
          BASELINE_CLEAN="${BASELINE_CLEAN#0x}"
          BASELINE_CLEAN="${BASELINE_CLEAN#0X}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          NEW_CLEAN="${NEW_CLEAN#0X}"

          SOURCE_CONFIG="${{ steps.validate-baseline.outputs.baseline_config }}"
          NEW_CONFIG="${{ env.BUILD_BASE_PATH }}/config_${NEW_CLEAN}.ini"

          echo "Generating config file..."
          echo "Source: $SOURCE_CONFIG"
          echo "Target: $NEW_CONFIG"

          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            mkdir -p '${{ env.BUILD_BASE_PATH }}'
            cp '$SOURCE_CONFIG' '$NEW_CONFIG'

            sed -i 's/^version = .*/version = 0x${NEW_CLEAN}/' '$NEW_CONFIG'
            sed -i 's/^prev_version = .*/prev_version = 0x${BASELINE_CLEAN}/' '$NEW_CONFIG'
            sed -i 's|^patch_description = .*|patch_description = ${{ github.event.inputs.patch_description }}|' '$NEW_CONFIG'

            [[ -n '${{ github.event.inputs.icode }}' ]] && sed -i 's|^icode = .*|icode = ${{ github.event.inputs.icode }}|' '$NEW_CONFIG'
            [[ -n '${{ github.event.inputs.oobmsm }}' ]] && sed -i 's|^oobmsm = .*|oobmsm = ${{ github.event.inputs.oobmsm }}|' '$NEW_CONFIG'
            [[ -n '${{ github.event.inputs.s3m }}' ]] && sed -i 's|^s3m = .*|s3m = ${{ github.event.inputs.s3m }}|' '$NEW_CONFIG'
            [[ -n '${{ github.event.inputs.pcode_io }}' ]] && sed -i 's|^pcode-io = .*|pcode-io = ${{ github.event.inputs.pcode_io }}|' '$NEW_CONFIG'
            [[ -n '${{ github.event.inputs.pcode_c }}' ]] && sed -i 's|^pcode-c = .*|pcode-c = ${{ github.event.inputs.pcode_c }}|' '$NEW_CONFIG'
            [[ -n '${{ github.event.inputs.ucode }}' ]] && sed -i 's|^ucode = .*|ucode = ${{ github.event.inputs.ucode }}|' '$NEW_CONFIG'
            [[ -n '${{ github.event.inputs.xucode }}' ]] && sed -i 's|^xucode = .*|xucode = ${{ github.event.inputs.xucode }}|' '$NEW_CONFIG'
            [[ -n '${{ github.event.inputs.mcheck }}' ]] && sed -i 's|^mcheck = .*|mcheck = ${{ github.event.inputs.mcheck }}|' '$NEW_CONFIG'
            [[ -n '${{ github.event.inputs.tcode }}' ]] && sed -i 's|^tcode = .*|tcode = ${{ github.event.inputs.tcode }}|' '$NEW_CONFIG'
            [[ -n '${{ github.event.inputs.acode }}' ]] && sed -i 's|^acode = .*|acode = ${{ github.event.inputs.acode }}|' '$NEW_CONFIG'

            if [[ -n '${{ github.event.inputs.ucode }}' ]]; then
              UCODE_BASE_DIR=\$(dirname '${{ github.event.inputs.ucode }}')
              sed -i \"s|^ucode_config = .*|ucode_config = \${UCODE_BASE_DIR}/patch_default_server.patch|\" '$NEW_CONFIG'
              sed -i \"s|^ucode_template = .*|ucode_template = \${UCODE_BASE_DIR}/patch_template.template|\" '$NEW_CONFIG'
            fi

            sed -i 's/^soc_sign = .*/soc_sign = css-debug/' '$NEW_CONFIG'
            sed -i 's/^fit1_sign = .*/fit1_sign = css-debug/' '$NEW_CONFIG'

            echo 'Config file generated successfully'
            echo 'Generated config file contents:'
            cat '$NEW_CONFIG'
          "

          echo "config_file=config_${NEW_CLEAN}.ini" >> "$GITHUB_OUTPUT"

      - name: Set config file permissions
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          NEW_CLEAN="${{ github.event.inputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          NEW_CLEAN="${NEW_CLEAN#0X}"

          NEW_CONFIG="${{ env.BUILD_BASE_PATH }}/config_${NEW_CLEAN}.ini"

          echo "Setting permissions (777) for config file as faceless account..."
          echo "Config file: $NEW_CONFIG"

          echo "Current permissions:"
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" ls -la "$NEW_CONFIG"

          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" chmod 777 "$NEW_CONFIG"

          echo "Updated permissions:"
          PERMISSIONS=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" ls -la "$NEW_CONFIG" )
          echo "$PERMISSIONS"

          if echo "$PERMISSIONS" | grep -q "^-rwxrwxrwx"; then
            echo "SUCCESS: Config file permissions set to 777 (rwxrwxrwx)"
          else
            echo "WARNING: Permissions may not have been set correctly"
            echo "Actual: $PERMISSIONS"
          fi

      - name: Display config summary
        shell: bash
        run: |
          set -euo pipefail

          echo "## Config Generation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Baseline Version**: ${{ github.event.inputs.baseline_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **New Version**: ${{ github.event.inputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Config File**: ${{ steps.generate-config.outputs.config_file }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Patch Description**: ${{ github.event.inputs.patch_description }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Signing Mode**: css-debug" >> "$GITHUB_STEP_SUMMARY"
          echo "- **File Permissions**: 777 (rwxrwxrwx - full access for all)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Updated Components:" >> "$GITHUB_STEP_SUMMARY"

          COMPONENTS_UPDATED=false

          if [[ -n "${{ github.event.inputs.icode }}" ]]; then
            echo "- **ICODE**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi
          if [[ -n "${{ github.event.inputs.oobmsm }}" ]]; then
            echo "- **OOBMSM**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi
          if [[ -n "${{ github.event.inputs.s3m }}" ]]; then
            echo "- **S3M**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi
          if [[ -n "${{ github.event.inputs.pcode_io }}" ]]; then
            echo "- **PCODE-IO**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi
          if [[ -n "${{ github.event.inputs.pcode_c }}" ]]; then
            echo "- **PCODE-C**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi
          if [[ -n "${{ github.event.inputs.ucode }}" ]]; then
            echo "- **UCODE**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi
          if [[ -n "${{ github.event.inputs.xucode }}" ]]; then
            echo "- **XUCODE**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi
          if [[ -n "${{ github.event.inputs.mcheck }}" ]]; then
            echo "- **MCHECK**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi
          if [[ -n "${{ github.event.inputs.tcode }}" ]]; then
            echo "- **TCODE**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi
          if [[ -n "${{ github.event.inputs.acode }}" ]]; then
            echo "- **ACODE**: Updated" >> "$GITHUB_STEP_SUMMARY"
            COMPONENTS_UPDATED=true
          fi

          if [[ "$COMPONENTS_UPDATED" == "false" ]]; then
            echo "- No component paths were updated (using baseline paths)" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Config file generated successfully for GNR debug patch build!" >> "$GITHUB_STEP_SUMMARY"

  kerberos-setup:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: prepare-config

    steps:
      - name: Switch to faceless account and verify
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Switching to faceless account..."
          CURRENT_USER=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" whoami )

          echo "Expected user: ${{ env.FACELESS_USER }}"
          echo "Actual user: $CURRENT_USER"

          if [ "$CURRENT_USER" = "${{ env.FACELESS_USER }}" ]; then
            echo "SUCCESS: User switch to faceless account successful"
            echo "Running as: $CURRENT_USER"
          else
            echo "FAILURE: User switch failed"
            echo "Expected: ${{ env.FACELESS_USER }}"
            echo "Got: $CURRENT_USER"
            exit 1
          fi

      - name: Verify Kerberos tools exist
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Verifying Kerberos tools availability..."

          KTAB_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '${{ env.KTAB_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          " )

          if [[ "$KTAB_CHECK" == "EXISTS" ]]; then
            echo "PASS: ktab found at: ${{ env.KTAB_PATH }}"
          else
            echo "FAIL: ktab not found at: ${{ env.KTAB_PATH }}"
            exit 1
          fi

          KCRON_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '${{ env.KCRON_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          " )

          if [[ "$KCRON_CHECK" == "EXISTS" ]]; then
            echo "PASS: kcron found at: ${{ env.KCRON_PATH }}"
          else
            echo "FAIL: kcron not found at: ${{ env.KCRON_PATH }}"
            exit 1
          fi

          echo "All Kerberos tools verified successfully"

      - name: Initialize Kerberos Ticket (ktab)
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
          FA_PASSWORD: ${{ secrets.GNR_FA_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Step 1: Initializing Kerberos Ticket with ktab..."
          echo "Running: ${{ env.KTAB_PATH }} -i"

          KTAB_RESULT=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            echo '$FA_PASSWORD' | ${{ env.KTAB_PATH }} -i 2>&1
          " )

          echo "ktab output:"
          echo "$KTAB_RESULT"

          if echo "$KTAB_RESULT" | grep -q -i "error\|failed\|denied"; then
            echo "ERROR: ktab initialization appears to have failed"
            exit 1
          else
            echo "SUCCESS: ktab initialization completed"
          fi

      - name: Initialize Kerberos Cron (kcron)
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Step 2: Initializing Kerberos Cron with kcron..."
          echo "Running: ${{ env.KCRON_PATH }} -i"

          KCRON_RESULT=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            echo 'y' | ${{ env.KCRON_PATH }} -i 2>&1
          " )

          echo "kcron output:"
          echo "$KCRON_RESULT"

          if echo "$KCRON_RESULT" | grep -q -i "error\|failed\|denied"; then
            echo "ERROR: kcron initialization appears to have failed"
            exit 1
          else
            echo "SUCCESS: kcron initialization completed"
          fi

      - name: Display setup summary
        shell: bash
        run: |
          echo "## Kerberos Setup Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Account**: ${{ env.FACELESS_USER }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **ktab Path**: ${{ env.KTAB_PATH }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **kcron Path**: ${{ env.KCRON_PATH }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Steps Completed:" >> "$GITHUB_STEP_SUMMARY"
          echo "1. PASS **Faceless Account Login**" >> "$GITHUB_STEP_SUMMARY"
          echo "2. PASS **Tool Verification**" >> "$GITHUB_STEP_SUMMARY"
          echo "3. PASS **Kerberos Ticket Init**" >> "$GITHUB_STEP_SUMMARY"
          echo "4. PASS **Kerberos Cron Init**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Kerberos setup completed successfully!" >> "$GITHUB_STEP_SUMMARY"

  build-patch:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [prepare-config, kerberos-setup]

    steps:
      - name: Switch to faceless account and verify
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Switching to faceless account for patch build..."
          CURRENT_USER=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" whoami )

          echo "Expected user: ${{ env.FACELESS_USER }}"
          echo "Actual user: $CURRENT_USER"

          if [ "$CURRENT_USER" = "${{ env.FACELESS_USER }}" ]; then
            echo "SUCCESS: User switch to faceless account successful"
            echo "Running as: $CURRENT_USER"
          else
            echo "FAILURE: User switch failed"
            echo "Expected: ${{ env.FACELESS_USER }}"
            echo "Got: $CURRENT_USER"
            exit 1
          fi

      - name: Verify build tools and config exist
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Verifying build tools and configuration..."

          NEW_CLEAN="${{ github.event.inputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          NEW_CLEAN="${NEW_CLEAN#0X}"
          CONFIG_FILE="${{ env.BUILD_BASE_PATH }}/config_${NEW_CLEAN}.ini"

          PYTHON_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '${{ env.PYTHON_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          " )

          if [[ "$PYTHON_CHECK" == "EXISTS" ]]; then
            echo "PASS: Python found at: ${{ env.PYTHON_PATH }}"
          else
            echo "FAIL: Python not found at: ${{ env.PYTHON_PATH }}"
            exit 1
          fi

          FXT_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '${{ env.FXT_TOOL_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          " )

          if [[ "$FXT_CHECK" == "EXISTS" ]]; then
            echo "PASS: FXT tool found at: ${{ env.FXT_TOOL_PATH }}"
          else
            echo "FAIL: FXT tool not found at: ${{ env.FXT_TOOL_PATH }}"
            exit 1
          fi

          EXPECT_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '${{ env.EXPECT_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          " )

          if [[ "$EXPECT_CHECK" == "EXISTS" ]]; then
            echo "PASS: expect found at: ${{ env.EXPECT_PATH }}"
          else
            echo "FAIL: expect not found at: ${{ env.EXPECT_PATH }}"
            exit 1
          fi

          CONFIG_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '$CONFIG_FILE' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          " )

          if [[ "$CONFIG_CHECK" == "EXISTS" ]]; then
            echo "PASS: Config file found at: $CONFIG_FILE"
          else
            echo "FAIL: Config file not found at: $CONFIG_FILE"
            exit 1
          fi

          echo "All build prerequisites verified successfully"

      - name: Execute patch build with expect for CSS password
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
          CSS_PASSWORD: ${{ secrets.GNR_CSS_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Starting patch build with expect for CSS password prompt..."

          NEW_CLEAN="${{ github.event.inputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          NEW_CLEAN="${NEW_CLEAN#0X}"
          CONFIG_FILE="config_${NEW_CLEAN}.ini"

          echo "Build configuration:"
          echo "  - Working Directory: ${{ env.BUILD_BASE_PATH }}"
          echo "  - Python Path: ${{ env.PYTHON_PATH }}"
          echo "  - FXT Tool Path: ${{ env.FXT_TOOL_PATH }}"
          echo "  - Expect Path: ${{ env.EXPECT_PATH }}"
          echo "  - Config File: $CONFIG_FILE"
          echo ""

          set +e
          BUILD_RESULT=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" env CSS_PASSWORD="$CSS_PASSWORD" CONFIG_FILE="$CONFIG_FILE" bash <<'EOF'
          set -uo pipefail
          cd '${{ env.BUILD_BASE_PATH }}'

          cat > automated_build_expect.exp <<'EOT'
          #!${{ env.EXPECT_PATH }} -f
          set timeout 1800

          set css_password $env(CSS_PASSWORD)

          spawn ${{ env.PYTHON_PATH }} ${{ env.FXT_TOOL_PATH }} --conf $env(CONFIG_FILE)

          expect {
              "Enter your CSS password:" {
                  send "$css_password\r"
                  exp_continue
              }
              "Enter your CSS password: " {
                  send "$css_password\r"
                  exp_continue
              }
              -re ".*assword.*" {
                  send "$css_password\r"
                  exp_continue
              }
              eof {
                  catch wait result
                  exit [lindex $result 3]
              }
              timeout {
                  puts "Build timed out after 30 minutes"
                  exit 124
              }
          }
          EOT

          chmod +x automated_build_expect.exp
          ./automated_build_expect.exp 2>&1
          BUILD_EXIT=$?
          rm -f automated_build_expect.exp
          exit $BUILD_EXIT
          EOF
          )
          BUILD_EXIT_CODE=$?
          set -e

          echo "Build execution output:"
          echo "$BUILD_RESULT"
          echo ""
          echo "Build process exit code: $BUILD_EXIT_CODE"

          if [[ $BUILD_EXIT_CODE -eq 0 ]]; then
            echo "SUCCESS: Build command completed successfully"
          elif [[ $BUILD_EXIT_CODE -eq 124 ]]; then
            echo "TIMEOUT: Build process timed out after 30 minutes"
            exit $BUILD_EXIT_CODE
          else
            echo "FAILURE: Build command failed with exit code: $BUILD_EXIT_CODE"
            exit $BUILD_EXIT_CODE
          fi

      - name: Check build log for explicit failures
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking build log for explicit failures..."

          NEW_CLEAN="${{ github.event.inputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          NEW_CLEAN="${NEW_CLEAN#0X}"
          LOG_FILE="${{ env.BUILD_BASE_PATH }}/PatchBuild_${NEW_CLEAN}.log"

          LOG_STATUS=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [ -f '$LOG_FILE' ]; then
              if grep -Eiq 'FAILURE --|Error Occurred\. Exiting the Program|Invalid Patch Version Number' '$LOG_FILE'; then
                echo FAILED
              else
                echo OK
              fi
            else
              echo LOG_NOT_FOUND
            fi
          " )

          echo "Log status: $LOG_STATUS"

          if [ "$LOG_STATUS" = "FAILED" ]; then
            echo "Patch build log contains failure markers"
            exit 1
          fi

          if [ "$LOG_STATUS" = "LOG_NOT_FOUND" ]; then
            echo "Patch build log not found: $LOG_FILE"
            exit 1
          fi

      - name: Verify build results
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Verifying build results..."

          NEW_CLEAN="${{ github.event.inputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          NEW_CLEAN="${NEW_CLEAN#0X}"

          VERIFICATION_RESULT=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            cd '${{ env.BUILD_BASE_PATH }}'
            echo 'Checking for build artifacts...'

            find . -name '*${NEW_CLEAN}*' -type f 2>/dev/null | head -10 || echo 'No version-specific files found'

            echo ''
            echo 'Recent files (last 30 minutes):'
            find . -type f -mmin -30 2>/dev/null | head -20 || echo 'No recent files found'

            echo ''
            echo 'Looking for patch files:'
            find . -name '*.patch' -o -name '*.bin' -o -name '*.ucode' 2>/dev/null | head -10 || echo 'No patch files found'
          " )

          echo "$VERIFICATION_RESULT"

      - name: Display build summary
        shell: bash
        run: |
          NEW_CLEAN="${{ github.event.inputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          NEW_CLEAN="${NEW_CLEAN#0X}"

          echo "## Patch Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${{ github.event.inputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Config File**: config_${NEW_CLEAN}.ini" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build Directory**: ${{ env.BUILD_BASE_PATH }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Account**: ${{ env.FACELESS_USER }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build Mode**: GNR Debug Patch" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Signing Mode**: css-debug" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Password Method**: expect script with GNR_CSS_PASSWORD from GitHub Secrets" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Timeout**: 30 minutes maximum build time" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Patch build process completed with secure password handling!" >> "$GITHUB_STEP_SUMMARY"
