name: CI

on: [push, pull_request]

jobs:
  srf-login:
    name: SRF VNC Login (Windows)
    runs-on: [self-hosted, X64, Windows]
    needs: [patch-build]
    if: ${{ success() }}

    steps:
      - name: Launch VNC and Login to SRF System
        shell: powershell
        run: |
          Write-Host "================================================="
          Write-Host "  SRF VNC Login - Post Build Auto Login"
          Write-Host "================================================="
          Write-Host "Triggered after successful SRF Debug UP build"
          Write-Host "Writing updated vnc_connect.py with retry logic..."
          Write-Host ""

          $scriptPath = "C:\actions-runner\vnc_connect.py"

          # Write the updated vnc_connect.py with retry logic directly
          $scriptContent = @'
import subprocess
import time
import pyautogui
import pygetwindow as gw

# Launch VNC
subprocess.Popen([r'C:\Program Files\RealVNC\VNC Viewer\vncviewer.exe', r'C:\actions-runner\elfleet042.vnc'])
print('Waiting for VNC window...')

# Wait for Authentication window with retry (up to 30 seconds)
auth_window = None
for attempt in range(30):
    windows = gw.getWindowsWithTitle('Authentication')
    if windows:
        auth_window = windows[0]
        print(f'Authentication window found on attempt {attempt + 1}')
        break
    print(f'Attempt {attempt + 1}/30: Authentication window not found, retrying in 1s...')
    time.sleep(1)

if auth_window is None:
    print('Available windows:', gw.getAllTitles())
    raise RuntimeError('ERROR: Authentication window did not appear after 30 seconds.')

# Focus Authentication window
auth_window.activate()
time.sleep(2)

x = auth_window.left
y = auth_window.top
w = auth_window.width
h = auth_window.height
print(f'Left:{x} Top:{y} Width:{w} Height:{h}')

# Clear and type username
print('Clicking username field...')
pyautogui.click(x + int(w * 0.6), y + int(h * 0.40))
time.sleep(0.5)
pyautogui.hotkey('ctrl', 'a')
pyautogui.hotkey('delete')
time.sleep(0.3)
pyautogui.typewrite('CEFLS_User', interval=0.1)
time.sleep(0.5)
pyautogui.screenshot(r'C:\actions-runner\step1_username.png')
print('Username typed!')

# Tab to password field
print('Tabbing to password field...')
pyautogui.press('tab')
time.sleep(0.5)
pyautogui.hotkey('ctrl', 'a')
pyautogui.hotkey('delete')
time.sleep(0.3)
pyautogui.typewrite('intel@123', interval=0.1)
time.sleep(0.5)
pyautogui.screenshot(r'C:\actions-runner\step2_password.png')
print('Password typed!')

# Press Enter
pyautogui.press('enter')
print('Pressed Enter!')

time.sleep(10)
pyautogui.screenshot(r'C:\actions-runner\after_auth.png')
print('Done!')
'@
          Set-Content -Path $scriptPath -Value $scriptContent -Encoding UTF8
          Write-Host "vnc_connect.py written successfully." 

          if (-not (Test-Path $scriptPath)) {
            Write-Host "ERROR: vnc_connect.py not found at $scriptPath"
            exit 1
          }

          Write-Host "Found vnc_connect.py at: $scriptPath"
          Write-Host "Starting VNC login sequence..."

          python $scriptPath

          $exitCode = $LASTEXITCODE
          Write-Host ""
          Write-Host "vnc_connect.py exit code: $exitCode"

          if ($exitCode -eq 0) {
            Write-Host "SUCCESS: SRF VNC login completed successfully!"
          } else {
            Write-Host "FAILURE: VNC login script exited with code $exitCode"
            exit $exitCode
          }

      - name: Upload Login Screenshots as Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: srf-login-screenshots
          path: |
            C:\actions-runner\step1_username.png
            C:\actions-runner\step2_password.png
            C:\actions-runner\after_auth.png
          if-no-files-found: warn
          retention-days: 3
