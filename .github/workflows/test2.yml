name: SRF Debug UP Build - Direct Config Test
on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Config file name (e.g., config_F31083A3.ini)'
        required: true
        type: string
        default: 'config_F31083A3.ini'
      build_description:
        description: 'Build description for testing'
        required: false
        type: string
        default: 'SRF Debug UP Test Build'

env:
  BUILD_BASE_PATH: /nfs/site/disks/dcsg_0729/users/pkummara
  KTAB_PATH: /usr/intel/bin/ktab
  KCRON_PATH: /usr/intel/bin/kcron
  PYTHON_PATH: /usr/intel/bin/python3.7.4
  FXT_TOOL_PATH: /nfs/site/disks/dcsg_0729/fxt-tools_releases/26ww07b/MUPPT_ATOM/fxtMuppt.py
  EXPECT_PATH: /usr/bin/expect

jobs:
  validate-config:
    runs-on: [self-hosted, node16]
    outputs:
      config_validated: ${{ steps.validate.outputs.config_validated }}
      config_path: ${{ steps.validate.outputs.config_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate config file exists
        id: validate
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "=== VALIDATING CONFIG FILE FOR SRF DEBUG UP TEST BUILD ==="
          CONFIG_FILE="${{ github.event.inputs.config_file }}"
          CONFIG_PATH="${{ env.BUILD_BASE_PATH }}/$CONFIG_FILE"
          
          echo "🔍 Checking config file: $CONFIG_FILE"
          echo "📍 Full path: $CONFIG_PATH"
          
          # Check if config file exists
          CONFIG_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '$CONFIG_PATH' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$CONFIG_CHECK" == "EXISTS" ]]; then
            echo "✅ Config file found: $CONFIG_PATH"
            echo "config_validated=true" >> $GITHUB_OUTPUT
            echo "config_path=$CONFIG_PATH" >> $GITHUB_OUTPUT
          else
            echo "❌ ERROR: Config file not found: $CONFIG_PATH"
            echo "config_validated=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Display config file contents
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "=== CONFIG FILE CONTENTS ==="
          CONFIG_PATH="${{ steps.validate.outputs.config_path }}"
          
          CONFIG_CONTENTS=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            cat '$CONFIG_PATH'
          ")
          
          echo "$CONFIG_CONTENTS"
          echo "=== END CONFIG FILE CONTENTS ==="

      - name: Display test build summary
        run: |
          echo "## SRF Debug UP Test Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: SRF Debug UP Test Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Config File**: ${{ github.event.inputs.config_file }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Config Path**: ${{ steps.validate.outputs.config_path }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Description**: ${{ github.event.inputs.build_description }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Directory**: ${{ env.BUILD_BASE_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Build Features:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Direct Config Usage**: Uses existing config file without modification" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Quick Testing**: Bypasses milestone processing for faster testing" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Same Build Process**: Uses identical build tools and methods" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  kerberos-setup:
    runs-on: [self-hosted, node16]
    needs: validate-config
    if: ${{ needs.validate-config.outputs.config_validated == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Switch to build account for Kerberos setup
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Switching to build account for Kerberos setup..."
          CURRENT_USER=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build whoami)
          echo "Expected user: grp_srf_fit1_build"
          echo "Actual user: $CURRENT_USER"
          
          if [ "$CURRENT_USER" = "grp_srf_fit1_build" ]; then
            echo "SUCCESS: User switch to build account successful"
          else
            echo "FAILURE: User switch failed"
            exit 1
          fi

      - name: Initialize Kerberos Ticket (ktab)
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
          FA_PASSWORD: ${{ secrets.FA_PASSWORD }}
        run: |
          echo "Initializing Kerberos Ticket with ktab for test build..."
          
          KTAB_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo '$FA_PASSWORD' | ${{ env.KTAB_PATH }} -i 2>&1
          ")
          
          echo "ktab output: $KTAB_RESULT"
          
          if echo "$KTAB_RESULT" | grep -q -i "error\|failed\|denied"; then
            echo "ERROR: ktab initialization failed"
            exit 1
          else
            echo "SUCCESS: ktab initialization completed"
          fi

      - name: Initialize Kerberos Cron (kcron)
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Initializing Kerberos Cron with kcron for test build..."
          
          KCRON_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'y' | ${{ env.KCRON_PATH }} -i 2>&1
          ")
          
          echo "kcron output: $KCRON_RESULT"
          
          if echo "$KCRON_RESULT" | grep -q -i "error\|failed\|denied"; then
            echo "ERROR: kcron initialization failed"
            exit 1
          else
            echo "SUCCESS: kcron initialization completed"
          fi

  test-patch-build:
    runs-on: [self-hosted, node16]
    needs: [validate-config, kerberos-setup]
    if: ${{ needs.validate-config.outputs.config_validated == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Switch to faceless account for build
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Switching to faceless account for SRF Debug UP test build..."
          CURRENT_USER=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build whoami)
          echo "Expected user: grp_srf_fit1_build"
          echo "Actual user: $CURRENT_USER"
          
          if [ "$CURRENT_USER" = "grp_srf_fit1_build" ]; then
            echo "SUCCESS: User switch successful"
          else
            echo "FAILURE: User switch failed"
            exit 1
          fi

      - name: Verify build tools exist
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Verifying build tools for SRF Debug UP test build..."
          
          # Check Python
          PYTHON_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '${{ env.PYTHON_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$PYTHON_CHECK" == "EXISTS" ]]; then
            echo "✅ Python found: ${{ env.PYTHON_PATH }}"
          else
            echo "❌ Python not found: ${{ env.PYTHON_PATH }}"
            exit 1
          fi
          
          # Check FXT tool
          FXT_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '${{ env.FXT_TOOL_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$FXT_CHECK" == "EXISTS" ]]; then
            echo "✅ FXT tool found: ${{ env.FXT_TOOL_PATH }}"
          else
            echo "❌ FXT tool not found: ${{ env.FXT_TOOL_PATH }}"
            exit 1
          fi
          
          # Check expect
          EXPECT_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '${{ env.EXPECT_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$EXPECT_CHECK" == "EXISTS" ]]; then
            echo "✅ expect found: ${{ env.EXPECT_PATH }}"
          else
            echo "❌ expect not found: ${{ env.EXPECT_PATH }}"
            exit 1
          fi
          
          echo "All build tools verified successfully"

      - name: Execute SRF Debug UP test build
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
          CSS_PASSWORD: ${{ secrets.CSS_PASSWORD }}
        run: |
          echo "Starting SRF Debug UP test build..."
          
          CONFIG_FILE="${{ github.event.inputs.config_file }}"
          
          echo "Test Build Configuration:"
          echo "  - Working Directory: ${{ env.BUILD_BASE_PATH }}"
          echo "  - Config File: $CONFIG_FILE"
          echo "  - Build Description: ${{ github.event.inputs.build_description }}"
          echo "  - Python Path: ${{ env.PYTHON_PATH }}"
          echo "  - FXT Tool Path: ${{ env.FXT_TOOL_PATH }}"
          echo ""
          
          BUILD_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            cd '${{ env.BUILD_BASE_PATH }}'
            echo 'Current directory: \$(pwd)'
            
            # Create expect script for CSS password
            cat > test_build_expect.exp << 'EOF'
          #!${{ env.EXPECT_PATH }} -f
          set timeout 1800
          
          set css_password \$env(CSS_PASSWORD)
          
          spawn ${{ env.PYTHON_PATH }} ${{ env.FXT_TOOL_PATH }} --conf $CONFIG_FILE
          
          expect {
            \"Enter your CSS password:\" {
              send \"\$css_password\r\"
              exp_continue
            }
            \"Enter your CSS password: \" {
              send \"\$css_password\r\"
              exp_continue
            }
            -re \".*assword.*\" {
              send \"\$css_password\r\"
              exp_continue
            }
            eof {
              catch wait result
              exit [lindex \$result 3]
            }
            timeout {
              puts \"Test build timed out after 30 minutes\"
              exit 124
            }
          }
          EOF
            
            chmod +x test_build_expect.exp
            echo 'Starting SRF Debug UP test build with expect script...'
            
            export CSS_PASSWORD='$CSS_PASSWORD'
            ./test_build_expect.exp 2>&1
            BUILD_EXIT=\$?
            
            rm -f test_build_expect.exp
            
            echo \"Test build completed with exit code: \$BUILD_EXIT\"
            exit \$BUILD_EXIT
          ")
          
          BUILD_EXIT_CODE=$?
          
          echo "Test build output:"
          echo "$BUILD_RESULT"
          echo ""
          echo "Test build exit code: $BUILD_EXIT_CODE"
          
          if [[ $BUILD_EXIT_CODE -eq 0 ]]; then
            echo "✅ SUCCESS: SRF Debug UP test build completed successfully"
          elif [[ $BUILD_EXIT_CODE -eq 124 ]]; then
            echo "⏰ TIMEOUT: Test build timed out after 30 minutes"
            exit $BUILD_EXIT_CODE
          else
            echo "❌ FAILURE: Test build failed with exit code: $BUILD_EXIT_CODE"
            exit $BUILD_EXIT_CODE
          fi

      - name: Verify test build results
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Verifying SRF Debug UP test build results..."
          
          VERIFICATION_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            cd '${{ env.BUILD_BASE_PATH }}'
            echo 'Checking for test build artifacts...'
            
            echo 'Recent files (last 30 minutes):'
            find . -type f -mmin -30 2>/dev/null | head -20 || echo 'No recent files found'
            echo ''
            
            echo 'Looking for patch/binary files:'
            find . -name '*.patch' -o -name '*.bin' -o -name '*.ucode' 2>/dev/null | head -10 || echo 'No patch files found'
            echo ''
            
            echo 'Looking for debug artifacts:'
            find . -name '*debug*' -o -name '*css-debug*' 2>/dev/null | head -10 || echo 'No debug files found'
            echo ''
            
            echo 'Directory listing:'
            ls -la | head -20
          ")
          
          echo "$VERIFICATION_RESULT"

      - name: Display test build summary
        run: |
          echo "## SRF Debug UP Test Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: SRF Debug UP Test Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Config File**: ${{ github.event.inputs.config_file }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Description**: ${{ github.event.inputs.build_description }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Directory**: ${{ env.BUILD_BASE_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Account**: grp_srf_fit1_build (faceless account)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Build Process:" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ **Config Validation**: Verified config file exists and is readable" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ **Kerberos Setup**: Initialized ktab and kcron for authentication" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ **Tool Verification**: Confirmed all build tools are available" >> $GITHUB_STEP_SUMMARY
          echo "4. ✅ **Build Execution**: Executed FXT tool with existing config" >> $GITHUB_STEP_SUMMARY
          echo "5. ✅ **Result Verification**: Checked for build artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Build Features:" >> $GITHUB_STEP_SUMMARY
          echo "- **Direct Config**: Uses existing config_F31083A3.ini without modification" >> $GITHUB_STEP_SUMMARY
          echo "- **Quick Testing**: Bypasses milestone processing for faster iteration" >> $GITHUB_STEP_SUMMARY
          echo "- **Same Security**: Uses identical password handling with GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "- **Full Process**: Complete build pipeline including Kerberos setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage:" >> $GITHUB_STEP_SUMMARY
          echo "- **Config File Input**: Specify any config file in the build directory" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Description**: Optional description for tracking test builds" >> $GITHUB_STEP_SUMMARY
          echo "- **Default Config**: config_F31083A3.ini (can be changed in workflow input)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SRF Debug UP test build completed successfully!" >> $GITHUB_STEP_SUMMARY
