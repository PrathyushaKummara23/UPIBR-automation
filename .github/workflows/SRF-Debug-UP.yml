name: SRF Debug UP Build
on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Enter the milestone filename to read (without .txt extension) or leave empty to list all files'
        required: false
        type: string
        default: ''

env:
  BUILD_BASE_PATH: /nfs/site/disks/dcsg_0729/users/pkummara
  PATCHES_BASE_PATH: /nfs/site/disks/dcsg_0729/patches/SRF/C0
  KTAB_PATH: /usr/intel/bin/ktab
  KCRON_PATH: /usr/intel/bin/kcron
  PYTHON_PATH: /usr/intel/pkgs/python3/3.9.7/bin/python3
  FXT_TOOL_PATH: /nfs/site/disks/dcsg_0729/patches/SRF/C0/fxt_tool.py
  EXPECT_PATH: /usr/bin/expect

jobs:
  prepare-config:
    runs-on: [self-hosted, node16]
    outputs:
      config_file: ${{ steps.generate-config.outputs.config_file }}
      milestone: ${{ steps.parse-milestone.outputs.milestone }}
      list_only: ${{ steps.set-outputs.outputs.list_only }}
      new_version: ${{ steps.parse-milestone.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: List available milestone files and validate input
        run: |
          echo "=== AVAILABLE MILESTONE FILES FOR SRF DEBUG UP BUILD ==="
          if [ ! -d "output_paths" ]; then
            echo "❌ ERROR: output_paths directory does not exist"
            echo "Please run the 'Fetch Binary Files from Entry Criteria' workflow first to create milestone files."
            exit 1
          fi
          
          # Find all .txt files
          TXT_FILES=($(find output_paths -name "*.txt" -type f -exec basename {} \; | sort))
          
          if [ ${#TXT_FILES[@]} -eq 0 ]; then
            echo "❌ ERROR: No .txt files found in output_paths directory"
            echo "Please run the 'Fetch Binary Files from Entry Criteria' workflow first to create milestone files."
            exit 1
          fi
          
          echo "📁 Available milestone files for SRF Debug UP build:"
          for i in "${!TXT_FILES[@]}"; do
            echo "  $((i+1)). ${TXT_FILES[$i]}"
          done
          echo ""
          
          # Store available files for later use
          printf '%s\n' "${TXT_FILES[@]}" > available_files.txt
          echo "TOTAL_FILES=${#TXT_FILES[@]}" >> $GITHUB_ENV
          
          # Process user input
          USER_INPUT="${{ github.event.inputs.filename }}"
          if [ -z "$USER_INPUT" ]; then
            echo "ℹ️ No filename provided. Listing files only."
            echo "TARGET_FILE=" >> $GITHUB_ENV
            echo "LIST_ONLY=true" >> $GITHUB_ENV
          else
            # Add .txt extension if not provided
            if [[ "$USER_INPUT" != *.txt ]]; then
              TARGET_FILE="${USER_INPUT}.txt"
            else
              TARGET_FILE="$USER_INPUT"
            fi
            
            # Check if file exists
            if [ -f "output_paths/$TARGET_FILE" ]; then
              echo "✅ Found milestone file for SRF Debug UP build: $TARGET_FILE"
              echo "TARGET_FILE=$TARGET_FILE" >> $GITHUB_ENV
              echo "LIST_ONLY=false" >> $GITHUB_ENV
            else
              echo "❌ ERROR: File '$TARGET_FILE' not found"
              echo ""
              echo "Available files are:"
              for file in "${TXT_FILES[@]}"; do
                echo "  - $file"
              done
              echo ""
              echo "💡 Tip: Enter just the milestone name (e.g., 'UPLR1' for 'Milestone_UPLR1.txt')"
              exit 1
            fi
          fi
          echo "=== END FILE VALIDATION ==="

      - name: Parse milestone file and extract build values
        if: ${{ env.LIST_ONLY == 'false' }}
        id: parse-milestone
        run: |
          echo "=== PARSING MILESTONE FILE FOR SRF DEBUG UP BUILD ==="
          TARGET_FILE="${{ env.TARGET_FILE }}"
          FILE_PATH="output_paths/$TARGET_FILE"
          
          echo "📖 Reading milestone file: $TARGET_FILE"
          echo "📍 Full path: $(realpath "$FILE_PATH")"
          echo ""
          echo "=== MILESTONE FILE CONTENTS ==="
          cat "$FILE_PATH"
          echo "=== END CONTENTS ==="
          echo ""
          
          # Extract values from milestone file
          echo "🔍 Extracting milestone values for SRF Debug UP build:"
          MILESTONE=$(grep '^Milestone=' "$FILE_PATH" | cut -d'=' -f2 | xargs)
          UP_BASELINE=$(grep '^UP Base Line Version=' "$FILE_PATH" | cut -d'=' -f2 | xargs)
          NEW_UP_VERSION=$(grep '^New UP Version=' "$FILE_PATH" | cut -d'=' -f2 | xargs)
          SVN_VERSION=$(grep '^SVN Version=' "$FILE_PATH" | cut -d'=' -f2 | xargs)
          SVN_SE_VERSION=$(grep '^SVN_SE Version=' "$FILE_PATH" | cut -d'=' -f2 | xargs)
          MIN_SVN=$(grep '^Min SVN=' "$FILE_PATH" | cut -d'=' -f2 | xargs)
          MIN_RUNTIME_ID=$(grep '^Min Runtime ID=' "$FILE_PATH" | cut -d'=' -f2 | xargs)
          ROLLBACK_ID=$(grep '^Rollback ID=' "$FILE_PATH" | cut -d'=' -f2 | xargs)
          
          # Extract binary paths (handle empty values)
          UCODE_PATH=$(grep '^ucode=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          XUCODE_PATH=$(grep '^xucode=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          MCHECK_PATH=$(grep '^mcheck=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          TCODE_PATH=$(grep '^tcode=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          ACODE_PATH=$(grep '^acode=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          ICODE_PATH=$(grep '^icode=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          OOBMSM_PATH=$(grep '^oobmsm=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          PCODE_C_PATH=$(grep '^pcode-c=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          PCODE_IO_PATH=$(grep '^pcode-io=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          S3M_PATH=$(grep '^s3m=' "$FILE_PATH" | cut -d'=' -f2- | xargs)
          
          # Display extracted values
          echo "  📋 Milestone: $MILESTONE"
          echo "  📋 UP Baseline Version: $UP_BASELINE"
          echo "  📋 New UP Version: $NEW_UP_VERSION"
          echo "  📋 SVN Version: $SVN_VERSION"
          echo "  📋 SVN_SE Version: $SVN_SE_VERSION"
          echo "  📋 Min SVN: $MIN_SVN"
          echo "  📋 Min Runtime ID: $MIN_RUNTIME_ID"
          echo "  📋 Rollback ID: $ROLLBACK_ID"
          echo ""
          echo "  📋 Binary Paths for SRF Debug UP build:"
          echo "  - UCODE: ${UCODE_PATH:-'(empty)'}"
          echo "  - XUCODE: ${XUCODE_PATH:-'(empty)'}"
          echo "  - MCHECK: ${MCHECK_PATH:-'(empty)'}"
          echo "  - TCODE: ${TCODE_PATH:-'(empty)'}"
          echo "  - ACODE: ${ACODE_PATH:-'(empty)'}"
          echo "  - ICODE: ${ICODE_PATH:-'(empty)'}"
          echo "  - OOBMSM: ${OOBMSM_PATH:-'(empty)'}"
          echo "  - PCODE-C: ${PCODE_C_PATH:-'(empty)'}"
          echo "  - PCODE-IO: ${PCODE_IO_PATH:-'(empty)'}"
          echo "  - S3M: ${S3M_PATH:-'(empty)'}"
          
          # Store values in environment for next steps
          echo "MILESTONE=$MILESTONE" >> $GITHUB_ENV
          echo "UP_BASELINE=$UP_BASELINE" >> $GITHUB_ENV
          echo "NEW_UP_VERSION=$NEW_UP_VERSION" >> $GITHUB_ENV
          echo "SVN_VERSION=$SVN_VERSION" >> $GITHUB_ENV
          echo "SVN_SE_VERSION=$SVN_SE_VERSION" >> $GITHUB_ENV
          echo "MIN_SVN=$MIN_SVN" >> $GITHUB_ENV
          echo "MIN_RUNTIME_ID=$MIN_RUNTIME_ID" >> $GITHUB_ENV
          echo "ROLLBACK_ID=$ROLLBACK_ID" >> $GITHUB_ENV
          echo "UCODE_PATH=$UCODE_PATH" >> $GITHUB_ENV
          echo "XUCODE_PATH=$XUCODE_PATH" >> $GITHUB_ENV
          echo "MCHECK_PATH=$MCHECK_PATH" >> $GITHUB_ENV
          echo "TCODE_PATH=$TCODE_PATH" >> $GITHUB_ENV
          echo "ACODE_PATH=$ACODE_PATH" >> $GITHUB_ENV
          echo "ICODE_PATH=$ICODE_PATH" >> $GITHUB_ENV
          echo "OOBMSM_PATH=$OOBMSM_PATH" >> $GITHUB_ENV
          echo "PCODE_C_PATH=$PCODE_C_PATH" >> $GITHUB_ENV
          echo "PCODE_IO_PATH=$PCODE_IO_PATH" >> $GITHUB_ENV
          echo "S3M_PATH=$S3M_PATH" >> $GITHUB_ENV
          
          # Store outputs
          echo "milestone=$MILESTONE" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_UP_VERSION" >> $GITHUB_OUTPUT
          echo "=== END MILESTONE PARSING ==="

      - name: Switch to faceless account and verify
        if: ${{ env.LIST_ONLY == 'false' }}
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Switching to faceless account for config generation..."
          CURRENT_USER=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build whoami)
          echo "Expected user: grp_srf_fit1_build"
          echo "Actual user: $CURRENT_USER"
          
          if [ "$CURRENT_USER" = "grp_srf_fit1_build" ]; then
            echo "SUCCESS: User switch to faceless account successful"
            echo "Running as: $CURRENT_USER"
          else
            echo "FAILURE: User switch failed"
            echo "Expected: grp_srf_fit1_build"
            echo "Got: $CURRENT_USER"
            exit 1
          fi

      - name: Validate baseline config exists
        if: ${{ env.LIST_ONLY == 'false' }}
        id: validate-baseline
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          # Clean baseline version (remove 0x prefix)
          BASELINE_CLEAN="${{ env.UP_BASELINE }}"
          BASELINE_CLEAN="${BASELINE_CLEAN#0x}"
          SOURCE_CONFIG="${{ env.PATCHES_BASE_PATH }}/build/${BASELINE_CLEAN}/release/config_${BASELINE_CLEAN}.ini"
          
          echo "Checking baseline config as faceless account..."
          echo "Baseline version: ${{ env.UP_BASELINE }} (cleaned: $BASELINE_CLEAN)"
          echo "Config path: $SOURCE_CONFIG"
          
          CONFIG_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '$SOURCE_CONFIG' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$CONFIG_CHECK" == "EXISTS" ]]; then
            echo "✅ Baseline config found: $SOURCE_CONFIG"
            echo "baseline_config=$SOURCE_CONFIG" >> $GITHUB_OUTPUT
          else
            echo "Config not found as faceless account, checking as pkummara..."
            # Check as pkummara
            if [[ -f "$SOURCE_CONFIG" ]]; then
              echo "✅ Baseline config found as pkummara: $SOURCE_CONFIG"
              echo "Note: Config accessible to pkummara but not faceless account"
              echo "baseline_config=$SOURCE_CONFIG" >> $GITHUB_OUTPUT
            else
              echo "❌ ERROR: Baseline config not found by either account: $SOURCE_CONFIG"
              echo "Please ensure the baseline version ${{ env.UP_BASELINE }} exists in the build directory"
              exit 1
            fi
          fi

      - name: Validate milestone binary paths for SRF Debug UP build
        if: ${{ env.LIST_ONLY == 'false' }}
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "=== VALIDATING MILESTONE BINARY PATHS FOR SRF DEBUG UP BUILD ==="
          
          # Function to check path with both accounts
          check_path_both_accounts() {
            local name="$1"
            local path="$2"
            
            if [[ -z "$path" ]]; then
              echo "SKIP $name: (empty path)"
              return 0
            fi
            
            echo "Checking $name: $path"
            
            # First try with faceless account
            PATH_CHECK_FACELESS=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
              if [[ -f '$path' ]]; then
                echo 'EXISTS'
              else
                echo 'NOT_FOUND'
              fi
            ")
            
            if [[ "$PATH_CHECK_FACELESS" == "EXISTS" ]]; then
              echo "✅ PASS $name: $path (exists - faceless account)"
              return 0
            else
              echo "$name not found as faceless account, checking as pkummara..."
              # Check as pkummara
              if [[ -f "$path" ]]; then
                echo "✅ PASS $name: $path (exists - pkummara account)"
                echo "Note: $name accessible to pkummara but not faceless account"
                return 0
              else
                echo "❌ WARNING: $name path does not exist for either account: $path"
                echo "Note: Will continue with config generation, but this may cause build issues"
                return 1
              fi
            fi
          }
          
          # Check all milestone binary paths
          WARNINGS=0
          check_path_both_accounts "UCODE" "${{ env.UCODE_PATH }}" || WARNINGS=$((WARNINGS + 1))
          check_path_both_accounts "XUCODE" "${{ env.XUCODE_PATH }}" || WARNINGS=$((WARNINGS + 1))
          check_path_both_accounts "MCHECK" "${{ env.MCHECK_PATH }}" || WARNINGS=$((WARNINGS + 1))
          check_path_both_accounts "TCODE" "${{ env.TCODE_PATH }}" || WARNINGS=$((WARNINGS + 1))
          check_path_both_accounts "ACODE" "${{ env.ACODE_PATH }}" || WARNINGS=$((WARNINGS + 1))
          check_path_both_accounts "ICODE" "${{ env.ICODE_PATH }}" || WARNINGS=$((WARNINGS + 1))
          check_path_both_accounts "OOBMSM" "${{ env.OOBMSM_PATH }}" || WARNINGS=$((WARNINGS + 1))
          check_path_both_accounts "PCODE-C" "${{ env.PCODE_C_PATH }}" || WARNINGS=$((WARNINGS + 1))
          check_path_both_accounts "PCODE-IO" "${{ env.PCODE_IO_PATH }}" || WARNINGS=$((WARNINGS + 1))
          check_path_both_accounts "S3M" "${{ env.S3M_PATH }}" || WARNINGS=$((WARNINGS + 1))
          
          if [[ $WARNINGS -eq 0 ]]; then
            echo "✅ All milestone binary paths validated successfully for SRF Debug UP build"
          else
            echo "⚠️ Milestone binary path validation completed with $WARNINGS warnings"
            echo "Note: Warnings do not prevent config generation, but may cause build issues"
          fi
          echo "=== END PATH VALIDATION ==="

      - name: Generate config file from milestone
        if: ${{ env.LIST_ONLY == 'false' }}
        id: generate-config
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "=== GENERATING CONFIG FILE FROM MILESTONE ==="
          
          # Clean version numbers (remove 0x prefix if present)
          BASELINE_CLEAN="${{ env.UP_BASELINE }}"
          NEW_CLEAN="${{ env.NEW_UP_VERSION }}"
          BASELINE_CLEAN="${BASELINE_CLEAN#0x}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          
          SOURCE_CONFIG="${{ steps.validate-baseline.outputs.baseline_config }}"
          NEW_CONFIG="${{ env.BUILD_BASE_PATH }}/config_${NEW_CLEAN}.ini"
          
          echo "Generating config file as faceless account..."
          echo "Source: $SOURCE_CONFIG"
          echo "Target: $NEW_CONFIG"
          echo "Milestone: ${{ env.MILESTONE }}"
          echo "Baseline: $BASELINE_CLEAN"
          echo "New Version: $NEW_CLEAN"
          
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            # Create target directory
            mkdir -p '${{ env.BUILD_BASE_PATH }}'
            
            # Copy baseline config
            cp '$SOURCE_CONFIG' '$NEW_CONFIG'
            
            # Update version in config file
            sed -i 's/version = 0x${BASELINE_CLEAN}/version = 0x${NEW_CLEAN}/g' '$NEW_CONFIG'
            
            # Update prev_version to baseline version
            sed -i 's/prev_version = .*/prev_version = 0x${BASELINE_CLEAN}/g' '$NEW_CONFIG'
            
            # Update patch description with milestone
            sed -i 's/patch_description = .*/patch_description = SRF Debug UP build_${{ env.MILESTONE }}/' '$NEW_CONFIG'
            
            # Update build_path
            sed -i 's|build_path = .*|build_path = ${{ env.BUILD_BASE_PATH }}|' '$NEW_CONFIG'
            
            # Update SVN values from milestone (only if they exist in milestone file)
            if [[ -n '${{ env.SVN_VERSION }}' ]]; then
              SVN_CLEAN='${{ env.SVN_VERSION }}'
              SVN_CLEAN=\${SVN_CLEAN#0x}
              sed -i \"s/svn = .*/svn = 0x\${SVN_CLEAN}/\" '$NEW_CONFIG'
            fi
            
            if [[ -n '${{ env.SVN_SE_VERSION }}' ]]; then
              sed -i 's/se_svn = .*/se_svn = 0x${{ env.SVN_SE_VERSION }}/' '$NEW_CONFIG'
            fi
            
            if [[ -n '${{ env.MIN_SVN }}' ]]; then
              MIN_SVN_CLEAN='${{ env.MIN_SVN }}'
              MIN_SVN_CLEAN=\${MIN_SVN_CLEAN#0x}
              sed -i \"s/min_svn = .*/min_svn = \${MIN_SVN_CLEAN}/\" '$NEW_CONFIG'
            fi
            
            # Change soc_sign from manual to css-debug if it's manual
            if grep -q '^soc_sign = manual' '$NEW_CONFIG'; then
              echo 'Changing soc_sign from manual to css-debug for SRF Debug UP build'
              sed -i 's/^soc_sign = manual/soc_sign = css-debug/' '$NEW_CONFIG'
            else
              echo 'soc_sign is already css-debug or not manual, no change needed'
            fi
            
            # Update binary paths from milestone (only if they are not empty)
            [[ -n '${{ env.UCODE_PATH }}' ]] && sed -i 's|^ucode = .*|ucode = ${{ env.UCODE_PATH }}|' '$NEW_CONFIG'
            [[ -n '${{ env.XUCODE_PATH }}' ]] && sed -i 's|^xucode = .*|xucode = ${{ env.XUCODE_PATH }}|' '$NEW_CONFIG'
            [[ -n '${{ env.MCHECK_PATH }}' ]] && sed -i 's|^mcheck = .*|mcheck = ${{ env.MCHECK_PATH }}|' '$NEW_CONFIG'
            [[ -n '${{ env.ICODE_PATH }}' ]] && sed -i 's|^icode = .*|icode = ${{ env.ICODE_PATH }}|' '$NEW_CONFIG'
            [[ -n '${{ env.OOBMSM_PATH }}' ]] && sed -i 's|^oobmsm = .*|oobmsm = ${{ env.OOBMSM_PATH }}|' '$NEW_CONFIG'
            [[ -n '${{ env.S3M_PATH }}' ]] && sed -i 's|^s3m = .*|s3m = ${{ env.S3M_PATH }}|' '$NEW_CONFIG'
            
            # Handle pcode-c and pcode-io separately (these are the key fixes)
            [[ -n '${{ env.PCODE_C_PATH }}' ]] && sed -i 's|^pcode-c = .*|pcode-c = ${{ env.PCODE_C_PATH }}|' '$NEW_CONFIG'
            [[ -n '${{ env.PCODE_IO_PATH }}' ]] && sed -i 's|^pcode-io = .*|pcode-io = ${{ env.PCODE_IO_PATH }}|' '$NEW_CONFIG'
            
            # Handle empty tcode and acode (set to 'none' if empty in milestone)
            if [[ -z '${{ env.TCODE_PATH }}' ]]; then
              sed -i 's|^tcode = .*|tcode = none|' '$NEW_CONFIG'
            else
              sed -i 's|^tcode = .*|tcode = ${{ env.TCODE_PATH }}|' '$NEW_CONFIG'
            fi
            
            if [[ -z '${{ env.ACODE_PATH }}' ]]; then
              sed -i 's|^acode = .*|acode = none|' '$NEW_CONFIG'
            else
              sed -i 's|^acode = .*|acode = ${{ env.ACODE_PATH }}|' '$NEW_CONFIG'
            fi
            
            echo 'SRF Debug UP config file generated successfully'
            echo ''
            echo '=== GENERATED SRF DEBUG UP CONFIG FILE CONTENTS ==='
            cat '$NEW_CONFIG'
            echo '=== END CONFIG FILE CONTENTS ==='
          "
          
          echo "config_file=config_${NEW_CLEAN}.ini" >> $GITHUB_OUTPUT
          echo "=== END SRF DEBUG UP CONFIG GENERATION ==="

      - name: Set SRF Debug UP config file permissions
        if: ${{ env.LIST_ONLY == 'false' }}
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "=== SETTING SRF DEBUG UP CONFIG FILE PERMISSIONS ==="
          
          # Clean version number for config file name
          NEW_CLEAN="${{ env.NEW_UP_VERSION }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          NEW_CONFIG="${{ env.BUILD_BASE_PATH }}/config_${NEW_CLEAN}.ini"
          
          echo "Setting permissions for SRF Debug UP config file: $NEW_CONFIG"
          
          # Set permissions as faceless account
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '$NEW_CONFIG' ]]; then
              echo 'Setting chmod 777 permissions on SRF Debug UP config file...'
              chmod 777 '$NEW_CONFIG'
              echo 'Verifying permissions:'
              ls -la '$NEW_CONFIG'
              echo 'SRF Debug UP config file permissions set successfully'
            else
              echo 'ERROR: SRF Debug UP config file not found: $NEW_CONFIG'
              exit 1
            fi
          "
          echo "=== END PERMISSIONS SETTING ==="

      - name: Set job outputs
        id: set-outputs
        run: |
          echo "list_only=${{ env.LIST_ONLY }}" >> $GITHUB_OUTPUT

      - name: Display SRF Debug UP build summary
        run: |
          echo "=== SRF DEBUG UP BUILD SUMMARY ==="
          echo "🎯 User input: '${{ github.event.inputs.filename }}'"
          echo "📁 Total available files: ${{ env.TOTAL_FILES }}"
          
          if [ "${{ env.LIST_ONLY }}" == "true" ]; then
            echo "📋 Mode: List milestone files only"
            echo ""
            echo "Available milestone files for SRF Debug UP build:"
            cat available_files.txt | sed 's/^/  ✓ /'
            echo ""
            echo "💡 To start SRF Debug UP build from a milestone file, run this workflow again and enter the filename"
            echo "   Example inputs:"
            echo "   - 'UPLR1' (will read Milestone_UPLR1.txt)"
            echo "   - 'Milestone_UPLR1.txt' (full filename)"
          else
            echo "📖 Mode: SRF Debug UP build from milestone"
            echo "✅ Successfully processed milestone: ${{ env.MILESTONE }}"
            echo "✅ Generated SRF Debug UP config file: ${{ steps.generate-config.outputs.config_file }}"
            echo "✅ Set permissions (chmod 777) on config file"
            echo ""
            echo "## SRF Debug UP Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "- **Milestone**: ${{ env.MILESTONE }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Build Type**: SRF Debug UP" >> $GITHUB_STEP_SUMMARY
            echo "- **Baseline Version**: ${{ env.UP_BASELINE }}" >> $GITHUB_STEP_SUMMARY
            echo "- **New Version**: ${{ env.NEW_UP_VERSION }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Config File**: ${{ steps.generate-config.outputs.config_file }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Permissions**: Set to 777 (read/write/execute for all)" >> $GITHUB_STEP_SUMMARY
            echo "- **Patch Description**: SRF Debug UP build_${{ env.MILESTONE }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Milestone Values Applied:" >> $GITHUB_STEP_SUMMARY
            echo "- **SVN Version**: ${{ env.SVN_VERSION }}" >> $GITHUB_STEP_SUMMARY
            echo "- **SVN_SE Version**: ${{ env.SVN_SE_VERSION }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Min SVN**: ${{ env.MIN_SVN }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Min Runtime ID**: ${{ env.MIN_RUNTIME_ID }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Rollback ID**: ${{ env.ROLLBACK_ID }}" >> $GITHUB_STEP_SUMMARY
            echo "- **SOC Sign**: Changed to css-debug (if was manual)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Binary Paths Updated:" >> $GITHUB_STEP_SUMMARY
            [[ -n "${{ env.UCODE_PATH }}" ]] && echo "- **UCODE**: Updated" >> $GITHUB_STEP_SUMMARY
            [[ -n "${{ env.XUCODE_PATH }}" ]] && echo "- **XUCODE**: Updated" >> $GITHUB_STEP_SUMMARY
            [[ -n "${{ env.MCHECK_PATH }}" ]] && echo "- **MCHECK**: Updated" >> $GITHUB_STEP_SUMMARY
            [[ -n "${{ env.ICODE_PATH }}" ]] && echo "- **ICODE**: Updated" >> $GITHUB_STEP_SUMMARY
            [[ -n "${{ env.OOBMSM_PATH }}" ]] && echo "- **OOBMSM**: Updated" >> $GITHUB_STEP_SUMMARY
            [[ -n "${{ env.PCODE_C_PATH }}" ]] && echo "- **PCODE-C**: Updated" >> $GITHUB_STEP_SUMMARY
            [[ -n "${{ env.PCODE_IO_PATH }}" ]] && echo "- **PCODE-IO**: Updated" >> $GITHUB_STEP_SUMMARY
            [[ -n "${{ env.S3M_PATH }}" ]] && echo "- **S3M**: Updated" >> $GITHUB_STEP_SUMMARY
            [[ -z "${{ env.TCODE_PATH }}" ]] && echo "- **TCODE**: Set to 'none'" >> $GITHUB_STEP_SUMMARY || echo "- **TCODE**: Updated" >> $GITHUB_STEP_SUMMARY
            [[ -z "${{ env.ACODE_PATH }}" ]] && echo "- **ACODE**: Set to 'none'" >> $GITHUB_STEP_SUMMARY || echo "- **ACODE**: Updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "SRF Debug UP config file generated successfully from milestone data with proper permissions!" >> $GITHUB_STEP_SUMMARY
          fi
          echo "=== END SRF DEBUG UP BUILD SUMMARY ==="

  kerberos-setup:
    runs-on: [self-hosted, node16]
    needs: prepare-config
    if: ${{ needs.prepare-config.outputs.list_only == 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Switch to build account for Kerberos setup
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Switching to build account for Kerberos setup..."
          CURRENT_USER=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build whoami)
          echo "Expected user: grp_srf_fit1_build"
          echo "Actual user: $CURRENT_USER"
          
          if [ "$CURRENT_USER" = "grp_srf_fit1_build" ]; then
            echo "SUCCESS: User switch to build account successful"
            echo "Running as: $CURRENT_USER"
          else
            echo "FAILURE: User switch failed"
            echo "Expected: grp_srf_fit1_build"
            echo "Got: $CURRENT_USER"
            exit 1
          fi

      - name: Verify Kerberos tools exist
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Verifying Kerberos tools availability for SRF Debug UP build..."
          
          # Check ktab
          KTAB_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '${{ env.KTAB_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$KTAB_CHECK" == "EXISTS" ]]; then
            echo "PASS: ktab found at: ${{ env.KTAB_PATH }}"
          else
            echo "FAIL: ktab not found at: ${{ env.KTAB_PATH }}"
            exit 1
          fi
          
          # Check kcron
          KCRON_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '${{ env.KCRON_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$KCRON_CHECK" == "EXISTS" ]]; then
            echo "PASS: kcron found at: ${{ env.KCRON_PATH }}"
          else
            echo "FAIL: kcron not found at: ${{ env.KCRON_PATH }}"
            exit 1
          fi
          
          echo "All Kerberos tools verified successfully for SRF Debug UP build"

      - name: Initialize Kerberos Ticket (ktab)
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
          FA_PASSWORD: ${{ secrets.FA_PASSWORD }}
        run: |
          echo "Step 1: Initializing Kerberos Ticket with ktab for SRF Debug UP build..."
          echo "Running: ${{ env.KTAB_PATH }} -i"
          
          # Initialize ktab with FA password
          KTAB_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'Executing ktab -i...'
            echo '$FA_PASSWORD' | ${{ env.KTAB_PATH }} -i 2>&1
          ")
          
          echo "ktab output:"
          echo "$KTAB_RESULT"
          
          # Check if ktab was successful
          if echo "$KTAB_RESULT" | grep -q -i "error\|failed\|denied"; then
            echo "ERROR: ktab initialization appears to have failed"
            echo "Output: $KTAB_RESULT"
            exit 1
          else
            echo "SUCCESS: ktab initialization completed for SRF Debug UP build"
          fi

      - name: Initialize Kerberos Cron (kcron)
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Step 2: Initializing Kerberos Cron with kcron for SRF Debug UP build..."
          echo "Running: ${{ env.KCRON_PATH }} -i"
          echo "Will automatically respond 'y' to overwrite prompt"
          
          # Initialize kcron and respond 'y' to overwrite prompt
          KCRON_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'Executing kcron -i...'
            echo 'y' | ${{ env.KCRON_PATH }} -i 2>&1
          ")
          
          echo "kcron output:"
          echo "$KCRON_RESULT"
          
          # Check if kcron was successful
          if echo "$KCRON_RESULT" | grep -q -i "error\|failed\|denied"; then
            echo "ERROR: kcron initialization appears to have failed"
            echo "Output: $KCRON_RESULT"
            exit 1
          else
            echo "SUCCESS: kcron initialization completed for SRF Debug UP build"
          fi

      - name: Verify Kerberos Setup
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Verifying Kerberos setup for SRF Debug UP build..."
          
          # Check if we have valid Kerberos tickets
          KLIST_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if command -v klist >/dev/null 2>&1; then
              echo 'Running klist to check tickets...'
              klist 2>&1 || echo 'No tickets found or klist failed'
            else
              echo 'klist command not available'
            fi
          ")
          
          echo "Kerberos ticket status:"
          echo "$KLIST_RESULT"
          
          # Check if ktab and kcron processes/files were created
          VERIFICATION_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'Checking for Kerberos-related files in home directory...'
            ls -la ~/ | grep -i krb || echo 'No obvious Kerberos files found'
            echo 'Checking for cron entries...'
            crontab -l 2>/dev/null | grep -i krb || echo 'No Kerberos cron entries found'
          ")
          
          echo "Verification results:"
          echo "$VERIFICATION_RESULT"

      - name: Display Kerberos setup summary
        run: |
          echo "## Kerberos Setup Summary for SRF Debug UP Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Account**: grp_srf_fit1_build (faceless account)" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: SRF Debug UP" >> $GITHUB_STEP_SUMMARY
          echo "- **ktab Path**: ${{ env.KTAB_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **kcron Path**: ${{ env.KCRON_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Steps Completed:" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ **Build Account Login**: Successfully switched to grp_srf_fit1_build" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ **Tool Verification**: Confirmed ktab and kcron tools exist" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ **Kerberos Ticket Init**: Executed \`ktab -i\` with FA password" >> $GITHUB_STEP_SUMMARY
          echo "4. ✅ **Kerberos Cron Init**: Executed \`kcron -i\` with auto-confirm (y)" >> $GITHUB_STEP_SUMMARY
          echo "5. ✅ **Verification**: Checked Kerberos setup status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Commands Executed:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.KTAB_PATH }} -i\` (with FA_PASSWORD)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.KCRON_PATH }} -i\` (with 'y' response to overwrite)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Notes:" >> $GITHUB_STEP_SUMMARY
          echo "- FA_PASSWORD retrieved securely from GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "- All operations performed under build account" >> $GITHUB_STEP_SUMMARY
          echo "- Passwords not exposed in logs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Kerberos setup completed successfully for SRF Debug UP build!" >> $GITHUB_STEP_SUMMARY

  patch-build:
    runs-on: [self-hosted, node16]
    needs: [prepare-config, kerberos-setup]
    if: ${{ needs.prepare-config.outputs.list_only == 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Switch to faceless account and verify
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Switching to faceless account for SRF Debug UP patch build..."
          CURRENT_USER=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build whoami)
          echo "Expected user: grp_srf_fit1_build"
          echo "Actual user: $CURRENT_USER"
          
          if [ "$CURRENT_USER" = "grp_srf_fit1_build" ]; then
            echo "SUCCESS: User switch to faceless account successful"
            echo "Running as: $CURRENT_USER"
          else
            echo "FAILURE: User switch failed"
            echo "Expected: grp_srf_fit1_build"
            echo "Got: $CURRENT_USER"
            exit 1
          fi

      - name: Verify build tools and config exist
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Verifying build tools and configuration for SRF Debug UP build..."
          
          # Clean version number for config file name
          NEW_CLEAN="${{ needs.prepare-config.outputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          CONFIG_FILE="${{ env.BUILD_BASE_PATH }}/config_${NEW_CLEAN}.ini"
          
          # Check Python
          PYTHON_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '${{ env.PYTHON_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$PYTHON_CHECK" == "EXISTS" ]]; then
            echo "PASS: Python found at: ${{ env.PYTHON_PATH }}"
          else
            echo "FAIL: Python not found at: ${{ env.PYTHON_PATH }}"
            exit 1
          fi
          
          # Check FXT tool
          FXT_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '${{ env.FXT_TOOL_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$FXT_CHECK" == "EXISTS" ]]; then
            echo "PASS: FXT tool found at: ${{ env.FXT_TOOL_PATH }}"
          else
            echo "FAIL: FXT tool not found at: ${{ env.FXT_TOOL_PATH }}"
            exit 1
          fi
          
          # Check expect
          EXPECT_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '${{ env.EXPECT_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$EXPECT_CHECK" == "EXISTS" ]]; then
            echo "PASS: expect found at: ${{ env.EXPECT_PATH }}"
          else
            echo "FAIL: expect not found at: ${{ env.EXPECT_PATH }}"
            exit 1
          fi
          
          # Check config file
          CONFIG_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -f '$CONFIG_FILE' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$CONFIG_CHECK" == "EXISTS" ]]; then
            echo "PASS: Config file found at: $CONFIG_FILE"
          else
            echo "FAIL: Config file not found at: $CONFIG_FILE"
            exit 1
          fi
          
          echo "All build prerequisites verified successfully for SRF Debug UP build"

      - name: Verify build directory access
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Verifying build directory access: ${{ env.BUILD_BASE_PATH }}"
          
          # Verify directory exists and is accessible
          DIR_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            if [[ -d '${{ env.BUILD_BASE_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")
          
          if [[ "$DIR_CHECK" == "EXISTS" ]]; then
            echo "PASS: Build directory exists and is accessible: ${{ env.BUILD_BASE_PATH }}"
          else
            echo "FAIL: Build directory not found or not accessible: ${{ env.BUILD_BASE_PATH }}"
            exit 1
          fi

      - name: Execute SRF Debug UP patch build with expect for CSS password
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
          CSS_PASSWORD: ${{ secrets.CSS_PASSWORD }}
        run: |
          echo "Starting SRF Debug UP patch build with expect for CSS password prompt..."
          
          NEW_CLEAN="${{ needs.prepare-config.outputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          CONFIG_FILE="config_${NEW_CLEAN}.ini"
          
          echo "SRF Debug UP Build configuration:"
          echo "  - Working Directory: ${{ env.BUILD_BASE_PATH }}"
          echo "  - Python Path: ${{ env.PYTHON_PATH }}"
          echo "  - FXT Tool Path: ${{ env.FXT_TOOL_PATH }}"
          echo "  - Expect Path: ${{ env.EXPECT_PATH }}"
          echo "  - Config File: $CONFIG_FILE"
          echo "  - Build Type: SRF Debug UP"
          echo "  - Milestone: ${{ needs.prepare-config.outputs.milestone }}"
          echo "  - Password Method: expect script with CSS_PASSWORD from secrets"
          echo ""
          
          BUILD_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            cd '${{ env.BUILD_BASE_PATH }}'
            echo 'Current directory: \$(pwd)'
            
            # Create expect script to handle CSS password prompt
            cat > build_with_expect.exp << 'EOF'
          #!${{ env.EXPECT_PATH }} -f
          set timeout 1800
          
          # Get CSS password from environment
          set css_password \$env(CSS_PASSWORD)
          
          # Start the build process
          spawn ${{ env.PYTHON_PATH }} ${{ env.FXT_TOOL_PATH }} --conf $CONFIG_FILE
          
          expect {
            \"Enter your CSS password:\" {
              send \"\$css_password\r\"
              exp_continue
            }
            \"Enter your CSS password: \" {
              send \"\$css_password\r\"
              exp_continue
            }
            -re \".*assword.*\" {
              send \"\$css_password\r\"
              exp_continue
            }
            eof {
              catch wait result
              exit [lindex \$result 3]
            }
            timeout {
              puts \"SRF Debug UP build timed out after 30 minutes\"
              exit 124
            }
          }
          EOF
            
            chmod +x build_with_expect.exp
            echo 'Starting SRF Debug UP build with expect script for CSS password prompt...'
            
            # Export CSS_PASSWORD for the expect script
            export CSS_PASSWORD='$CSS_PASSWORD'
            ./build_with_expect.exp 2>&1
            BUILD_EXIT=\$?
            
            # Clean up expect script
            rm -f build_with_expect.exp
            
            echo \"SRF Debug UP build process completed with exit code: \$BUILD_EXIT\"
            exit \$BUILD_EXIT
          ")
          
          BUILD_EXIT_CODE=$?
          
          echo "SRF Debug UP build execution output:"
          echo "$BUILD_RESULT"
          echo ""
          echo "SRF Debug UP build process exit code: $BUILD_EXIT_CODE"
          
          # Check for common error indicators in output
          if echo "$BUILD_RESULT" | grep -q -i "error\|failed\|exception\|traceback"; then
            echo ""
            echo "WARNING: SRF Debug UP build output contains potential error indicators"
            echo "Please review the build output above for any issues"
          fi
          
          # Check exit code
          if [[ $BUILD_EXIT_CODE -eq 0 ]]; then
            echo "SUCCESS: SRF Debug UP build command completed successfully (exit code: 0)"
          elif [[ $BUILD_EXIT_CODE -eq 124 ]]; then
            echo "TIMEOUT: SRF Debug UP build process timed out after 30 minutes"
            echo "This may indicate the build is taking longer than expected or is stuck"
            exit $BUILD_EXIT_CODE
          else
            echo "FAILURE: SRF Debug UP build command failed with exit code: $BUILD_EXIT_CODE"
            echo "Please review the build output above for error details"
            exit $BUILD_EXIT_CODE
          fi

      - name: Verify SRF Debug UP build results
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "Verifying SRF Debug UP build results..."
          
          # Clean version number
          NEW_CLEAN="${{ needs.prepare-config.outputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          
          # Check for common build output files/directories
          VERIFICATION_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            cd '${{ env.BUILD_BASE_PATH }}'
            echo 'Checking for SRF Debug UP build artifacts...'
            
            # Look for common build output patterns
            find . -name '*${NEW_CLEAN}*' -type f 2>/dev/null | head -10 || echo 'No version-specific files found'
            echo ''
            
            echo 'Recent files (last 30 minutes):'
            find . -type f -mmin -30 2>/dev/null | head -20 || echo 'No recent files found'
            echo ''
            
            echo 'Looking for SRF Debug UP patch files:'
            find . -name '*.patch' -o -name '*.bin' -o -name '*.ucode' 2>/dev/null | head -10 || echo 'No patch files found'
            echo ''
            
            echo 'Looking for debug-specific artifacts:'
            find . -name '*debug*' -o -name '*css-debug*' 2>/dev/null | head -10 || echo 'No debug-specific files found'
          ")
          
          echo "$VERIFICATION_RESULT"

      - name: Display SRF Debug UP build summary
        run: |
          # Clean version number
          NEW_CLEAN="${{ needs.prepare-config.outputs.new_version }}"
          NEW_CLEAN="${NEW_CLEAN#0x}"
          
          echo "## SRF Debug UP Patch Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: SRF Debug UP" >> $GITHUB_STEP_SUMMARY
          echo "- **Milestone**: ${{ needs.prepare-config.outputs.milestone }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.prepare-config.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Config File**: config_${NEW_CLEAN}.ini" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Directory**: ${{ env.BUILD_BASE_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Account**: grp_srf_fit1_build (faceless account)" >> $GITHUB_STEP_SUMMARY
          echo "- **Password Method**: expect script with CSS_PASSWORD from GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "- **Expect Path**: ${{ env.EXPECT_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SRF Debug UP Build Process:" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ **Tool Verification**: Confirmed Python, FXT tool, and expect availability" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ **Config Verification**: Confirmed SRF Debug UP config file exists and is accessible" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ **Directory Setup**: Verified build directory access" >> $GITHUB_STEP_SUMMARY
          echo "4. ✅ **Expect Script**: Created expect script to handle CSS password prompt" >> $GITHUB_STEP_SUMMARY
          echo "5. ✅ **Build Execution**: Executed FXT tool with automated password input from secrets" >> $GITHUB_STEP_SUMMARY
          echo "6. ✅ **Result Verification**: Checked for SRF Debug UP build artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SRF Debug UP Build Features:" >> $GITHUB_STEP_SUMMARY
          echo "- **Debug Mode**: css-debug signing enabled" >> $GITHUB_STEP_SUMMARY
          echo "- **Milestone Integration**: Built from milestone data" >> $GITHUB_STEP_SUMMARY
          echo "- **Binary Updates**: All milestone binary paths applied" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Management**: Proper baseline and new version handling" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Password Handling Method:" >> $GITHUB_STEP_SUMMARY
          echo "- **Method**: expect script with pattern matching" >> $GITHUB_STEP_SUMMARY
          echo "- **Patterns Handled**:" >> $GITHUB_STEP_SUMMARY
          echo "  - \`Enter your CSS password:\` (exact match)" >> $GITHUB_STEP_SUMMARY
          echo "  - \`Enter your CSS password: \` (with trailing space)" >> $GITHUB_STEP_SUMMARY
          echo "  - \`.*assword.*\` (regex pattern for any password prompt)" >> $GITHUB_STEP_SUMMARY
          echo "- **Password Source**: CSS_PASSWORD from GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "- **Timeout**: 30 minutes maximum build time (1800 seconds)" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: Password retrieved securely from secrets, not hardcoded" >> $GITHUB_STEP_SUMMARY
          echo "- **Benefits**: Handles interactive prompts reliably without exposing credentials" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Improvements:" >> $GITHUB_STEP_SUMMARY
          echo "- **No Hardcoded Passwords**: CSS password retrieved from GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment Variable**: Password passed securely via environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Script Cleanup**: Expect script removed after execution" >> $GITHUB_STEP_SUMMARY
          echo "- **No Log Exposure**: Password not visible in build logs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SRF Debug UP patch build process completed with secure password handling!" >> $GITHUB_STEP_SUMMARY
