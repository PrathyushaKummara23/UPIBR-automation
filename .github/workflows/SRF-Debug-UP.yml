name: Read Configuration File from Output Paths
on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Enter the filename to read (without .txt extension) or leave empty to list all files'
        required: false
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  read-config-file:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: List available files and validate input
      run: |
        echo "=== AVAILABLE FILES IN OUTPUT_PATHS ==="
        if [ ! -d "output_paths" ]; then
          echo "❌ ERROR: output_paths directory does not exist"
          echo "Please run the 'Fetch Binary Files from Entry Criteria' workflow first to create configuration files."
          exit 1
        fi
        
        # Find all .txt files
        TXT_FILES=($(find output_paths -name "*.txt" -type f -exec basename {} \; | sort))
        
        if [ ${#TXT_FILES[@]} -eq 0 ]; then
          echo "❌ ERROR: No .txt files found in output_paths directory"
          echo "Please run the 'Fetch Binary Files from Entry Criteria' workflow first to create configuration files."
          exit 1
        fi
        
        echo "📁 Available configuration files:"
        for i in "${!TXT_FILES[@]}"; do
          echo "   $((i+1)). ${TXT_FILES[$i]}"
        done
        echo ""
        
        # Store available files for later use
        printf '%s\n' "${TXT_FILES[@]}" > available_files.txt
        echo "TOTAL_FILES=${#TXT_FILES[@]}" >> $GITHUB_ENV
        
        # Process user input
        USER_INPUT="${{ github.event.inputs.filename }}"
        
        if [ -z "$USER_INPUT" ]; then
          echo "ℹ️  No filename provided. Listing files only."
          echo "TARGET_FILE=" >> $GITHUB_ENV
          echo "LIST_ONLY=true" >> $GITHUB_ENV
        else
          # Add .txt extension if not provided
          if [[ "$USER_INPUT" != *.txt ]]; then
            TARGET_FILE="${USER_INPUT}.txt"
          else
            TARGET_FILE="$USER_INPUT"
          fi
          
          # Check if file exists
          if [ -f "output_paths/$TARGET_FILE" ]; then
            echo "✅ Found file: $TARGET_FILE"
            echo "TARGET_FILE=$TARGET_FILE" >> $GITHUB_ENV
            echo "LIST_ONLY=false" >> $GITHUB_ENV
          else
            echo "❌ ERROR: File '$TARGET_FILE' not found"
            echo ""
            echo "Available files are:"
            for file in "${TXT_FILES[@]}"; do
              echo "   - $file"
            done
            echo ""
            echo "💡 Tip: Enter just the milestone name (e.g., 'UPLR0' for 'Milestone_UPLR0.txt')"
            exit 1
          fi
        fi
        echo "=== END FILE VALIDATION ==="

    - name: Read and display configuration file
      if: env.LIST_ONLY == 'false'
      run: |
        echo "=== READING CONFIGURATION FILE ==="
        TARGET_FILE="${{ env.TARGET_FILE }}"
        FILE_PATH="output_paths/$TARGET_FILE"
        
        echo "📖 Reading file: $TARGET_FILE"
        echo "📍 Full path: $(realpath "$FILE_PATH")"
        echo "📊 File size: $(stat -c%s "$FILE_PATH") bytes"
        echo "🕒 Last modified: $(stat -c%y "$FILE_PATH")"
        echo ""
        echo "=== FILE CONTENTS START ==="
        cat "$FILE_PATH"
        echo "=== FILE CONTENTS END ==="
        echo ""
        echo "📈 Statistics:"
        echo "   - Lines: $(wc -l < "$FILE_PATH")"
        echo "   - Words: $(wc -w < "$FILE_PATH")"
        echo "   - Characters: $(wc -c < "$FILE_PATH")"
        echo "=== END FILE READING ==="

    - name: Parse configuration values
      if: env.LIST_ONLY == 'false'
      run: |
        echo "=== PARSING CONFIGURATION VALUES ==="
        TARGET_FILE="${{ env.TARGET_FILE }}"
        FILE_PATH="output_paths/$TARGET_FILE"
        
        echo "🔍 Extracting key-value pairs:"
        echo ""
        
        while IFS='=' read -r key value; do
          if [ -n "$key" ] && [ -n "$value" ]; then
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            echo "   📋 $key: $value"
          fi
        done < "$FILE_PATH"
        echo "=== END PARSING ==="

    - name: Display summary
      run: |
        echo "=== WORKFLOW SUMMARY ==="
        echo "🎯 User input: '${{ github.event.inputs.filename }}'"
        echo "📁 Total available files: ${{ env.TOTAL_FILES }}"
        
        if [ "${{ env.LIST_ONLY }}" == "true" ]; then
          echo "📋 Mode: List files only"
          echo ""
          echo "Available configuration files:"
          cat available_files.txt | sed 's/^/   ✓ /'
          echo ""
          echo "💡 To read a file, run this workflow again and enter the filename"
          echo "   Example inputs:"
          echo "   - 'UPLR0' (will read Milestone_UPLR0.txt)"
          echo "   - 'Milestone_UPLR0.txt' (full filename)"
        else
          echo "📖 Mode: File reading"
          echo "✅ Successfully read: ${{ env.TARGET_FILE }}"
        fi
        echo "=== END SUMMARY ==="
