name: Experimental Debug Patch Build

on:
  workflow_dispatch:
    inputs:
      baseline_version:
        description: 'Baseline version (e.g., 830003A3)'
        required: true
        type: string
      ocode_path:
        description: 'OCODE path (e.g., /nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/OOBMSM/main/26ww7.3a/OCODE_SRF_C0_2.8.1.39_patchlet_enc_dbug.bin)'
        required: true
        type: string
      requester:
        description: 'Requester name'
        required: true
        type: string
      description:
        description: 'Patch description'
        required: false
        default: 'SRF Experiment Debug Unified Patch'
        type: string
      additional_changes:
        description: 'Additional code changes (JSON format: {"icode": "path", "pcode-io": "path"})'
        required: false
        type: string
      enable_notifications:
        description: 'Enable email notifications'
        required: false
        default: true
        type: boolean

env:
  BUILD_BASE_PATH: /nfs/site/disks/dcsg_0729/users/pkummara
  TOOLS_PATH: /nfs/site/disks/dcsg_0729/fxt-tools_releases/26ww07b/MUPPT_ATOM
  PATCHES_BASE_PATH: /nfs/site/disks/dcsg_0729/patches/SRF/C0
  
jobs:
  validate-inputs:
    runs-on: [self-hosted, node16]
    outputs:
      exp_version: ${{ steps.generate-version.outputs.exp_version }}
      config_file: ${{ steps.generate-version.outputs.config_file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate baseline version
        run: |
          if [[ ! "${{ github.event.inputs.baseline_version }}" =~ ^[0-9A-F]{8}$ ]]; then
            echo "Error: Invalid baseline version format. Expected 8 hex characters."
            exit 1
          fi

      - name: Validate OCODE path exists
        run: |
          if [[ ! -f "${{ github.event.inputs.ocode_path }}" ]]; then
            echo "Error: OCODE file does not exist: ${{ github.event.inputs.ocode_path }}"
            exit 1
          fi

      - name: Generate experimental version
        id: generate-version
        run: |
          python3 scripts/version_manager.py \
            --baseline "${{ github.event.inputs.baseline_version }}" \
            --output-version-var exp_version \
            --output-config-var config_file

      - name: Notify build start
        if: ${{ github.event.inputs.enable_notifications == 'true' }}
        uses: ./.github/actions/email-notification
        with:
          from_email: ${{ secrets.FROM_EMAIL }}
          to_email: ${{ secrets.NOTIFICATION_EMAIL }}
          subject: "🚀 Experimental Patch Build Started - ${{ steps.generate-version.outputs.exp_version }}"
          message: |
            <h3>Build Started Successfully</h3>
            <table border="1" style="border-collapse: collapse; width: 100%;">
            <tr><td><strong>Requester:</strong></td><td>${{ github.event.inputs.requester }}</td></tr>
            <tr><td><strong>Baseline Version:</strong></td><td>${{ github.event.inputs.baseline_version }}</td></tr>
            <tr><td><strong>Experimental Version:</strong></td><td>${{ steps.generate-version.outputs.exp_version }}</td></tr>
            <tr><td><strong>OCODE Path:</strong></td><td>${{ github.event.inputs.ocode_path }}</td></tr>
            <tr><td><strong>Description:</strong></td><td>${{ github.event.inputs.description }}</td></tr>
            </table>
            <p>The build process has started. You will receive notifications when manual intervention is required.</p>

  prepare-config:
    needs: validate-inputs
    runs-on: [self-hosted, node16]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create build directory
        run: |
          mkdir -p ${{ env.BUILD_BASE_PATH }}
          cd ${{ env.BUILD_BASE_PATH }}

      - name: Copy baseline config
        run: |
          sudo cp "${{ env.PATCHES_BASE_PATH }}/build/${{ github.event.inputs.baseline_version }}/release/config_${{ github.event.inputs.baseline_version }}.ini" "${{ env.BUILD_BASE_PATH }}/"

      - name: Generate experimental config
        run: |
          python3 scripts/config_generator.py \
            --baseline-config "${{ env.BUILD_BASE_PATH }}/config_${{ github.event.inputs.baseline_version }}.ini" \
            --exp-version "${{ needs.validate-inputs.outputs.exp_version }}" \
            --baseline-version "${{ github.event.inputs.baseline_version }}" \
            --ocode-path "${{ github.event.inputs.ocode_path }}" \
            --build-path "${{ env.BUILD_BASE_PATH }}" \
            --description "${{ github.event.inputs.description }}" \
            --additional-changes '${{ github.event.inputs.additional_changes }}' \
            --output "${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.config_file }}"

      - name: Validate all code paths exist
        run: |
          echo "${{ secrets.BUILD_PASSWORD }}" | sudo -S su grp_srf_fit1_build -c "python3 scripts/patch_builder.py --validate-only --config '${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.config_file }}'"

  build-patch:
    needs: [validate-inputs, prepare-config]
    runs-on: [self-hosted, node16]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Start patch build
        id: build
        run: |
          cd ${{ env.BUILD_BASE_PATH }}
          echo "${{ secrets.BUILD_PASSWORD }}" | sudo -S su grp_srf_fit1_build -c "python3 scripts/patch_builder.py \
            --config '${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.config_file }}' \
            --tools-path '${{ env.TOOLS_PATH }}' \
            --exp-version '${{ needs.validate-inputs.outputs.exp_version }}'"

      - name: Notify SOC signing required
        if: ${{ github.event.inputs.enable_notifications == 'true' }}
        uses: ./.github/actions/email-notification
        with:
          from_email: ${{ secrets.FROM_EMAIL }}
          to_email: ${{ secrets.NOTIFICATION_EMAIL }}
          subject: "🔐 SOC Signing Required - ${{ needs.validate-inputs.outputs.exp_version }}"
          message: |
            <h3>Manual SOC Signing Required</h3>
            <p><strong>Experimental patch:</strong> ${{ needs.validate-inputs.outputs.exp_version }}</p>
            <p><strong>Requester:</strong> ${{ github.event.inputs.requester }}</p>
            
            <h4>SOC Signing Instructions:</h4>
            <ol>
            <li>Open CSS workflow tool in Windows</li>
            <li>Select <strong>"Debug Sign a module"</strong> option</li>
            <li>Select CSS project: <strong>SOCMANIFESTGNR1</strong></li>
            <li>Browse to: <code>${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/soc_${{ needs.validate-inputs.outputs.exp_version }}/soc_patch.bin</code></li>
            <li>Complete the signing process</li>
            <li>Run: <code>touch /tmp/soc_signing_completed_${{ needs.validate-inputs.outputs.exp_version }}</code></li>
            </ol>
            
            <p><em>The build will automatically continue once you complete the signing and create the completion file.</em></p>

      - name: Wait for manual SOC signing
        uses: ./.github/actions/wait-for-manual-signing
        with:
          signing_type: "SOC"
          build_path: "${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}"
          timeout_minutes: 30

      - name: Continue build after SOC signing
        run: |
          cd ${{ env.BUILD_BASE_PATH }}
          echo "${{ secrets.BUILD_PASSWORD }}" | sudo -S su grp_srf_fit1_build -c "echo 'y' | python3 scripts/patch_builder.py \
            --resume-soc \
            --config '${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.config_file }}' \
            --tools-path '${{ env.TOOLS_PATH }}'"

      - name: Notify FIT1 signing required
        if: ${{ github.event.inputs.enable_notifications == 'true' }}
        uses: ./.github/actions/email-notification
        with:
          from_email: ${{ secrets.FROM_EMAIL }}
          to_email: ${{ secrets.NOTIFICATION_EMAIL }}
          subject: "🔐 FIT1 Signing Required - ${{ needs.validate-inputs.outputs.exp_version }}"
          message: |
            <h3>Manual FIT1 Signing Required</h3>
            <p><strong>Experimental patch:</strong> ${{ needs.validate-inputs.outputs.exp_version }}</p>
            <p><strong>Requester:</strong> ${{ github.event.inputs.requester }}</p>
            
            <h4>FIT1 Signing Instructions:</h4>
            <ol>
            <li>Encrypt emmodule with project <strong>'SRFMCUPQCRSA'</strong></li>
            <li>Debug/Release dual sign with:
              <ul>
              <li>RSA Project: <strong>SRFMCUPQCRSA</strong></li>
              <li>XMSS Project: <strong>SRFMCUPQCXMSS</strong></li>
              </ul>
            </li>
            <li>Complete the signing process</li>
            <li>Run: <code>touch /tmp/fit1_signing_completed_${{ needs.validate-inputs.outputs.exp_version }}</code></li>
            </ol>
            
            <p><em>The build will automatically continue once you complete the signing and create the completion file.</em></p>

      - name: Wait for manual FIT1 signing
        uses: ./.github/actions/wait-for-manual-signing
        with:
          signing_type: "FIT1"
          build_path: "${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}"
          timeout_minutes: 30

      - name: Complete build after FIT1 signing
        run: |
          cd ${{ env.BUILD_BASE_PATH }}
          echo "${{ secrets.BUILD_PASSWORD }}" | sudo -S su grp_srf_fit1_build -c "echo 'y' | python3 scripts/patch_builder.py \
            --resume-fit1 \
            --config '${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.config_file }}' \
            --tools-path '${{ env.TOOLS_PATH }}'"

  validate-output:
    needs: [validate-inputs, build-patch]
    runs-on: [self-hosted, node16]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate build output
        run: |
          BUILD_DIR="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}"
          
          if [[ ! -d "$BUILD_DIR/soc_${{ needs.validate-inputs.outputs.exp_version }}" ]]; then
            echo "Error: SOC directory not found"
            exit 1
          fi
          
          if [[ ! -d "$BUILD_DIR/fit1_${{ needs.validate-inputs.outputs.exp_version }}" ]]; then
            echo "Error: FIT1 directory not found"
            exit 1
          fi
          
          if [[ ! -d "$BUILD_DIR/release" ]]; then
            echo "Error: Release directory not found"
            exit 1
          fi
          
          echo "Build validation successful!"

      - name: Generate build summary
        run: |
          BUILD_DIR="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}"
          
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Experimental Version**: ${{ needs.validate-inputs.outputs.exp_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Baseline Version**: ${{ github.event.inputs.baseline_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Requester**: ${{ github.event.inputs.requester }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Path**: $BUILD_DIR" >> $GITHUB_STEP_SUMMARY
          echo "- **OCODE Used**: ${{ github.event.inputs.ocode_path }}" >> $GITHUB_STEP_SUMMARY
          
          echo "## Output Files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -la "$BUILD_DIR/release/" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: experimental-patch-${{ needs.validate-inputs.outputs.exp_version }}
          path: |
            ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/release/
            ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/soc_${{ needs.validate-inputs.outputs.exp_version }}/
            ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/fit1_${{ needs.validate-inputs.outputs.exp_version }}/
          retention-days: 30

      - name: Create build archive
        run: |
          BUILD_DIR="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}"
          ARCHIVE_NAME="experimental-patch-${{ needs.validate-inputs.outputs.exp_version }}-$(date +%Y%m%d-%H%M%S).tar.gz"
          
          cd "${{ env.BUILD_BASE_PATH }}"
          tar -czf "$ARCHIVE_NAME" "${{ needs.validate-inputs.outputs.exp_version }}/"
          
          echo "Archive created: ${{ env.BUILD_BASE_PATH }}/$ARCHIVE_NAME"
          echo "ARCHIVE_PATH=${{ env.BUILD_BASE_PATH }}/$ARCHIVE_NAME" >> $GITHUB_ENV

  notify-completion:
    needs: [validate-inputs, validate-output]
    runs-on: [self-hosted, node16]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Notify build completion - Success
        if: ${{ needs.validate-output.result == 'success' && github.event.inputs.enable_notifications == 'true' }}
        uses: ./.github/actions/email-notification
        with:
          from_email: ${{ secrets.FROM_EMAIL }}
          to_email: ${{ secrets.NOTIFICATION_EMAIL }}
          subject: "✅ Experimental Patch Build Completed Successfully - ${{ needs.validate-inputs.outputs.exp_version }}"
          message: |
            <h3>Build Completed Successfully! 🎉</h3>
            
            <table border="1" style="border-collapse: collapse; width: 100%;">
            <tr><td><strong>Experimental Version:</strong></td><td>${{ needs.validate-inputs.outputs.exp_version }}</td></tr>
            <tr><td><strong>Baseline Version:</strong></td><td>${{ github.event.inputs.baseline_version }}</td></tr>
            <tr><td><strong>Requester:</strong></td><td>${{ github.event.inputs.requester }}</td></tr>
            <tr><td><strong>Build Path:</strong></td><td>${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/</td></tr>
            <tr><td><strong>OCODE Used:</strong></td><td>${{ github.event.inputs.ocode_path }}</td></tr>
            </table>
            
            <h4>Artifacts Available:</h4>
            <ul>
            <li>Release files available in GitHub Actions artifacts</li>
            <li>Build archive created on build server</li>
            </ul>
            
            <h4>Next Steps:</h4>
            <ol>
            <li>Download artifacts from GitHub Actions</li>
            <li>Test the experimental patch</li>
            <li>Provide feedback to the build team</li>
            </ol>

      - name: Notify build completion - Failure
        if: ${{ needs.validate-output.result != 'success' && github.event.inputs.enable_notifications == 'true' }}
        uses: ./.github/actions/email-notification
        with:
          from_email: ${{ secrets.FROM_EMAIL }}
          to_email: ${{ secrets.NOTIFICATION_EMAIL }}
          subject: "❌ Experimental Patch Build Failed - ${{ needs.validate-inputs.outputs.exp_version }}"
          message: |
            <h3>Build Failed ❌</h3>
            
            <table border="1" style="border-collapse: collapse; width: 100%;">
            <tr><td><strong>Experimental Version:</strong></td><td>${{ needs.validate-inputs.outputs.exp_version }}</td></tr>
            <tr><td><strong>Baseline Version:</strong></td><td>${{ github.event.inputs.baseline_version }}</td></tr>
            <tr><td><strong>Requester:</strong></td><td>${{ github.event.inputs.requester }}</td></tr>
            <tr><td><strong>Failure Stage:</strong></td><td>${{ needs.validate-output.result }}</td></tr>
            </table>
            
            <h4>Action Required:</h4>
            <ul>
            <li>Check the GitHub Actions logs for detailed error information</li>
            <li>Contact the build team if assistance is needed</li>
            <li>Retry the build after resolving issues</li>
            </ul>

      - name: Final status
        run: |
          if [[ "${{ needs.validate-output.result }}" == "success" ]]; then
            echo "✅ Experimental patch build completed successfully!"
            echo "Build location: ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}"
            echo "Artifacts uploaded to GitHub Actions"
          else
            echo "❌ Experimental patch build failed!"
            echo "Check the logs for more details"
            exit 1
          fi
