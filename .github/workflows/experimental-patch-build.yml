name: Experiment Debug Patch Build

on:
  workflow_dispatch:
    inputs:
      baseline_version:
        description: 'Baseline version (e.g., 830003A3)'
        required: true
        type: string
      ocode_path:
        description: 'OCODE path (e.g., /nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/OOBMSM/main/26ww7.3a/OCODE_SRF_C0_2.8.1.39_patchlet_enc_dbug.bin)'
        required: true
        type: string
      requester:
        description: 'Requester name'
        required: true
        type: string
      description:
        description: 'Patch description'
        required: false
        default: 'SRF Experiment Debug Unified Patch'
        type: string
      additional_changes:
        description: 'Additional code changes (JSON format: {"icode": "path", "pcode-io": "path"})'
        required: false
        type: string
      enable_notifications:
        description: 'Enable email notifications'
        required: false
        default: true
        type: boolean

env:
  BUILD_BASE_PATH: /nfs/site/disks/dcsg_0729/users/pkummara
  TOOLS_PATH: /nfs/site/disks/dcsg_0729/fxt-tools_releases/26ww07b/MUPPT_ATOM
  PATCHES_BASE_PATH: /nfs/site/disks/dcsg_0729/patches/SRF/C0
  PYTHON_PATH: /usr/intel/bin/python3.7.4
  
jobs:
  validate-inputs:
    runs-on: [self-hosted, node16]
    outputs:
      exp_version: ${{ steps.generate-version.outputs.exp_version }}
      config_file: ${{ steps.generate-version.outputs.config_file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate baseline version
        run: |
          if [[ ! "${{ github.event.inputs.baseline_version }}" =~ ^[0-9A-F]{8}$ ]]; then
            echo "Error: Invalid baseline version format. Expected 8 hex characters."
            exit 1
          fi
          
      - name: Validate OCODE path exists
        run: |
          if [[ ! -f "${{ github.event.inputs.ocode_path }}" ]]; then
            echo "Error: OCODE file does not exist: ${{ github.event.inputs.ocode_path }}"
            exit 1
          fi
          
      - name: Generate experimental version
        id: generate-version
        run: |
          # Generate experimental version (F + baseline without first digit)
          BASELINE="${{ github.event.inputs.baseline_version }}"
          EXP_VERSION="F${BASELINE:1}"
          CONFIG_FILE="config_${EXP_VERSION}.ini"
          
          echo "exp_version=$EXP_VERSION" >> $GITHUB_OUTPUT
          echo "config_file=$CONFIG_FILE" >> $GITHUB_OUTPUT
          
          echo "Generated experimental version: $EXP_VERSION"
          echo "Config file: $CONFIG_FILE"
            
      - name: Notify build start
        if: ${{ github.event.inputs.enable_notifications == 'true' }}
        run: |
          echo "📧 Build start notification would be sent here"
          echo "Experimental Version: ${{ steps.generate-version.outputs.exp_version }}"
          echo "Requester: ${{ github.event.inputs.requester }}"

  prepare-config:
    needs: validate-inputs
    runs-on: [self-hosted, node16]
    outputs:
      validation_warnings: ${{ steps.validate-paths.outputs.warnings }}
      validation_status: ${{ steps.validate-paths.outputs.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create build directory
        run: |
          mkdir -p ${{ env.BUILD_BASE_PATH }}
          cd ${{ env.BUILD_BASE_PATH }}
          
      - name: Copy baseline config
        run: |
          BASELINE_CONFIG="${{ env.PATCHES_BASE_PATH }}/build/build_area_0x${{ github.event.inputs.baseline_version }}/release/config_${{ github.event.inputs.baseline_version }}.ini"
          if [[ -f "$BASELINE_CONFIG" ]]; then
            cp "$BASELINE_CONFIG" "${{ env.BUILD_BASE_PATH }}/"
            echo "✅ Copied baseline config from: $BASELINE_CONFIG"
          else
            echo "⚠️ Warning: Baseline config not found at: $BASELINE_CONFIG"
            echo "Will create config from template"
          fi
          
      - name: Generate experimental config
        run: |
          BASELINE_CONFIG="${{ env.BUILD_BASE_PATH }}/config_${{ github.event.inputs.baseline_version }}.ini"
          EXP_CONFIG="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.config_file }}"
          
          if [[ -f "$BASELINE_CONFIG" ]]; then
            # Copy and modify baseline config
            cp "$BASELINE_CONFIG" "$EXP_CONFIG"
            
            # Update experimental version
            sed -i "s/patch_version = 0x${{ github.event.inputs.baseline_version }}/patch_version = 0x${{ needs.validate-inputs.outputs.exp_version }}/g" "$EXP_CONFIG"
            
            # Update OCODE path
            sed -i "s|oobmsm = .*|oobmsm = ${{ github.event.inputs.ocode_path }}|g" "$EXP_CONFIG"
            
            echo "✅ Generated experimental config: $EXP_CONFIG"
          else
            # Create basic config template
            cat > "$EXP_CONFIG" << EOF
          [DEFAULT]
          patch_version = 0x${{ needs.validate-inputs.outputs.exp_version }}
          project_name = SRF
          se_svn = 6
          fit1_only = no
          
          [SOC]
          soc_sign = manual
          icode = /nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_iCode/main/0x24164200/icode_enc_dbug.bin
          oobmsm = ${{ github.event.inputs.ocode_path }}
          pcode-io = /nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_Pcode/main/srf-c0_25ww35_UPLR2_0x00001124/gnr_io_c0/pcode-io_enc_dbug.bin
          pcode-c = /nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_Pcode/main/srf-c0_25ww35_UPLR2_0x00001124/gnr_atom_b0/pcode-c_enc_dbug.bin
          s3m = /nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/S3M/main/26ww02/26ww02.5_T6087_s3m_fw_SESVN0_SVN1_REVID2.0.0.00169_C0/S3M_1_0_2.0.0.00169_enc_dbug.IP_0100.bin
          
          [FIT1]
          fit1_sign = manual
          ucode = /nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/uCode/main/m_01_a06f3_e000102a
          xucode = /nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_XuCode/main/xucode-cmt-c0--0.22.00.235/patch.xusection.inc
          mcheck = /nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_Mcheck/main/mcheck_srf_c0_0.20.10.948-full_mcheck_srf-b0-product/MCHECK_SECTION.inc
          EOF
            echo "✅ Created experimental config from template: $EXP_CONFIG"
          fi
          
      - name: Validate config file exists
        run: |
          CONFIG_FILE="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.config_file }}"
          if [[ ! -f "$CONFIG_FILE" ]]; then
            echo "Error: Config file does not exist: $CONFIG_FILE"
            exit 1
          fi
          echo "✅ Config file exists: $CONFIG_FILE"
          echo "Config file size: $(stat -c%s "$CONFIG_FILE") bytes"
          echo "Config file contents:"
          cat "$CONFIG_FILE"
          
      - name: Validate all code paths exist (using faceless account)
        id: validate-paths
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          CONFIG_FILE="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.config_file }}"
          VALIDATION_WARNINGS=""
          VALIDATION_STATUS="success"
          
          echo "🔍 Starting path validation using faceless account..."
          echo "🐍 Using Python: ${{ env.PYTHON_PATH }}"
          echo "📋 Config file: $CONFIG_FILE"
          
          # Run validation using faceless account
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'Running validation as: \$(whoami)'
            cd ${{ env.BUILD_BASE_PATH }}
            
            # Simple path validation
            VALIDATION_FAILED=false
            
            # Check OCODE path
            if [[ ! -f '${{ github.event.inputs.ocode_path }}' ]]; then
              echo 'Error: OCODE path does not exist: ${{ github.event.inputs.ocode_path }}'
              VALIDATION_FAILED=true
            fi
            
            # Check other common paths from config
            while IFS= read -r line; do
              if [[ \$line =~ ^[a-zA-Z_-]+[[:space:]]*=[[:space:]]*(/[^[:space:]]+) ]]; then
                path=\${BASH_REMATCH[1]}
                if [[ ! -f \"\$path\" && ! -d \"\$path\" ]]; then
                  echo \"Warning: Path does not exist: \$path\"
                  VALIDATION_FAILED=true
                fi
              fi
            done < '$CONFIG_FILE'
            
            if [[ \$VALIDATION_FAILED == true ]]; then
              echo 'failed_with_warnings' > validation_status.tmp
              echo 'Some paths in config do not exist' > validation_warnings.tmp
            else
              echo 'success' > validation_status.tmp
            fi
          "
          
          # Read results
          if [[ -f "${{ env.BUILD_BASE_PATH }}/validation_status.tmp" ]]; then
            VALIDATION_STATUS=$(cat "${{ env.BUILD_BASE_PATH }}/validation_status.tmp")
          fi
          
          if [[ -f "${{ env.BUILD_BASE_PATH }}/validation_warnings.tmp" ]]; then
            VALIDATION_WARNINGS=$(cat "${{ env.BUILD_BASE_PATH }}/validation_warnings.tmp")
          fi
          
          # Set outputs for next jobs
          echo "warnings=$VALIDATION_WARNINGS" >> $GITHUB_OUTPUT
          echo "status=$VALIDATION_STATUS" >> $GITHUB_OUTPUT
          
          # Add to step summary
          echo "## Path Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: $VALIDATION_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- **Python Version**: Python 3.7.4" >> $GITHUB_STEP_SUMMARY
          echo "- **Tool**: Intel FXT (via validation script)" >> $GITHUB_STEP_SUMMARY
          echo "- **Running as**: grp_srf_fit1_build (faceless account)" >> $GITHUB_STEP_SUMMARY
          if [[ -n "$VALIDATION_WARNINGS" ]]; then
            echo "- **Warnings**: $VALIDATION_WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Config File**: $CONFIG_FILE" >> $GITHUB_STEP_SUMMARY
          
          echo "✅ Validation step completed - proceeding to build"

  build-patch:
    needs: [validate-inputs, prepare-config]
    runs-on: [self-hosted, node16]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Display validation warnings
        if: ${{ needs.prepare-config.outputs.validation_status == 'failed_with_warnings' }}
        run: |
          echo "⚠️  ⚠️  ⚠️  VALIDATION WARNINGS DETECTED ⚠️  ⚠️  ⚠️"
          echo ""
          echo "The following validation issues were detected:"
          echo "${{ needs.prepare-config.outputs.validation_warnings }}"
          echo ""
          echo "🚀 Proceeding with build using faceless account - these may be resolved during the build process"
          echo "📧 Build notifications will include these warnings"
          echo ""

      - name: Start patch build until SOC signing (using faceless account)
        id: build-to-soc
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "🔨 Starting patch build until SOC signing using faceless account..."
          echo "📁 Working directory: ${{ env.BUILD_BASE_PATH }}"
          echo "🐍 Using Python: ${{ env.PYTHON_PATH }}"
          echo "🛠️ Using Intel FXT tool: ${{ env.TOOLS_PATH }}/fxtMuppt.py"
          echo "📋 Config file: ${{ needs.validate-inputs.outputs.config_file }}"
          echo ""
          
          # Run the Intel FXT build tool using faceless account
          # Let it run until it reaches the SOC signing prompt (don't use timeout)
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'Build running as: \$(whoami)'
            echo 'Python version: \$(${{ env.PYTHON_PATH }} --version)'
            cd ${{ env.BUILD_BASE_PATH }}
            
            # Start the build process in background and capture its PID
            nohup ${{ env.PYTHON_PATH }} ${{ env.TOOLS_PATH }}/fxtMuppt.py --conf ${{ needs.validate-inputs.outputs.config_file }} > build_output.log 2>&1 &
            BUILD_PID=\$!
            echo \"Build started with PID: \$BUILD_PID\"
            echo \$BUILD_PID > build_pid.tmp
            
            # Wait for the signing prompt to appear
            echo 'Waiting for SOC signing prompt to appear...'
            for i in {1..60}; do  # Wait up to 10 minutes for prompt
              if grep -q 'Press \"y\" when SoC Patch signing is completed manually' build_output.log 2>/dev/null; then
                echo 'SOC signing prompt detected!'
                break
              fi
              
              if ! kill -0 \$BUILD_PID 2>/dev/null; then
                echo 'Build process ended unexpectedly'
                cat build_output.log
                exit 1
              fi
              
              echo \"Waiting for signing prompt... (\$i/60)\"
              sleep 10
            done
            
            if ! grep -q 'Press \"y\" when SoC Patch signing is completed manually' build_output.log 2>/dev/null; then
              echo 'Timeout waiting for SOC signing prompt'
              kill \$BUILD_PID 2>/dev/null || true
              cat build_output.log
              exit 1
            fi
          "

      - name: Notify SOC signing required
        if: ${{ github.event.inputs.enable_notifications == 'true' }}
        run: |
          echo "📧 SOC CSS Signing Required Notification"
          echo "========================================"
          echo "🔐 Manual SOC CSS Signing Required"
          echo ""
          echo "Experimental patch: ${{ needs.validate-inputs.outputs.exp_version }}"
          echo "Requester: ${{ github.event.inputs.requester }}"
          echo "Build Tool: Intel FXT (fxtMuppt.py) - Running as faceless account"
          echo "Python Version: Python 3.7.4"
          echo ""
          echo "🎯 CSS Signing Details:"
          echo "CSS Project: SOCMANIFESTGNR1"
          echo "File to Sign: ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/soc_${{ needs.validate-inputs.outputs.exp_version }}/soc_patch.bin"
          echo "Expected Output: soc_patch_signed.bin"
          echo "Build Directory: ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/soc_${{ needs.validate-inputs.outputs.exp_version }}/"
          echo ""
          echo "📋 SOC CSS Signing Instructions:"
          echo "1. Open CSS workflow tool in Windows"
          echo "2. Select 'Debug Sign a module' option"
          echo "3. Select CSS project: SOCMANIFESTGNR1"
          echo "4. Browse to file: ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/soc_${{ needs.validate-inputs.outputs.exp_version }}/soc_patch.bin"
          echo "5. Complete the signing process to generate soc_patch_signed.bin"
          echo ""
          echo "⏳ The build is waiting for you to complete the signing. Once done, the system will automatically detect the signed file and continue."

      - name: Wait for SOC signing completion with retry
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "⏳ Waiting for SOC CSS signing completion..."
          
          SOC_DIR="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/soc_${{ needs.validate-inputs.outputs.exp_version }}"
          SIGNED_FILE="$SOC_DIR/soc_patch_signed.bin"
          ORIGINAL_FILE="$SOC_DIR/soc_patch.bin"
          
          # Function to wait for signing
          wait_for_signing() {
            local timeout_minutes=$1
            local check_interval=3  # 3 minutes
            local max_checks=$((timeout_minutes / check_interval))
            
            echo "🔍 Checking for signed file: $SIGNED_FILE"
            echo "📁 Original file: $ORIGINAL_FILE"
            
            for ((i=1; i<=max_checks; i++)); do
              if [[ -f "$SIGNED_FILE" ]]; then
                echo "✅ SOC signing completed! Found: $SIGNED_FILE"
                echo "📊 File size: $(stat -c%s "$SIGNED_FILE") bytes"
                return 0
              fi
              
              echo "⏳ Check $i/$max_checks: Waiting for CSS signing... ($(($i * check_interval))/$timeout_minutes minutes elapsed)"
              
              if [[ -f "$ORIGINAL_FILE" ]]; then
                echo "📋 Original file exists: $(stat -c%s "$ORIGINAL_FILE") bytes"
              else
                echo "⚠️  Original file missing: $ORIGINAL_FILE"
              fi
              
              # Check if build process is still running
              (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
                cd ${{ env.BUILD_BASE_PATH }}
                if [[ -f build_pid.tmp ]]; then
                  BUILD_PID=\$(cat build_pid.tmp)
                  if kill -0 \$BUILD_PID 2>/dev/null; then
                    echo '🔄 Build process still running (PID: \$BUILD_PID)'
                  else
                    echo '⚠️  Build process no longer running'
                  fi
                fi
              "
              
              sleep $((check_interval * 60))
            done
            
            return 1
          }
          
          # First attempt: 30 minutes
          if wait_for_signing 30; then
            echo "🎉 SOC signing completed successfully!"
          else
            echo "⏰ First timeout reached (30 minutes). Sending reminder..."
            echo "📧 REMINDER: SOC CSS Signing Still Required - ${{ needs.validate-inputs.outputs.exp_version }}"
            echo "⚠️ The build has been waiting for 30 minutes. Please complete CSS signing ASAP."
            
            # Second attempt: 10 more minutes
            echo "⏳ Waiting additional 10 minutes for SOC signing..."
            if wait_for_signing 10; then
              echo "🎉 SOC signing completed after reminder!"
            else
              echo "❌ SOC signing timeout: No signed file found after 40 minutes total"
              echo "🔍 Final check - files in SOC directory:"
              ls -la "$SOC_DIR/" || echo "Directory not accessible"
              
              # Kill the build process if still running
              (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
                cd ${{ env.BUILD_BASE_PATH }}
                if [[ -f build_pid.tmp ]]; then
                  BUILD_PID=\$(cat build_pid.tmp)
                  kill \$BUILD_PID 2>/dev/null || true
                  echo 'Build process terminated due to timeout'
                fi
              "
              exit 1
            fi
          fi

      - name: Continue build after SOC signing (using faceless account)
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "🔨 Continuing build after SOC signing using faceless account..."
          echo "🐍 Using Python: ${{ env.PYTHON_PATH }}"
          echo "🛠️ Using Intel FXT tool: ${{ env.TOOLS_PATH }}/fxtMuppt.py"
          
          # Continue with FXT tool using faceless account
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'Continue build running as: \$(whoami)'
            cd ${{ env.BUILD_BASE_PATH }}
            
            # Check if build process is still running
            if [[ -f build_pid.tmp ]]; then
              BUILD_PID=\$(cat build_pid.tmp)
              if kill -0 \$BUILD_PID 2>/dev/null; then
                echo 'Sending y to continue the build process...'
                # Try to send y to the process
                echo 'y' | tee /proc/\$BUILD_PID/fd/0 2>/dev/null || {
                  echo 'Could not send y to process, killing and restarting...'
                  kill \$BUILD_PID 2>/dev/null || true
                  sleep 2
                  echo 'y' | ${{ env.PYTHON_PATH }} ${{ env.TOOLS_PATH }}/fxtMuppt.py --conf ${{ needs.validate-inputs.outputs.config_file }}
                }
                
                # Wait for FIT1 signing prompt
                echo 'Waiting for FIT1 signing prompt...'
                for i in {1..60}; do
                  if grep -q 'Press \"y\" when FIT1 Patch signing is completed manually' build_output.log 2>/dev/null; then
                    echo 'FIT1 signing prompt detected!'
                    break
                  fi
                  sleep 10
                done
              else
                echo 'Build process not running, restarting with y...'
                nohup bash -c 'echo y | ${{ env.PYTHON_PATH }} ${{ env.TOOLS_PATH }}/fxtMuppt.py --conf ${{ needs.validate-inputs.outputs.config_file }}' >> build_output.log 2>&1 &
                echo \$! > build_pid.tmp
              fi
            else
              echo 'No build PID found, starting fresh with y...'
              nohup bash -c 'echo y | ${{ env.PYTHON_PATH }} ${{ env.TOOLS_PATH }}/fxtMuppt.py --conf ${{ needs.validate-inputs.outputs.config_file }}' >> build_output.log 2>&1 &
              echo \$! > build_pid.tmp
            fi
          "
            
      - name: Notify FIT1 signing required
        if: ${{ github.event.inputs.enable_notifications == 'true' }}
        run: |
          echo "📧 FIT1 CSS Signing Required Notification"
          echo "========================================="
          echo "🔐 Manual FIT1 CSS Signing Required"
          echo ""
          echo "Experimental patch: ${{ needs.validate-inputs.outputs.exp_version }}"
          echo "Requester: ${{ github.event.inputs.requester }}"
          echo "Build Tool: Intel FXT (fxtMuppt.py) - Running as faceless account"
          echo "Python Version: Python 3.7.4"
          echo ""
          echo "🎯 CSS Signing Details:"
          echo "RSA Project: SRFMCUPQCRSA"
          echo "XMSS Project: SRFMCUPQCXMSS"
          echo "Build Directory: ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/fit1_${{ needs.validate-inputs.outputs.exp_version }}/"
          echo ""
          echo "📋 FIT1 CSS Signing Instructions:"
          echo "1. Encrypt emmodule with project SRFMCUPQCRSA"
          echo "2. Debug/Release dual sign with:"
          echo "   - RSA Project: SRFMCUPQCRSA"
          echo "   - XMSS Project: SRFMCUPQCXMSS"
          echo "3. Complete the signing process"
          echo ""
          echo "⏳ The build will automatically detect when signing is complete and continue (checking every 3 minutes for 30 minutes)."

      - name: Wait for FIT1 signing completion with retry
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "⏳ Waiting for FIT1 CSS signing completion..."
          
          FIT1_DIR="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/fit1_${{ needs.validate-inputs.outputs.exp_version }}"
          
          # Look for common FIT1 signed file patterns
          # Note: You may need to adjust these filenames based on actual output
          POSSIBLE_SIGNED_FILES=(
            "$FIT1_DIR/emmodule_signed.bin"
            "$FIT1_DIR/fit1_signed.bin"
            "$FIT1_DIR/fit1_patch_signed.bin"
            "$FIT1_DIR/core_patch_signed.bin"
          )
          
          echo "🔍 Checking FIT1 directory: $FIT1_DIR"
          echo "Looking for signed files in common locations..."
          
          # Function to wait for FIT1 signing
          wait_for_fit1_signing() {
            local timeout_minutes=$1
            local check_interval=3  # 3 minutes
            local max_checks=$((timeout_minutes / check_interval))
            
            for ((i=1; i<=max_checks; i++)); do
              # Check for any of the possible signed files
              SIGNED_FILE_FOUND=""
              for signed_file in "${POSSIBLE_SIGNED_FILES[@]}"; do
                if [[ -f "$signed_file" ]]; then
                  SIGNED_FILE_FOUND="$signed_file"
                  break
                fi
              done
              
              if [[ -n "$SIGNED_FILE_FOUND" ]]; then
                echo "✅ FIT1 signing completed! Found: $SIGNED_FILE_FOUND"
                echo "📊 File size: $(stat -c%s "$SIGNED_FILE_FOUND") bytes"
                return 0
              fi
              
              echo "⏳ Check $i/$max_checks: Waiting for FIT1 CSS signing... ($(($i * check_interval))/$timeout_minutes minutes elapsed)"
              echo "📁 FIT1 directory contents:"
              ls -la "$FIT1_DIR/" 2>/dev/null || echo "Directory not accessible"
              
              # Check if build process is still running
              (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
                cd ${{ env.BUILD_BASE_PATH }}
                if [[ -f build_pid.tmp ]]; then
                  BUILD_PID=\$(cat build_pid.tmp)
                  if kill -0 \$BUILD_PID 2>/dev/null; then
                    echo '🔄 Build process still running (PID: \$BUILD_PID)'
                  else
                    echo '⚠️  Build process no longer running'
                  fi
                fi
              "
              
              sleep $((check_interval * 60))
            done
            
            return 1
          }
          
          # First attempt: 30 minutes
          if wait_for_fit1_signing 30; then
            echo "🎉 FIT1 signing completed successfully!"
          else
            echo "⏰ First timeout reached (30 minutes). Sending reminder..."
            echo "📧 REMINDER: FIT1 CSS Signing Still Required - ${{ needs.validate-inputs.outputs.exp_version }}"
            
            # Second attempt: 10 more minutes
            echo "⏳ Waiting additional 10 minutes for FIT1 signing..."
            if wait_for_fit1_signing 10; then
              echo "🎉 FIT1 signing completed after reminder!"
            else
              echo "❌ FIT1 signing timeout: No signed file found after 40 minutes total"
              echo "🔍 Final check - files in FIT1 directory:"
              ls -la "$FIT1_DIR/" || echo "Directory not accessible"
              
              # Kill the build process if still running
              (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
                cd ${{ env.BUILD_BASE_PATH }}
                if [[ -f build_pid.tmp ]]; then
                  BUILD_PID=\$(cat build_pid.tmp)
                  kill \$BUILD_PID 2>/dev/null || true
                  echo 'Build process terminated due to timeout'
                fi
              "
              exit 1
            fi
          fi

      - name: Complete build after FIT1 signing (using faceless account)
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "🔨 Completing build after FIT1 signing using faceless account..."
          echo "🐍 Using Python: ${{ env.PYTHON_PATH }}"
          echo "🛠️ Using Intel FXT tool: ${{ env.TOOLS_PATH }}/fxtMuppt.py"
          
          # Complete build with FXT tool using faceless account
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'Complete build running as: \$(whoami)'
            cd ${{ env.BUILD_BASE_PATH }}
            
            # Check if build process is still running
            if [[ -f build_pid.tmp ]]; then
              BUILD_PID=\$(cat build_pid.tmp)
              if kill -0 \$BUILD_PID 2>/dev/null; then
                echo 'Sending final y to complete the build process...'
                echo 'y' | tee /proc/\$BUILD_PID/fd/0 2>/dev/null || {
                  echo 'Could not send y to process, killing and restarting...'
                  kill \$BUILD_PID 2>/dev/null || true
                  sleep 2
                  echo 'y' | ${{ env.PYTHON_PATH }} ${{ env.TOOLS_PATH }}/fxtMuppt.py --conf ${{ needs.validate-inputs.outputs.config_file }}
                }
                
                # Wait for build completion
                wait \$BUILD_PID 2>/dev/null || true
              else
                echo 'Build process not running, completing with y...'
                echo 'y' | ${{ env.PYTHON_PATH }} ${{ env.TOOLS_PATH }}/fxtMuppt.py --conf ${{ needs.validate-inputs.outputs.config_file }}
              fi
            else
              echo 'No build PID found, completing build with y...'
              echo 'y' | ${{ env.PYTHON_PATH }} ${{ env.TOOLS_PATH }}/fxtMuppt.py --conf ${{ needs.validate-inputs.outputs.config_file }}
            fi
            
            echo 'Build completion attempted'
          "

  validate-output:
    needs: [validate-inputs, prepare-config, build-patch]
    runs-on: [self-hosted, node16]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate build output (using faceless account)
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          BUILD_DIR="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}"
          
          echo "🔍 Validating build output using faceless account..."
          echo "📁 Build directory: $BUILD_DIR"
          
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'Validation running as: \$(whoami)'
            
            if [[ ! -d \"$BUILD_DIR/soc_${{ needs.validate-inputs.outputs.exp_version }}\" ]]; then
              echo 'Error: SOC directory not found'
              exit 1
            fi
            
            if [[ ! -d \"$BUILD_DIR/fit1_${{ needs.validate-inputs.outputs.exp_version }}\" ]]; then
              echo 'Error: FIT1 directory not found'
              exit 1
            fi
            
            if [[ ! -d \"$BUILD_DIR/release\" ]]; then
              echo 'Warning: Release directory not found - may not be created yet'
            fi
            
            # Check for key output files
            if [[ -f \"$BUILD_DIR/soc_${{ needs.validate-inputs.outputs.exp_version }}/soc.bin\" ]]; then
              echo '✅ SOC final binary found: soc.bin'
            else
              echo '⚠️  SOC final binary not found: soc.bin'
            fi
            
            # List all files for debugging
            echo 'SOC directory contents:'
            ls -la \"$BUILD_DIR/soc_${{ needs.validate-inputs.outputs.exp_version }}/\" 2>/dev/null || echo 'Cannot access SOC directory'
            
            echo 'FIT1 directory contents:'
            ls -la \"$BUILD_DIR/fit1_${{ needs.validate-inputs.outputs.exp_version }}/\" 2>/dev/null || echo 'Cannot access FIT1 directory'
            
            if [[ -d \"$BUILD_DIR/release\" ]]; then
              echo 'Release directory contents:'
              ls -la \"$BUILD_DIR/release/\" 2>/dev/null || echo 'Cannot access release directory'
            fi
            
            echo '✅ Build validation completed!'
          "
          
      - name: Generate build summary
        run: |
          BUILD_DIR="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}"
          
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Experimental Version**: ${{ needs.validate-inputs.outputs.exp_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Baseline Version**: ${{ github.event.inputs.baseline_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Requester**: ${{ github.event.inputs.requester }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Tool**: Intel FXT (fxtMuppt.py)" >> $GITHUB_STEP_SUMMARY
          echo "- **Python Version**: Python 3.7.4" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Account**: grp_srf_fit1_build (faceless)" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Path**: $BUILD_DIR" >> $GITHUB_STEP_SUMMARY
          echo "- **OCODE Used**: ${{ github.event.inputs.ocode_path }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Validation Status**: ${{ needs.prepare-config.outputs.validation_status }}" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.prepare-config.outputs.validation_status }}" == "failed_with_warnings" ]]; then
            echo "- **⚠️ Validation Warnings**: ${{ needs.prepare-config.outputs.validation_warnings }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "## Output Files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [[ -d "$BUILD_DIR/release/" ]]; then
            ls -la "$BUILD_DIR/release/" >> $GITHUB_STEP_SUMMARY
          else
            echo "Release directory not found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: experimental-patch-${{ needs.validate-inputs.outputs.exp_version }}
          path: |
            ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/
          retention-days: 30
          if-no-files-found: warn

      - name: Create build archive
        run: |
          BUILD_DIR="${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}"
          ARCHIVE_NAME="experimental-patch-${{ needs.validate-inputs.outputs.exp_version }}-$(date +%Y%m%d-%H%M%S).tar.gz"
          
          if [[ -d "$BUILD_DIR" ]]; then
            cd "${{ env.BUILD_BASE_PATH }}"
            tar -czf "$ARCHIVE_NAME" "${{ needs.validate-inputs.outputs.exp_version }}/"
            echo "Archive created: ${{ env.BUILD_BASE_PATH }}/$ARCHIVE_NAME"
            echo "ARCHIVE_PATH=${{ env.BUILD_BASE_PATH }}/$ARCHIVE_NAME" >> $GITHUB_ENV
          else
            echo "Build directory not found, skipping archive creation"
          fi

  notify-completion:
    needs: [validate-inputs, prepare-config, validate-output]
    runs-on: [self-hosted, node16]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Notify build completion - Success
        if: ${{ needs.validate-output.result == 'success' && github.event.inputs.enable_notifications == 'true' }}
        run: |
          echo "📧 Build Completed Successfully! 🎉"
          echo "=================================="
          echo ""
          echo "Experimental Version: ${{ needs.validate-inputs.outputs.exp_version }}"
          echo "Baseline Version: ${{ github.event.inputs.baseline_version }}"
          echo "Requester: ${{ github.event.inputs.requester }}"
          echo "Build Tool: Intel FXT (fxtMuppt.py)"
          echo "Python Version: Python 3.7.4"
          echo "Build Account: grp_srf_fit1_build (faceless)"
          echo "Build Path: ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}/"
          echo "OCODE Used: ${{ github.event.inputs.ocode_path }}"
          echo "Validation Status: ${{ needs.prepare-config.outputs.validation_status }}"
          echo ""
          echo "✅ CSS Signing Completed:"
          echo "✅ SOC CSS signing completed successfully"
          echo "✅ FIT1 CSS signing completed successfully"
          echo "✅ Final binaries generated"
          echo ""
          echo "📦 Artifacts Available:"
          echo "- Release files available in GitHub Actions artifacts"
          echo "- Build archive created on build server"
          echo "- SOC and FIT1 signed binaries preserved"
          
      - name: Notify build completion - Failure
        if: ${{ needs.validate-output.result != 'success' && github.event.inputs.enable_notifications == 'true' }}
        run: |
          echo "📧 Build Failed ❌"
          echo "=================="
          echo ""
          echo "Experimental Version: ${{ needs.validate-inputs.outputs.exp_version }}"
          echo "Baseline Version: ${{ github.event.inputs.baseline_version }}"
          echo "Requester: ${{ github.event.inputs.requester }}"
          echo "Build Tool: Intel FXT (fxtMuppt.py)"
          echo "Python Version: Python 3.7.4"
          echo "Build Account: grp_srf_fit1_build (faceless)"
          echo "Failure Stage: ${{ needs.validate-output.result }}"
          echo "Initial Validation Status: ${{ needs.prepare-config.outputs.validation_status }}"
          echo ""
          echo "🔍 Possible Failure Causes:"
          echo "- CSS signing timeout (SOC or FIT1)"
          echo "- Missing signed files after CSS completion"
          echo "- Build tool execution issues"
          echo "- File permission problems with faceless account"
          echo "- Path validation issues from initial step"
          echo ""
          echo "🛠️ Action Required:"
          echo "- Check the GitHub Actions logs for detailed error information"
          echo "- Verify CSS signing was completed properly"
          echo "- Check if signed files exist in expected locations"
          echo "- Review any validation warnings from the initial step"
          echo "- Verify faceless account has necessary file permissions"
          echo "- Contact the build team if assistance is needed"
          echo "- Retry the build after resolving issues"
            
      - name: Final status
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        run: |
          echo "🔍 Final status check using faceless account..."
          
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_srf_fit1_build bash -c "
            echo 'Final check running as: \$(whoami)'
            echo 'Python version: \$(${{ env.PYTHON_PATH }} --version)'
            
            if [[ \"${{ needs.validate-output.result }}\" == \"success\" ]]; then
              echo '✅ Experimental patch build completed successfully!'
              echo '🛠️ Build executed using Intel FXT tool (fxtMuppt.py) with faceless account'
              echo '🐍 Using Python 3.7.4 for compatibility'
              echo '🔐 CSS signing completed for both SOC and FIT1'
              echo '📁 Build location: ${{ env.BUILD_BASE_PATH }}/${{ needs.validate-inputs.outputs.exp_version }}'
              echo '📦 Artifacts uploaded to GitHub Actions'
              
              if [[ \"${{ needs.prepare-config.outputs.validation_status }}\" == \"failed_with_warnings\" ]]; then
                echo ''
                echo '⚠️  Note: Build completed despite initial validation warnings:'
                echo '${{ needs.prepare-config.outputs.validation_warnings }}'
              fi
            else
              echo '❌ Experimental patch build failed!'
              echo '🛠️ Build was attempted using Intel FXT tool (fxtMuppt.py) with faceless account'
              echo '🐍 Used Python 3.7.4 for compatibility'
              echo '🔐 Check if CSS signing was completed properly'
              echo '📋 Check the logs for more details'
              
              if [[ \"${{ needs.prepare-config.outputs.validation_status }}\" == \"failed_with_warnings\" ]]; then
                echo ''
                echo '⚠️  Initial validation warnings may be related to the failure:'
                echo '${{ needs.prepare-config.outputs.validation_warnings }}'
              fi
              exit 1
            fi
          "
