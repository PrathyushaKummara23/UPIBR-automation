name: SRF SSH Login - Test

on:
  workflow_dispatch:

jobs:
  srf-login:
    name: SRF SSH Login
    runs-on: [self-hosted, node16]

    steps:
      - name: Trigger pipeline via Task Scheduler
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        run: |
          # Step 1: Trigger the Task Scheduler task via SSH
          cat > /tmp/ssh_trigger.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 30
          set password $env(SRF_PASSWORD)
          spawn ssh -T -o StrictHostKeyChecking=no CEFLS_User@10.138.186.133
          expect { "*assword:*" { send "$password\r" } timeout { exit 1 } }
          expect { "*>*" { send "schtasks /run /tn DeployRebootWrapper\r" } timeout { exit 1 } }
          expect { "*>*" { send "exit\r" } timeout { exit 1 } }
          expect eof
          EOF
          chmod +x /tmp/ssh_trigger.exp
          echo "Triggering pipeline via Task Scheduler..."
          /usr/bin/expect /tmp/ssh_trigger.exp
          rm -f /tmp/ssh_trigger.exp
          echo "Task triggered. Waiting for pipeline to start..."
          sleep 15

      - name: Poll pipeline_result.txt until done
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        run: |
          TIMEOUT=7200
          ELAPSED=0
          echo "Polling every 30s for result (max 2 hours)..."

          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep 30
            ELAPSED=$((ELAPSED + 30))

            # Read result file via SSH
            cat > /tmp/ssh_poll.exp << 'EXPEOF'
            #!/usr/bin/expect -f
            set timeout 15
            set password $env(SRF_PASSWORD)
            spawn ssh -T -o StrictHostKeyChecking=no CEFLS_User@10.138.186.133
            expect { "*assword:*" { send "$password\r" } timeout { exit 1 } }
            expect { "*>*" { send "type C:\\pkummara\\logs\\pipeline_result.txt\r" } timeout { exit 1 } }
            expect { "*>*" { send "exit\r" } timeout { exit 1 } }
            expect eof
            EXPEOF
            chmod +x /tmp/ssh_poll.exp
            RESULT=$(/usr/bin/expect /tmp/ssh_poll.exp 2>/dev/null)
            rm -f /tmp/ssh_poll.exp

            echo "[$ELAPSED s] Raw result: $RESULT"

            if echo "$RESULT" | grep -q "PASSED"; then
              echo "✅ SUCCESS: Pipeline PASSED!"
              exit 0
            elif echo "$RESULT" | grep -q "FAILED"; then
              REASON=$(echo "$RESULT" | grep "FAILED")
              echo "❌ FAILURE: $REASON"
              exit 1
            else
              echo "[$ELAPSED s] Still running..."
            fi
          done

          echo "❌ FAILURE: Timed out after 2 hours"
          exit 1
