name: SRF SSH Login - Test

on:
  workflow_dispatch:
  workflow_call:
jobs:
  srf-login:
    name: SRF SSH Login
    runs-on: [self-hosted, node16]

    steps:
      - name: SSH into SRF host and run whoami
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        run: |
          echo "================================================="
          echo "  SRF SSH Login - Post Build Auto Login"
          echo "================================================="
          # Write expect script
          cat > /tmp/ssh_login.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 3000
          set password $env(SRF_PASSWORD)
          spawn ssh -T -o StrictHostKeyChecking=no CEFLS_User@10.138.186.133
          expect {
            "*assword:*" {
              send "$password\r"
            }
            timeout {
              puts "FAILURE: Connection timed out"
              exit 1
            }
          }
          expect {
            "*>*" {
              send "whoami\r"
            }
            timeout {
              puts "FAILURE: Shell prompt not received"
              exit 1
            }
          }
          expect {
            "*>*" {
              send "cd C:\\pkummara\\scripts\r"
            }
            timeout {
              puts "FAILURE: whoami did not complete"
              exit 1
            }
          }
          expect {
            "*>*" {
              send "C:\\Python310\\python.exe -u .\\deploy_reboot_wrapper.py\r"
            }
            timeout {
              puts "FAILURE: cd to scripts directory did not complete"
              exit 1
            }
          }
          expect {
            "*>*" {
              send "exit\r"
            }
            timeout {
              puts "FAILURE: Python script did not complete"
              exit 1
            }
          }
          expect eof
          EOF
          chmod +x /tmp/ssh_login.exp
          echo "Connecting to SRF host via SSH..."
          /usr/bin/expect /tmp/ssh_login.exp
          SSH_EXIT=$?
          rm -f /tmp/ssh_login.exp
          if [ $SSH_EXIT -eq 0 ]; then
            echo "✅ SUCCESS: SSH login and command executed successfully!"
          else
            echo "❌ FAILURE: SSH connection failed with exit code: $SSH_EXIT"
            exit $SSH_EXIT
          fi
