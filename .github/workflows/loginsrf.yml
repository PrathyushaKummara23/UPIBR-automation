name: SRF VNC Login

on:
  workflow_dispatch: {}

jobs:
  srf-login:
    name: SRF VNC Login (Windows)
    runs-on: [self-hosted, X64, Windows]

    steps:
      - name: Launch VNC and Login to SRF System
        shell: powershell
        run: |
          Write-Host "=============================================="
          Write-Host "  SRF VNC Login - Post Build Auto Login"
          Write-Host "=============================================="
          Write-Host "Triggered after successful SRF Debug UP build"
          Write-Host "Running vnc_connect.py on Windows runner..."
          Write-Host ""
          $scriptPath = "C:\actions-runner\vnc_connect.py"
          if (-not (Test-Path $scriptPath)) {
            Write-Host "ERROR: vnc_connect.py not found at $scriptPath"
            exit 1
          }
          Write-Host "Found vnc_connect.py at: $scriptPath"
          Write-Host "Starting VNC login sequence..."
          python $scriptPath
          $exitCode = $LASTEXITCODE
          Write-Host ""
          Write-Host "vnc_connect.py exit code: $exitCode"
          if ($exitCode -eq 0) {
            Write-Host "SUCCESS: SRF VNC login completed successfully!"
          } else {
            Write-Host "FAILURE: VNC login script exited with code $exitCode"
            exit $exitCode
          }
      - name: Upload Login Screenshots as Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: srf-login-screenshots
          path: |
            C:\actions-runner\step1_username.png
            C:\actions-runner\step2_password.png
            C:\actions-runner\after_auth.png
          if-no-files-found: warn
          retention-days: 3

  diagnose-runner:
    name: Diagnose Runner Identity
    runs-on: [self-hosted, X64, Windows]
    needs: srf-login

    steps:
      - name: Show runner identity and C drive root
        shell: powershell
        run: |
          Write-Host "=============================================="
          Write-Host "  RUNNER IDENTITY DIAGNOSTICS"
          Write-Host "=============================================="
          Write-Host "Current User    : $env:USERNAME"
          Write-Host "User Domain     : $env:USERDOMAIN"
          Write-Host "User Profile    : $env:USERPROFILE"
          Write-Host "Computer Name   : $env:COMPUTERNAME"
          Write-Host "Runner Temp     : $env:RUNNER_TEMP"
          Write-Host "Runner WorkDir  : $env:GITHUB_WORKSPACE"
          Write-Host ""
          Write-Host "--- whoami output ---"
          whoami
          Write-Host ""
          Write-Host "--- whoami /groups (abbreviated) ---"
          whoami /groups 2>&1 | Select-Object -First 20
          Write-Host ""
          Write-Host "--- Contents of C:\ root ---"
          Get-ChildItem -Path "C:\" -Force -ErrorAction SilentlyContinue | Format-Table Name, Attributes -AutoSize
          Write-Host ""
          Write-Host "--- Direct Test-Path checks ---"
          Write-Host "Test-Path C:\pkummara              : $(Test-Path 'C:\pkummara')"
          Write-Host "Test-Path C:\pkummara (SilentlyCont): $(Test-Path 'C:\pkummara' -ErrorAction SilentlyContinue)"
          Write-Host ""
          Write-Host "--- Try Get-Item directly ---"
          try {
            $item = Get-Item -Path "C:\pkummara" -Force -ErrorAction Stop
            Write-Host "Get-Item SUCCESS: $($item.FullName) | Attributes: $($item.Attributes)"
          } catch {
            Write-Host "Get-Item ERROR: $_"
          }
          Write-Host ""
          Write-Host "--- Try Get-ChildItem on C:\ looking for pkummara ---"
          Get-ChildItem -Path "C:\" -Force -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*pkummara*" } | Format-Table Name, FullName, Attributes -AutoSize
          Write-Host ""
          Write-Host "--- ACL on C:\pkummara (if accessible) ---"
          try {
            $acl = Get-Acl -Path "C:\pkummara" -ErrorAction Stop
            $acl.Access | Format-Table IdentityReference, FileSystemRights, AccessControlType -AutoSize
          } catch {
            Write-Host "Cannot read ACL: $_"
          }
          Write-Host "=============================================="
          Write-Host "  Diagnostics completed!"
          Write-Host "=============================================="
