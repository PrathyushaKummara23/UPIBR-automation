name: SRF SSH Login - Test

on:
  workflow_dispatch:

jobs:
  srf-login:
    name: SRF SSH Login
    runs-on: [self-hosted, node16]

    steps:
      - name: SSH into SRF host and run deploy_reboot_wrapper.py
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        run: |
          cat > /tmp/ssh_login.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 7200

          set password $env(SRF_PASSWORD)
          spawn ssh -T -o StrictHostKeyChecking=no CEFLS_User@10.138.186.133

          expect {
            "*assword:*" { send "$password\r" }
            timeout { puts "FAILURE: Connection timed out"; exit 1 }
          }

          expect {
            "*>*" { send "cd C:\\pkummara\\scripts\r" }
            timeout { puts "FAILURE: Shell prompt not received"; exit 1 }
          }

          expect {
            "*>*" { send "C:\\Python310\\python.exe .\\deploy_reboot_wrapper.py\r" }
            timeout { puts "FAILURE: cd failed"; exit 1 }
          }

          # Wait for PASSED or FAILED — python script takes ~30+ min
          expect {
            "*DEPLOY_REBOOT_VERIFY PASSED*" {
              puts "PIPELINE_RESULT: PASSED"
              send "exit\r"
              expect eof
              exit 0
            }
            "*STITCHED IFWI FAILED*" {
              puts "PIPELINE_RESULT: FAILED - Stitch IFWI"
              send "exit\r"
              expect eof
              exit 1
            }
            "*DEPLOY FAILED*" {
              puts "PIPELINE_RESULT: FAILED - OSPL Deploy"
              send "exit\r"
              expect eof
              exit 1
            }
            "*FAILED on cold reboot*" {
              puts "PIPELINE_RESULT: FAILED - Cold Reboot"
              send "exit\r"
              expect eof
              exit 1
            }
            "*FAILED on warm reboot*" {
              puts "PIPELINE_RESULT: FAILED - Warm Reboot"
              send "exit\r"
              expect eof
              exit 1
            }
            timeout {
              puts "FAILURE: Script timed out after 2 hours"
              send "exit\r"
              expect eof
              exit 1
            }
          }
          EOF

          chmod +x /tmp/ssh_login.exp
          echo "Connecting to SRF host..."
          /usr/bin/expect /tmp/ssh_login.exp
          SSH_EXIT=$?
          rm -f /tmp/ssh_login.exp

          if [ $SSH_EXIT -eq 0 ]; then
            echo "✅ SUCCESS: Full pipeline PASSED!"
          else
            echo "❌ FAILURE: Pipeline FAILED with exit code: $SSH_EXIT"
            exit $SSH_EXIT
          fi
