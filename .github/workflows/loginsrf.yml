name: SRF SSH Login - Test

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      SRF_PASSWORD:
        required: true

jobs:
  srf-login:
    name: SRF SSH Login
    runs-on: [self-hosted, node16]

    steps:
      - name: SSH into SRF host and run deploy_reboot_wrapper.py
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        run: |
          echo "================================================="
          echo "  SRF SSH Login - Post Build Auto Login"
          echo "================================================="

          cat > /tmp/ssh_login_${{ github.run_id }}.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 60
          set password $env(SRF_PASSWORD)

          spawn ssh -T \
            -o StrictHostKeyChecking=no \
            -o ForwardX11=no \
            CEFLS_User@10.138.186.133

          expect {
            "*assword:*" { send "$password\r" }
            timeout      { puts "FAILURE: Connection timed out"; exit 1 }
          }

          expect {
            "*>*" { }
            timeout { puts "FAILURE: Shell prompt not received"; exit 1 }
          }

          send "cd C:\\pkummara\\scripts\r"
          expect {
            "*>*" { }
            timeout { puts "FAILURE: cd did not complete"; exit 1 }
          }

          # ── Start-Process: Python stderr never touches PowerShell pipeline ─
          send "powershell -Command \"\$ts = Get-Date -Format 'yyyy-MM-dd_HH-mm-ss'; \$log = 'C:/pkummara/logs/full_run_' + \$ts + '.log'; \$err = 'C:/pkummara/logs/full_run_' + \$ts + '_err.log'; \$proc = Start-Process -FilePath 'C:/Python310/python.exe' -ArgumentList '-u','C:/pkummara/scripts/deploy_reboot_wrapper.py' -RedirectStandardOutput \$log -RedirectStandardError \$err -Wait -PassThru -NoNewWindow; if (\$proc.ExitCode -eq 0) { Write-Host '__DEPLOY_SUCCESS__' } else { Write-Host '__DEPLOY_FAILURE__' }\"\r"

          # ── Wait up to 50 min for script to finish ───────────────
          set timeout 3000
          expect {
            "__DEPLOY_SUCCESS__" { puts "SCRIPT_RESULT=0" }
            "__DEPLOY_FAILURE__" { puts "SCRIPT_RESULT=1" }
            timeout { puts "FAILURE: deploy_reboot_wrapper.py timed out"; exit 1 }
          }

          # ── Send exit immediately — no prompt wait ───────────────
          send "exit\r"
          expect eof
          EOF

          chmod +x /tmp/ssh_login_${{ github.run_id }}.exp
          echo "Connecting to SRF host via SSH..."

          /usr/bin/expect /tmp/ssh_login_${{ github.run_id }}.exp \
            > /tmp/ssh_output_${{ github.run_id }}.txt 2>&1 || true

          echo "========== SSH SESSION OUTPUT =========="
          cat /tmp/ssh_output_${{ github.run_id }}.txt
          echo "========================================"

          rm -f /tmp/ssh_login_${{ github.run_id }}.exp

          if grep -qx "SCRIPT_RESULT=0" /tmp/ssh_output_${{ github.run_id }}.txt; then
            echo "✅ SUCCESS: deploy_reboot_wrapper.py completed successfully!"
          elif grep -qx "SCRIPT_RESULT=1" /tmp/ssh_output_${{ github.run_id }}.txt; then
            echo "❌ FAILURE: deploy_reboot_wrapper.py failed!"
            rm -f /tmp/ssh_output_${{ github.run_id }}.txt
            exit 1
          else
            echo "❌ FAILURE: Could not determine script result"
            rm -f /tmp/ssh_output_${{ github.run_id }}.txt
            exit 1
          fi

          rm -f /tmp/ssh_output_${{ github.run_id }}.txt
