name: SRF Host Login (Windows)

on:
  workflow_dispatch:

jobs:
  srf-host-login:
    name: SSH Login to SRF Host from Windows
    runs-on: [self-hosted, X64, Windows]

    steps:
      - name: Install paramiko
        shell: powershell
        run: |
          python -m pip install paramiko -q

      - name: SSH into SRF Host and run commands
        shell: powershell
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        run: |
          Write-Host "=============================================="
          Write-Host "  SRF Host Login - Windows Runner"
          Write-Host "=============================================="

          # Write Python SSH script to file line by line
          Set-Content  -Path ssh_script.py -Value "import paramiko, sys, os"
          Add-Content  -Path ssh_script.py -Value "client = paramiko.SSHClient()"
          Add-Content  -Path ssh_script.py -Value "client.set_missing_host_key_policy(paramiko.AutoAddPolicy())"
          Add-Content  -Path ssh_script.py -Value "password = os.environ.get('SRF_PASSWORD')"
          Add-Content  -Path ssh_script.py -Value "try:"
          Add-Content  -Path ssh_script.py -Value "    client.connect('10.138.186.133', username='CEFLS_User', password=password, timeout=30)"
          Add-Content  -Path ssh_script.py -Value "    print('Connected successfully!')"
          Add-Content  -Path ssh_script.py -Value "    stdin,stdout,stderr = client.exec_command('whoami')"
          Add-Content  -Path ssh_script.py -Value "    print('whoami:', stdout.read().decode().strip())"
          Add-Content  -Path ssh_script.py -Value "    stdin,stdout,stderr = client.exec_command('dir C:\\Users\\CEFLS_User')"
          Add-Content  -Path ssh_script.py -Value "    print(stdout.read().decode())"
          Add-Content  -Path ssh_script.py -Value "    client.close()"
          Add-Content  -Path ssh_script.py -Value "    sys.exit(0)"
          Add-Content  -Path ssh_script.py -Value "except Exception as e:"
          Add-Content  -Path ssh_script.py -Value "    print('FAILURE:', str(e))"
          Add-Content  -Path ssh_script.py -Value "    sys.exit(1)"

          # Run the script
          python ssh_script.py
          $exitCode = $LASTEXITCODE

          # Cleanup
          Remove-Item -Path ssh_script.py -Force

          if ($exitCode -eq 0) {
            Write-Host "✅ SUCCESS: SRF host login completed!"
          } else {
            Write-Host "❌ FAILURE: SRF host login failed!"
            exit 1
          }
