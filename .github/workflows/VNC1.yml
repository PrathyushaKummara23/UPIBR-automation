name: Open RealVNC
on: workflow_dispatch

jobs:
  opening-real-vnc:
    runs-on: self-hosted
    
    steps:
    - name: Opening Real VNC
      run: |
        echo "Opening VNC Viewer on Linux..."
        export DISPLAY=scce01100109.sc.intel.com:9.0
        
        # Try different VNC viewer commands
        if command -v vncviewer &> /dev/null; then
            echo "Found vncviewer, launching..."
            vncviewer &
        elif command -v realvnc-vncviewer &> /dev/null; then
            echo "Found realvnc-vncviewer, launching..."
            realvnc-vncviewer &
        elif command -v vnc-viewer &> /dev/null; then
            echo "Found vnc-viewer, launching..."
            vnc-viewer &
        elif command -v xtightvncviewer &> /dev/null; then
            echo "Found xtightvncviewer, launching..."
            xtightvncviewer &
        else
            echo "VNC Viewer not found, searching for it..."
            find /usr -name "*vnc*" -type f 2>/dev/null | grep -i viewer
        fi
        
        echo "VNC Viewer launch attempted"
