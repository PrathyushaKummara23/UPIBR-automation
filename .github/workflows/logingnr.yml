name: GNR SSH Login - Test

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Session ID for tracking'
        required: false
        type: string
        default: ''
      trigger_source:
        description: 'Source that triggered the workflow'
        required: false
        type: string
        default: 'unknown'
      callback_url:
        description: 'Callback URL for notifications'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      session_id:
        description: 'Session ID for tracking'
        required: false
        type: string
        default: ''
      trigger_source:
        description: 'Source that triggered the workflow'
        required: false
        type: string
        default: 'unknown'
      callback_url:
        description: 'Callback URL for notifications'
        required: false
        type: string
        default: ''
    secrets:
      GNR_PASSWORD:
        required: true

jobs:
  gnr-login:
    name: GNR SSH Login
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Session Info Display
        if: ${{ inputs.session_id != '' }}
        shell: bash
        run: |
          echo "Session ID: ${{ inputs.session_id }}"
          echo "Triggered by: ${{ inputs.trigger_source }}"
          echo "Callback URL: ${{ inputs.callback_url }}"

      - name: SSH into GNR host and run deploy_reboot_wrapper.py
        env:
          GNR_PASSWORD: ${{ secrets.GNR_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "================================================="
          echo "  GNR SSH Login - Post Build Auto Login"
          echo "================================================="

          cat > /tmp/ssh_login_${{ github.run_id }}.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 7200
          set password $env(GNR_PASSWORD)

          set script_path "C:\\pkummara\\scripts\\deploy_reboot_wrapper.py"
          set python_path "C:\\Python310\\python.exe"

          spawn ssh -T -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null CEFLS_User@10.138.186.168

          expect {
            "*assword:*" { send "$password\r" }
            "Permission denied" { puts "FAILURE: Invalid SSH credentials"; exit 1 }
            "Connection refused" { puts "FAILURE: SSH connection refused"; exit 1 }
            "Could not resolve hostname" { puts "FAILURE: Hostname resolution failed"; exit 1 }
            "No route to host" { puts "FAILURE: No route to host"; exit 1 }
            timeout { puts "FAILURE: Connection timed out"; exit 1 }
            eof { puts "FAILURE: SSH session terminated before password prompt"; exit 1 }
          }

          expect {
            "Permission denied" { puts "FAILURE: Invalid SSH credentials"; exit 1 }
            "*assword:*" { puts "FAILURE: Password rejected"; exit 1 }
            "*>*" {}
            timeout { puts "FAILURE: Shell prompt not received"; exit 1 }
            eof { puts "FAILURE: SSH session closed after login"; exit 1 }
          }

          send "whoami\r"
          expect {
            "*>*" {
              set whoami_output $expect_out(buffer)
              if {![string match -nocase "*elfleet056\\\\cefls_user*" $whoami_output]} {
                puts "FAILURE: whoami did not return expected user"
                puts "WHOAMI OUTPUT: $whoami_output"
                exit 1
              }
            }
            timeout { puts "FAILURE: whoami did not complete"; exit 1 }
            eof { puts "FAILURE: SSH session closed after whoami"; exit 1 }
          }

          send "if exist \"$script_path\" (echo SCRIPT_FOUND) else (echo SCRIPT_MISSING)\r"
          expect {
            "SCRIPT_FOUND" {}
            "SCRIPT_MISSING" { puts "FAILURE: deploy_reboot_wrapper.py not found at expected path"; exit 1 }
            timeout { puts "FAILURE: Script existence check timed out"; exit 1 }
            eof { puts "FAILURE: SSH session closed during script existence check"; exit 1 }
          }

          expect {
            "*>*" {}
            timeout { puts "FAILURE: Prompt not received after script existence check"; exit 1 }
            eof { puts "FAILURE: SSH session closed after script existence check"; exit 1 }
          }

          send "set NO_PROXY=localhost,127.0.0.1\r"
          expect {
            "*>*" {}
            timeout { puts "FAILURE: setting NO_PROXY timed out"; exit 1 }
            eof { puts "FAILURE: SSH session closed while setting NO_PROXY"; exit 1 }
          }

          send "set no_proxy=localhost,127.0.0.1\r"
          expect {
            "*>*" {}
            timeout { puts "FAILURE: setting no_proxy timed out"; exit 1 }
            eof { puts "FAILURE: SSH session closed while setting no_proxy"; exit 1 }
          }

          send "$python_path -u $script_path\r"
          expect {
            "*>*" {
              set py_output $expect_out(buffer)
            }
            timeout {
              puts "FAILURE: Python script did not complete"
              exit 1
            }
            eof {
              puts "FAILURE: SSH session closed while waiting for Python script completion"
              exit 1
            }
          }

          if {[string match -nocase "*PHASE 0 FAILED*" $py_output]} {
            puts "FAILURE: Remote script reported PHASE 0 FAILED"
            puts $py_output
            exit 1
          }

          if {[string match -nocase "*Stitch and burn flow failed*" $py_output]} {
            puts "FAILURE: Remote script reported stitch/burn failure"
            puts $py_output
            exit 1
          }

          if {[string match -nocase "*Traceback (most recent call last)*" $py_output]} {
            puts "FAILURE: Python script threw an exception"
            puts $py_output
            exit 1
          }

          if {[string match -nocase "*can't open file*" $py_output]} {
            puts "FAILURE: Python could not open deploy_reboot_wrapper.py"
            puts $py_output
            exit 1
          }

          send "echo __PY_EXIT_CODE__=%ERRORLEVEL%\r"
          expect {
            -re {__PY_EXIT_CODE__=([0-9]+)} {
              set py_exit $expect_out(1,string)
              if {$py_exit ne "0"} {
                puts "FAILURE: Remote Python exited with code $py_exit"
                puts $py_output
                exit 1
              }
            }
            timeout {
              puts "FAILURE: Could not determine remote Python exit code"
              puts $py_output
              exit 1
            }
            eof {
              puts "FAILURE: SSH session closed while reading Python exit code"
              puts $py_output
              exit 1
            }
          }

          expect {
            "*>*" {}
            timeout { puts "FAILURE: Prompt not received after exit code check"; exit 1 }
            eof { puts "FAILURE: SSH session closed after exit code check"; exit 1 }
          }

          send "exit\r"
          expect eof
          EOF

          chmod +x /tmp/ssh_login_${{ github.run_id }}.exp
          echo "Connecting to GNR host via SSH..."

          set +e
          /usr/bin/expect /tmp/ssh_login_${{ github.run_id }}.exp
          SSH_EXIT=$?
          set -e

          rm -f /tmp/ssh_login_${{ github.run_id }}.exp

          if [ $SSH_EXIT -eq 0 ]; then
            echo "SUCCESS: SSH login and command executed successfully"
          else
            echo "FAILURE: SSH connection failed with exit code: $SSH_EXIT"
            exit $SSH_EXIT
          fi

      - name: Send GNR Login Notification
        if: ${{ inputs.callback_url != '' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Sending GNR login notification..."

          CALLBACK_URL="${{ inputs.callback_url }}"
          SESSION_ID="${{ inputs.session_id }}"

          if [ -n "$CALLBACK_URL" ]; then
            PAYLOAD=$(printf '{"session_id":"%s","status":"gnr_login_completed","message":"GNR login process completed","workflow_run_id":"%s","timestamp":"%s","trigger_source":"%s","gnr_login_details":{"host":"10.138.186.168","user":"CEFLS_User","login_timestamp":"%s"}}' \
              "$SESSION_ID" \
              "${{ github.run_id }}" \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              "${{ inputs.trigger_source }}" \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)")

            curl --noproxy 127.0.0.1 -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || echo "Failed to send GNR login notification"
          else
            echo "No callback URL provided, skipping notification"
          fi
