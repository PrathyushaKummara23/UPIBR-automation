name: ELFLEET042 NUC/HOST Login

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Optional command to run on NUC after login (leave empty for connectivity check)'
        required: false
        type: string
        default: ''

env:
  NUC_HOST: 10.138.186.148
  NUC_FQDN: ELFLEET042
  NUC_USERNAME: CEFLS_User
  SYSTEM_ID: 776798

jobs:
  nuc-login:
    runs-on: [self-hosted, node16]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify sshpass availability
        run: |
          echo "Checking sshpass availability..."
          if ! command -v sshpass &> /dev/null; then
            echo "ERROR: sshpass is not installed on the runner."
            echo "Install it with: sudo apt-get install -y sshpass (Ubuntu) or sudo yum install -y sshpass (RHEL)"
            exit 1
          fi
          echo "sshpass is available: $(sshpass -V 2>&1 | head -1)"

      - name: Verify network connectivity to ELFLEET042 NUC/HOST
        run: |
          echo "Pinging NUC/HOST at ${{ env.NUC_HOST }} (System: ${{ env.NUC_FQDN }}, ID: ${{ env.SYSTEM_ID }})..."
          if ping -c 3 -W 5 ${{ env.NUC_HOST }} &> /dev/null; then
            echo "Host ${{ env.NUC_HOST }} is reachable."
          else
            echo "WARNING: Host ${{ env.NUC_HOST }} did not respond to ping. Proceeding with SSH attempt..."
          fi

      - name: Login to ELFLEET042 NUC/HOST via SSH
        env:
          NUC_PASSWORD: ${{ secrets.NUC_PASSWORD }}
        run: |
          echo "Logging in to NUC/HOST: ${{ env.NUC_USERNAME }}@${{ env.NUC_HOST }} (${{ env.NUC_FQDN }})..."

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=no"

          # Verify SSH login
          LOGIN_CHECK=$(sshpass -p "$NUC_PASSWORD" ssh $SSH_OPTS \
            ${{ env.NUC_USERNAME }}@${{ env.NUC_HOST }} "echo LOGIN_SUCCESS && whoami && hostname" 2>&1)

          if echo "$LOGIN_CHECK" | grep -q "LOGIN_SUCCESS"; then
            echo "SSH login to ${{ env.NUC_FQDN }} successful."
            echo "$LOGIN_CHECK"
          else
            echo "ERROR: SSH login failed."
            echo "Output: $LOGIN_CHECK"
            exit 1
          fi

      - name: Run command on NUC/HOST (if provided)
        if: ${{ inputs.command != '' }}
        env:
          NUC_PASSWORD: ${{ secrets.NUC_PASSWORD }}
        run: |
          echo "Running command on ${{ env.NUC_FQDN }}: ${{ inputs.command }}"

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=no"

          OUTPUT=$(sshpass -p "$NUC_PASSWORD" ssh $SSH_OPTS \
            ${{ env.NUC_USERNAME }}@${{ env.NUC_HOST }} "${{ inputs.command }}" 2>&1)
          EXIT_CODE=$?

          echo "--- Command Output ---"
          echo "$OUTPUT"
          echo "--- Exit Code: $EXIT_CODE ---"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Command exited with code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Collect basic system info from NUC/HOST
        if: ${{ inputs.command == '' }}
        env:
          NUC_PASSWORD: ${{ secrets.NUC_PASSWORD }}
        run: |
          echo "Collecting system info from ${{ env.NUC_FQDN }}..."

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=no"

          sshpass -p "$NUC_PASSWORD" ssh $SSH_OPTS \
            ${{ env.NUC_USERNAME }}@${{ env.NUC_HOST }} \
            "echo '=== Hostname ===' && hostname && \
             echo '=== Uptime ===' && uptime && \
             echo '=== OS Info ===' && uname -a && \
             echo '=== Disk Usage ===' && df -h / && \
             echo '=== Memory ===' && free -h" 2>&1
