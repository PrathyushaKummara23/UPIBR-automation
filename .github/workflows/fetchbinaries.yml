name: Fetch Bin/patchlets from Entry Criteria
on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  fetch-binaries:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install jq for JSON parsing
      run: |
        sudo apt-get update
        sudo apt-get install -y jq
    - name: Create output directory
      run: |
        echo "=== CREATING OUTPUT DIRECTORY ==="
        echo "Current working directory: $(pwd)"
        mkdir -p output_paths
        echo "Created output directory at: $(realpath output_paths)"
        echo "=== END DIRECTORY CREATION ==="
    - name: Check for existing JSON file or create sample
      run: |
        JSON_FILE=".github/entry_criteria_output.json"
        echo "=== JSON FILE HANDLING ==="
        if [ ! -f "$JSON_FILE" ]; then
          echo "Creating sample entry_criteria_output.json file..."
          mkdir -p .github
          cat > "$JSON_FILE" << 'EOF'
        {
          "section_1": [
            {
              "sr_no": 1,
              "check_list_item": "Milestone",
              "entry": "UPLR0"
            },
            {
              "sr_no": 2,
              "check_list_item": "UP Base Line Version",
              "entry": "0x81321420"
            },
            {
              "sr_no": 3,
              "check_list_item": "SVN Version",
              "entry": "0x08"
            },
            {
              "sr_no": 4,
              "check_list_item": "SVN_SE Version",
              "entry": "7"
            },
            {
              "sr_no": 5,
              "check_list_item": "Min SVN",
              "entry": "0x7"
            },
            {
              "sr_no": 6,
              "check_list_item": "Min Runtime ID",
              "entry": "24511"
            },
            {
              "sr_no": 7,
              "check_list_item": "Rollback ID",
              "entry": "22110"
            },
            {
              "sr_no": 8,
              "check_list_item": "New UP Version",
              "entry": "0x81321421"
            }
          ],
          "ucode": [
            {
              "sr_no": 1,
              "check_list_item": "ucode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/uCode/main/m_01_a06f3_e200102b"
            }
          ],
          "xucode": [
            {
              "sr_no": 1,
              "check_list_item": "xucode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_XuCode/main/xucode-cmt-c0--0.22.00.235/patch.xusection.inc"
            }
          ],
          "mcheck": [
            {
              "sr_no": 1,
              "check_list_item": "mcheck Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/Mcheck/main/26ww04/MCHECK_SECTION.inc"
            }
          ],
          "tcode": [
            {
              "sr_no": 1,
              "check_list_item": "tcode Post Binary Staging Area",
              "selection": "No",
              "entry": ""
            }
          ],
          "acode": [
            {
              "sr_no": 1,
              "check_list_item": "acode Post Binary Staging Area",
              "selection": "No",
              "entry": ""
            }
          ],
          "icode": [
            {
              "sr_no": 1,
              "check_list_item": "icode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_iCode/main/0x24164200/icode_enc_dbug.bin"
            }
          ],
          "oobmsm": [
            {
              "sr_no": 1,
              "check_list_item": "oobmsm Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/OOBMSM/main/26ww7.3a/OCODE_SRF_C0_2.8.1.39_patchlet_enc_dbug.bin"
            }
          ],
          "pcode": [
            {
              "sr_no": 1,
              "check_list_item": "pcode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/Pcode/main/26ww08_UPLR4/gnr_atom_b0/pcode-c_enc_dbug.bin"
            }
          ],
          "s3m": [
            {
              "sr_no": 1,
              "check_list_item": "s3m Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/S3M/main/26ww08/26ww08.4_T6104_s3m_fw_SESVN0_SVN1_REVID2.0.0.00171_C0/S3M_1_0_2.0.0.00171_enc_dbug.IP_0100.bin"
            }
          ]
        }
        EOF
        fi
        echo "Using JSON file: $(realpath "$JSON_FILE")"
        echo "=== END JSON FILE HANDLING ==="
    - name: Extract all data from JSON and create configuration file
      run: |
        JSON_FILE=".github/entry_criteria_output.json"
        echo "=== EXTRACTING ALL DATA FROM JSON ==="
        echo "Processing JSON file: $(realpath "$JSON_FILE")"
        
        # Extract milestone from section_1
        MILESTONE=$(jq -r '.section_1[] | select(.check_list_item == "Milestone") | .entry // "UPLR0"' "$JSON_FILE")
        config_file="output_paths/${MILESTONE}_config.txt"
        echo "Creating configuration file: $(realpath "$config_file")"
        
        # Remove existing file if it exists to prevent appending
        rm -f "$config_file"
        
        # Add milestone at the top
        echo "Milestone=$MILESTONE" > "$config_file"
        
        # Extract section_1 data
        echo "Extracting section_1 data..."
        UP_BASE_LINE=$(jq -r '.section_1[] | select(.check_list_item == "UP Base Line Version") | .entry // ""' "$JSON_FILE")
        SVN_VERSION=$(jq -r '.section_1[] | select(.check_list_item == "SVN Version") | .entry // ""' "$JSON_FILE")
        SVN_SE_VERSION=$(jq -r '.section_1[] | select(.check_list_item == "SVN_SE Version") | .entry // ""' "$JSON_FILE")
        MIN_SVN=$(jq -r '.section_1[] | select(.check_list_item == "Min SVN") | .entry // ""' "$JSON_FILE")
        MIN_RUNTIME_ID=$(jq -r '.section_1[] | select(.check_list_item == "Min Runtime ID") | .entry // ""' "$JSON_FILE")
        ROLLBACK_ID=$(jq -r '.section_1[] | select(.check_list_item == "Rollback ID") | .entry // ""' "$JSON_FILE")
        NEW_UP_VERSION=$(jq -r '.section_1[] | select(.check_list_item == "New UP Version") | .entry // ""' "$JSON_FILE")
        
        # Extract component paths
        echo "Extracting component paths..."
        UCODE_PATH=$(jq -r '.ucode[0].entry // ""' "$JSON_FILE")
        XUCODE_PATH=$(jq -r '.xucode[0].entry // ""' "$JSON_FILE")
        MCHECK_PATH=$(jq -r '.mcheck[0].entry // ""' "$JSON_FILE")
        TCODE_PATH=$(jq -r '.tcode[0].entry // ""' "$JSON_FILE")
        ACODE_PATH=$(jq -r '.acode[0].entry // ""' "$JSON_FILE")
        ICODE_PATH=$(jq -r '.icode[0].entry // ""' "$JSON_FILE")
        OOBMSM_PATH=$(jq -r '.oobmsm[0].entry // ""' "$JSON_FILE")
        PCODE_PATH=$(jq -r '.pcode[0].entry // ""' "$JSON_FILE")
        S3M_PATH=$(jq -r '.s3m[0].entry // ""' "$JSON_FILE")
        
        # Append the rest of the configuration
        cat >> "$config_file" << EOF
        UP Base Line Version=$UP_BASE_LINE
        SVN Version=$SVN_VERSION
        SVN_SE Version=$SVN_SE_VERSION
        Min SVN=$MIN_SVN
        Min Runtime ID=$MIN_RUNTIME_ID
        Rollback ID=$ROLLBACK_ID
        New UP Version=$NEW_UP_VERSION
        ucode=$UCODE_PATH
        xucode=$XUCODE_PATH
        mcheck=$MCHECK_PATH
        tcode=$TCODE_PATH
        acode=$ACODE_PATH
        icode=$ICODE_PATH
        oobmsm=$OOBMSM_PATH
        pcode=$PCODE_PATH
        s3m=$S3M_PATH
        EOF
        
        echo "Configuration file created successfully at: $(realpath "$config_file")"
        echo "=== END DATA EXTRACTION ==="
    - name: Display created configuration file
      run: |
        MILESTONE=$(jq -r '.section_1[] | select(.check_list_item == "Milestone") | .entry // "UPLR0"' ".github/entry_criteria_output.json")
        config_file="output_paths/${MILESTONE}_config.txt"
        echo "=== CONFIGURATION FILE CONTENTS ==="
        echo "File location: $(realpath "$config_file")"
        echo "File contents:"
        cat "$config_file"
        echo ""
        echo "File size: $(stat -c%s "$config_file") bytes"
        echo "Line count: $(wc -l < "$config_file")"
        echo "=== END FILE DISPLAY ==="
    - name: Upload configuration file as artifact
      run: |
        MILESTONE=$(jq -r '.section_1[] | select(.check_list_item == "Milestone") | .entry // "UPLR0"' ".github/entry_criteria_output.json")
        config_file="output_paths/${MILESTONE}_config.txt"
        echo "MILESTONE=$MILESTONE" >> $GITHUB_ENV
        echo "CONFIG_FILE=$config_file" >> $GITHUB_ENV
    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: ${{ env.MILESTONE }}-config-${{ github.run_number }}
        path: ${{ env.CONFIG_FILE }}
        retention-days: 30
    - name: Commit configuration file to repository
      run: |
        echo "=== COMMITTING FILE TO REPOSITORY ==="
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        MILESTONE=$(jq -r '.section_1[] | select(.check_list_item == "Milestone") | .entry // "UPLR0"' ".github/entry_criteria_output.json")
        config_file="output_paths/${MILESTONE}_config.txt"
        
        git add "$config_file"
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Add $MILESTONE configuration from entry criteria - Run ${{ github.run_number }}"
          git push
          echo "Configuration file committed and pushed to repository"
        else
          echo "No changes to commit"
        fi
        echo "=== END COMMIT ==="
    - name: Display final status
      run: |
        MILESTONE=$(jq -r '.section_1[] | select(.check_list_item == "Milestone") | .entry // "UPLR0"' ".github/entry_criteria_output.json")
        config_file="output_paths/${MILESTONE}_config.txt"
        
        echo "=== FINAL WORKFLOW STATUS ==="
        echo "Current working directory: $(pwd)"
        echo "Output directory: $(realpath output_paths)"
        echo "Milestone: $MILESTONE"
        echo ""
        echo "Section_1 extraction: Completed"
        echo "Component paths extraction: Completed"
        echo "Configuration file: Created"
        echo ""
        echo "Created file:"
        echo "  - ${MILESTONE}_config.txt: $(realpath "$config_file")"
        echo ""
        echo "Final file contents:"
        cat "$config_file"
        echo ""
        echo "Artifact uploaded: $MILESTONE-config-${{ github.run_number }}"
        echo "File committed to repository: Yes"
        echo "=== END FINAL STATUS ==="
