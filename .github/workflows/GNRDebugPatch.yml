name: GNR Debug Patch Build

on:
  workflow_dispatch:
    inputs:
      json_filename:
        description: 'JSON filename (e.g., GNR_DEBUG_entry.json)'
        required: true
        type: string
      build_description:
        description: 'Build description'
        required: false
        type: string
        default: 'GNR Debug Patch Automated Build'
      environment:
        description: 'Environment'
        required: false
        type: string
        default: 'production'
      trigger_source:
        description: 'Source that triggered this workflow (python_script, web_gui, api_call, manual)'
        required: true
        type: choice
        options:
          - python_script
          - web_gui
          - api_call
          - manual
        default: 'manual'
      callback_url:
        description: 'Callback URL for sending results back to trigger source'
        required: false
        type: string
      session_id:
        description: 'Session ID for tracking this build request'
        required: false
        type: string
      requester_info:
        description: 'Information about who/what requested this build (JSON format)'
        required: false
        type: string
        default: '{"user": "unknown", "timestamp": ""}'

permissions:
  contents: write

env:
  BUILD_BASE_PATH: /nfs/site/disks/dcsg_0729/users/pkummara
  GNR_BUILD_PATH: /nfs/site/disks/dcsg_0729/patches/GNR/B0/build
  KTAB_PATH: /usr/intel/bin/ktab
  KCRON_PATH: /usr/intel/bin/kcron
  PYTHON_PATH: /usr/intel/bin/python3.7.4
  FXT_TOOL_PATH: /nfs/site/disks/dcsg_0729/fxt-tools/MUPPET/fxtMuppet.py
  EXPECT_PATH: /usr/bin/expect
  FACELESS_USER: grp_gnr_fit1_build

jobs:
  session-management:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    outputs:
      session_id: ${{ steps.session.outputs.session_id }}
      trigger_source: ${{ steps.session.outputs.trigger_source }}
      callback_url: ${{ steps.session.outputs.callback_url }}
      requester_info: ${{ steps.session.outputs.requester_info }}

    steps:
      - name: Initialize Session Information
        id: session
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.session_id }}" ]; then
            SESSION_ID="${{ github.event.inputs.session_id }}"
          else
            SESSION_ID="session_$(date +%Y%m%d_%H%M%S)_${{ github.run_id }}"
          fi

          TRIGGER_SOURCE="${{ github.event.inputs.trigger_source }}"
          CALLBACK_URL="${{ github.event.inputs.callback_url }}"
          REQUESTER_INFO='${{ github.event.inputs.requester_info }}'

          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "trigger_source=$TRIGGER_SOURCE" >> "$GITHUB_OUTPUT"
          echo "callback_url=$CALLBACK_URL" >> "$GITHUB_OUTPUT"
          echo "requester_info=$REQUESTER_INFO" >> "$GITHUB_OUTPUT"

          SESSION_FILE="/tmp/build_session_${SESSION_ID}.json"
          cat > "$SESSION_FILE" <<EOF
          {
            "session_id": "$SESSION_ID",
            "trigger_source": "$TRIGGER_SOURCE",
            "callback_url": "$CALLBACK_URL",
            "requester_info": $REQUESTER_INFO,
            "workflow_run_id": "${{ github.run_id }}",
            "repository": "${{ github.repository }}",
            "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "json_filename": "${{ github.event.inputs.json_filename }}"
          }
          EOF

  read-json:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: session-management
    outputs:
      json_path: ${{ steps.validate.outputs.json_path }}
      previous_version: ${{ steps.extract_version.outputs.previous_version }}
      current_version: ${{ steps.extract_version.outputs.current_version }}

    steps:
      - name: Checkout repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          WORKDIR="${GITHUB_WORKSPACE}"
          PARENT_DIR="$(dirname "$WORKDIR")"
          REPO_DIR="$(basename "$WORKDIR")"
          BRANCH="${{ github.ref_name }}"

          mkdir -p "$PARENT_DIR"
          cd "$PARENT_DIR"

          if [ -d "$WORKDIR/.git" ]; then
            cd "$WORKDIR"
            git remote set-url origin "$REPO_URL"
            git fetch --depth=1 origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
          else
            rm -rf "$WORKDIR"
            git clone --depth=1 --branch "$BRANCH" "$REPO_URL" "$REPO_DIR"
            cd "$WORKDIR"
          fi

          git config --global --add safe.directory "$WORKDIR"

      - name: Validate JSON file exists
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          JSON_FILE=".github/json_files/${{ github.event.inputs.json_filename }}"
          if [ ! -f "$JSON_FILE" ]; then
            echo "Error: JSON file '${{ github.event.inputs.json_filename }}' not found"
            exit 1
          fi

          echo "json_path=$JSON_FILE" >> "$GITHUB_OUTPUT"

      - name: Extract and Display Values
        id: extract_version
        shell: bash
        run: |
          set -euo pipefail

          JSON_FILE="${{ steps.validate.outputs.json_path }}"

          extract_section1_value() {
            local item="$1"
            jq -r --arg item "$item" '.section_1[] | select(.check_list_item == $item) | .entry' "$JSON_FILE"
          }

          extract_staging_area() {
            local section="$1"
            jq -r --arg section "$section" '.[$section][0].entry // ""' "$JSON_FILE"
          }

          version=$(extract_section1_value "version")
          prev_version=$(extract_section1_value "prev_version")
          clean_prev_version=$(echo "$prev_version" | sed 's/0x//')
          clean_current_version=$(echo "$version" | sed 's/0x//')

          echo "previous_version=$clean_prev_version" >> "$GITHUB_OUTPUT"
          echo "current_version=$clean_current_version" >> "$GITHUB_OUTPUT"

          components=("ucode" "xucode" "mcheck" "tcode" "acode" "icode" "oobmsm" "pcode-io" "pcode-c" "s3m")
          for component in "${components[@]}"; do
            staging_area=$(extract_staging_area "$component")
            if [ -n "$staging_area" ] && [ "$staging_area" != "null" ] && [ "$staging_area" != "" ]; then
              echo "$component Post Binary Staging Area: $staging_area"
            else
              echo "$component Post Binary Staging Area: [NOT AVAILABLE]"
            fi
          done

      - name: Create Summary
        shell: bash
        run: |
          set -euo pipefail

          JSON_FILE="${{ steps.validate.outputs.json_path }}"
          {
            echo "# GNR Debug Patch Build Pipeline"
            echo ""
            echo "**Session ID:** \`${{ needs.session-management.outputs.session_id }}\`"
            echo "**Trigger Source:** \`${{ needs.session-management.outputs.trigger_source }}\`"
            echo "**JSON File:** \`${{ github.event.inputs.json_filename }}\`"
            echo ""
            echo "## Section 1 Values"
            echo "| Field | Value |"
            echo "|-------|-------|"
            jq -r '.section_1[] | "| \(.check_list_item) | \(.entry) |"' "$JSON_FILE"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-build-start:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [session-management, read-json]
    if: ${{ needs.session-management.outputs.callback_url != '' }}

    steps:
      - name: Send Build Start Notification
        shell: bash
        run: |
          set -euo pipefail

          CALLBACK_URL="${{ needs.session-management.outputs.callback_url }}"
          SESSION_ID="${{ needs.session-management.outputs.session_id }}"

          START_PAYLOAD=$(printf '{"session_id":"%s","status":"build_started","message":"GNR Debug patch build has started","workflow_run_id":"%s","timestamp":"%s","version":"%s","trigger_source":"%s","json_filename":"%s","build_description":"%s"}' \
            "$SESSION_ID" \
            "${{ github.run_id }}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ needs.read-json.outputs.current_version }}" \
            "${{ needs.session-management.outputs.trigger_source }}" \
            "${{ github.event.inputs.json_filename }}" \
            "${{ github.event.inputs.build_description }}")

          curl --noproxy 127.0.0.1 -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -d "$START_PAYLOAD" || echo "Failed to send start notification"

  copy-config:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [session-management, read-json]
    if: ${{ needs.read-json.outputs.previous_version != '' }}

    steps:
      - name: Copy Config File, Set Permissions and Rename Config File
        shell: bash
        run: |
          set -euo pipefail

          PREV_VERSION="${{ needs.read-json.outputs.previous_version }}"
          CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
          BUILD_PATH="${{ env.GNR_BUILD_PATH }}"
          VERSION_PATH="$BUILD_PATH/$PREV_VERSION"
          RELEASE_PATH="$VERSION_PATH/release"
          CONFIG_FILE="config_${PREV_VERSION}.ini"
          SOURCE_CONFIG="$RELEASE_PATH/$CONFIG_FILE"
          DEST_PATH="${{ env.BUILD_BASE_PATH }}"
          DEST_CONFIG="$DEST_PATH/$CONFIG_FILE"
          FINAL_CONFIG="$DEST_PATH/config_${CURRENT_VERSION}.ini"

          [ -d "$VERSION_PATH" ] || { echo "Missing version path: $VERSION_PATH"; exit 1; }
          [ -d "$RELEASE_PATH" ] || { echo "Missing release path: $RELEASE_PATH"; exit 1; }
          [ -f "$SOURCE_CONFIG" ] || { echo "Missing source config: $SOURCE_CONFIG"; exit 1; }

          mkdir -p "$DEST_PATH"
          cp "$SOURCE_CONFIG" "$DEST_CONFIG"
          chmod 777 "$DEST_CONFIG"
          mv "$DEST_CONFIG" "$FINAL_CONFIG"

          [ -f "$FINAL_CONFIG" ] || { echo "Missing final config: $FINAL_CONFIG"; exit 1; }

  prepare-config:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [session-management, read-json, copy-config]
    if: ${{ needs.read-json.outputs.current_version != '' }}

    steps:
      - name: Checkout repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          WORKDIR="${GITHUB_WORKSPACE}"
          PARENT_DIR="$(dirname "$WORKDIR")"
          REPO_DIR="$(basename "$WORKDIR")"
          BRANCH="${{ github.ref_name }}"

          mkdir -p "$PARENT_DIR"
          cd "$PARENT_DIR"

          if [ -d "$WORKDIR/.git" ]; then
            cd "$WORKDIR"
            git remote set-url origin "$REPO_URL"
            git fetch --depth=1 origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
          else
            rm -rf "$WORKDIR"
            git clone --depth=1 --branch "$BRANCH" "$REPO_URL" "$REPO_DIR"
            cd "$WORKDIR"
          fi

          git config --global --add safe.directory "$WORKDIR"

      - name: Update Config File with JSON Values
        shell: bash
        run: |
          set -euo pipefail

          JSON_FILE="${{ needs.read-json.outputs.json_path }}"
          CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
          DEST_PATH="${{ env.BUILD_BASE_PATH }}"
          CONFIG_FILE="$DEST_PATH/config_${CURRENT_VERSION}.ini"

          [ -f "$CONFIG_FILE" ] || { echo "Config not found: $CONFIG_FILE"; exit 1; }
          cp "$CONFIG_FILE" "${CONFIG_FILE}.backup"

          extract_section1_value() {
            local item="$1"
            jq -r --arg item "$item" '.section_1[] | select(.check_list_item == $item) | .entry' "$JSON_FILE"
          }

          extract_staging_area() {
            local section="$1"
            jq -r --arg section "$section" '.[$section][0].entry // ""' "$JSON_FILE"
          }

          has_value() {
            local value="$1"
            value="$(echo "$value" | xargs)"
            [ -n "$value" ] && [ "$value" != "null" ]
          }
          milestone=$(extract_section1_value "Milestone")
          patch_desc=$(extract_section1_value "patch_description")
          version=$(extract_section1_value "version")
          svn=$(extract_section1_value "svn")
          se_svn=$(extract_section1_value "se_svn")
          min_svn=$(extract_section1_value "min_svn")
          min_runtime_id=$(extract_section1_value "min_runtime_id")
          prev_version=$(extract_section1_value "prev_version")

          ucode_path=$(extract_staging_area "ucode")
          xucode_path=$(extract_staging_area "xucode")
          mcheck_path=$(extract_staging_area "mcheck")
          tcode_path=$(extract_staging_area "tcode")
          acode_path=$(extract_staging_area "acode")
          icode_path=$(extract_staging_area "icode")
          oobmsm_path=$(extract_staging_area "oobmsm")
          pcode_io_path=$(extract_staging_area "pcode-io")
          pcode_c_path=$(extract_staging_area "pcode-c")
          s3m_path=$(extract_staging_area "s3m")

          if [ -z "$patch_desc" ] || [ "$patch_desc" = "null" ] || [ "$patch_desc" = " " ]; then
            patch_desc="GNR Debug patch $milestone"
          fi

          sed -i "s/^version = .*/version = $version/" "$CONFIG_FILE"
          sed -i "s/^patch_description = .*/patch_description = $patch_desc/" "$CONFIG_FILE"
          sed -i "s/^prev_version = .*/prev_version = $prev_version/" "$CONFIG_FILE"

          if has_value "$svn"; then
            sed -i "s/^svn = .*/svn = $svn/" "$CONFIG_FILE"
          fi
          if has_value "$se_svn"; then
            sed -i "s/^se_svn = .*/se_svn = $se_svn/" "$CONFIG_FILE"
          fi
          if has_value "$min_svn"; then
            sed -i "s/^min_svn = .*/min_svn = $min_svn/" "$CONFIG_FILE"
          fi
          if has_value "$min_runtime_id"; then
            sed -i "s/^min_runtime_id = .*/min_runtime_id = $min_runtime_id/" "$CONFIG_FILE"
          fi

          if has_value "$icode_path"; then sed -i "s|^icode = .*|icode = $icode_path|" "$CONFIG_FILE"; fi
          if has_value "$oobmsm_path"; then sed -i "s|^oobmsm = .*|oobmsm = $oobmsm_path|" "$CONFIG_FILE"; fi
          if has_value "$s3m_path"; then sed -i "s|^s3m = .*|s3m = $s3m_path|" "$CONFIG_FILE"; fi
          if has_value "$pcode_io_path"; then sed -i "s|^pcode-io = .*|pcode-io = $pcode_io_path|" "$CONFIG_FILE"; fi
          if has_value "$pcode_c_path"; then sed -i "s|^pcode-c = .*|pcode-c = $pcode_c_path|" "$CONFIG_FILE"; fi
          if has_value "$ucode_path"; then sed -i "s|^ucode = .*|ucode = $ucode_path|" "$CONFIG_FILE"; fi
          if has_value "$xucode_path"; then sed -i "s|^xucode = .*|xucode = $xucode_path|" "$CONFIG_FILE"; fi
          if has_value "$mcheck_path"; then sed -i "s|^mcheck = .*|mcheck = $mcheck_path|" "$CONFIG_FILE"; fi

          if ! has_value "$tcode_path"; then
            sed -i "s|^tcode = .*|tcode = none|" "$CONFIG_FILE"
          else
            sed -i "s|^tcode = .*|tcode = $tcode_path|" "$CONFIG_FILE"
          fi

          if ! has_value "$acode_path"; then
            sed -i "s|^acode = .*|acode = none|" "$CONFIG_FILE"
          else
            sed -i "s|^acode = .*|acode = $acode_path|" "$CONFIG_FILE"
          fi

          sed -i "s/^soc_sign = .*/soc_sign = css-debug/" "$CONFIG_FILE"
          sed -i "s/^fit1_sign = .*/fit1_sign = css-debug/" "$CONFIG_FILE"

      - name: Display Final Prepared Config
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
          CONFIG_FILE="${{ env.BUILD_BASE_PATH }}/config_${CURRENT_VERSION}.ini"
          cat "$CONFIG_FILE"

  upload-config:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [session-management, read-json, copy-config, prepare-config]
    if: ${{ needs.read-json.outputs.current_version != '' }}

    steps:
      - name: Upload Config File via GitHub API
        shell: bash
        env:
          REPO_PUSH_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${REPO_PUSH_TOKEN:-}" ]; then
            echo "REPO_PUSH_TOKEN secret is empty or unavailable"
            exit 1
          fi

          CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
          DEST_PATH="${{ env.BUILD_BASE_PATH }}"
          CONFIG_FILE="$DEST_PATH/config_${CURRENT_VERSION}.ini"
          TARGET_PATH="output_paths/gnr_debug/config_${CURRENT_VERSION}.ini"
          API_URL="https://api.github.com/repos/${{ github.repository }}/contents/${TARGET_PATH}"

          [ -f "$CONFIG_FILE" ] || { echo "Config file not found: $CONFIG_FILE"; exit 1; }

          CONTENT_B64=$(base64 -w 0 "$CONFIG_FILE" 2>/dev/null || base64 "$CONFIG_FILE" | tr -d '\n')
          COMMIT_MESSAGE="Add prepared GNR debug config file: config_${CURRENT_VERSION}.ini"

          HTTP_CODE=$(curl -sS -o existing_file.json -w "%{http_code}" \
            -H "Authorization: Bearer ${REPO_PUSH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL")

          if [ "$HTTP_CODE" = "200" ]; then
            FILE_SHA=$(jq -r '.sha' existing_file.json)
            jq -n \
              --arg message "$COMMIT_MESSAGE" \
              --arg content "$CONTENT_B64" \
              --arg sha "$FILE_SHA" \
              --arg branch "${{ github.ref_name }}" \
              --arg name "GitHub Action" \
              --arg email "action@github.com" \
              '{message:$message,content:$content,sha:$sha,branch:$branch,committer:{name:$name,email:$email}}' > payload.json
          elif [ "$HTTP_CODE" = "404" ]; then
            jq -n \
              --arg message "$COMMIT_MESSAGE" \
              --arg content "$CONTENT_B64" \
              --arg branch "${{ github.ref_name }}" \
              --arg name "GitHub Action" \
              --arg email "action@github.com" \
              '{message:$message,content:$content,branch:$branch,committer:{name:$name,email:$email}}' > payload.json
          else
            echo "Failed to query existing file. HTTP status: $HTTP_CODE"
            cat existing_file.json || true
            exit 1
          fi

          RESPONSE_CODE=$(curl -sS -o api_response.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${REPO_PUSH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -d @payload.json \
            "$API_URL")

          if [ "$RESPONSE_CODE" = "200" ] || [ "$RESPONSE_CODE" = "201" ]; then
            echo "Config file uploaded successfully to ${TARGET_PATH}"
            jq -r '.content.html_url // .commit.html_url // "Upload succeeded"' api_response.json
          else
            echo "GitHub API upload failed. HTTP status: $RESPONSE_CODE"
            cat api_response.json || true
            exit 1
          fi

          rm -f existing_file.json payload.json api_response.json

  validate-config:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [session-management, read-json, copy-config, prepare-config, upload-config]
    outputs:
      config_validated: ${{ steps.validate.outputs.config_validated }}
      config_path: ${{ steps.validate.outputs.config_path }}

    steps:
      - name: Validate Prepared Config File Exists
        id: validate
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
          CONFIG_FILE="config_${CURRENT_VERSION}.ini"
          CONFIG_PATH="${{ env.BUILD_BASE_PATH }}/$CONFIG_FILE"

          CONFIG_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '$CONFIG_PATH' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          " )

          if [[ "$CONFIG_CHECK" == "EXISTS" ]]; then
            echo "config_validated=true" >> "$GITHUB_OUTPUT"
            echo "config_path=$CONFIG_PATH" >> "$GITHUB_OUTPUT"
          else
            echo "config_validated=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Display Prepared Config File Contents
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_PATH="${{ steps.validate.outputs.config_path }}"
          CONFIG_CONTENTS=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            cat '$CONFIG_PATH'
          " )

          echo "$CONFIG_CONTENTS"

  kerberos-setup:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [session-management, read-json, validate-config]
    if: ${{ needs.validate-config.outputs.config_validated == 'true' }}

    steps:
      - name: Switch to Build Account for Kerberos Setup
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_USER=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" whoami )
          [ "$CURRENT_USER" = "${{ env.FACELESS_USER }}" ] || exit 1

      - name: Initialize Kerberos Ticket
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
          FA_PASSWORD: ${{ secrets.GNR_FA_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          KTAB_RESULT=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            echo '$FA_PASSWORD' | ${{ env.KTAB_PATH }} -i 2>&1
          " )

          echo "$KTAB_RESULT"
          if echo "$KTAB_RESULT" | grep -q -i "error\|failed\|denied"; then
            exit 1
          fi

      - name: Initialize Kerberos Cron
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          KCRON_RESULT=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            echo 'y' | ${{ env.KCRON_PATH }} -i 2>&1
          " )

          echo "$KCRON_RESULT"
          if echo "$KCRON_RESULT" | grep -q -i "error\|failed\|denied"; then
            exit 1
          fi

  patch-build:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [session-management, read-json, validate-config, kerberos-setup]
    if: ${{ needs.validate-config.outputs.config_validated == 'true' }}

    steps:
      - name: Switch to Faceless Account for Build
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_USER=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" whoami )
          [ "$CURRENT_USER" = "${{ env.FACELESS_USER }}" ] || exit 1

      - name: Verify Build Tools Exist
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          PYTHON_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '${{ env.PYTHON_PATH }}' ]]; then echo 'EXISTS'; else echo 'NOT_FOUND'; fi
          " )
          FXT_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '${{ env.FXT_TOOL_PATH }}' ]]; then echo 'EXISTS'; else echo 'NOT_FOUND'; fi
          " )
          EXPECT_CHECK=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            if [[ -f '${{ env.EXPECT_PATH }}' ]]; then echo 'EXISTS'; else echo 'NOT_FOUND'; fi
          " )

          [[ "$PYTHON_CHECK" == "EXISTS" ]] || exit 1
          [[ "$FXT_CHECK" == "EXISTS" ]] || exit 1
          [[ "$EXPECT_CHECK" == "EXISTS" ]] || exit 1

      - name: Execute GNR Debug Automated Build
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
          CSS_PASSWORD: ${{ secrets.GNR_CSS_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
          CONFIG_FILE="config_${CURRENT_VERSION}.ini"
          OUTPUT_FILE="/tmp/gnr_build_output_${CURRENT_VERSION}_${{ github.run_id }}.log"

          rm -f "$OUTPUT_FILE" || true

          set +e
          (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" env OUTPUT_FILE="$OUTPUT_FILE" CSS_PASSWORD="$CSS_PASSWORD" bash -c "
            set -uo pipefail
            cd '${{ env.BUILD_BASE_PATH }}'

            cat > automated_build_expect.exp <<'EOF'
          #!${{ env.EXPECT_PATH }} -f
          set timeout 1800
          set css_password \$env(CSS_PASSWORD)
          set output_file \$env(OUTPUT_FILE)

          log_file -noappend \$output_file
          spawn ${{ env.PYTHON_PATH }} ${{ env.FXT_TOOL_PATH }} --conf $CONFIG_FILE

          expect {
            \"Enter your CSS password:\" {
              send \"\$css_password\r\"
              exp_continue
            }
            \"Enter your CSS password: \" {
              send \"\$css_password\r\"
              exp_continue
            }
            -re \".*assword.*\" {
              send \"\$css_password\r\"
              exp_continue
            }
            eof {
              catch wait result
              exit [lindex \$result 3]
            }
            timeout {
              puts \"Automated build timed out after 30 minutes\"
              exit 124
            }
          }
          EOF

            chmod +x automated_build_expect.exp

            set +e
            ./automated_build_expect.exp
            BUILD_EXIT=\$?
            set -e

            rm -f automated_build_expect.exp
            exit \$BUILD_EXIT
          "
          BUILD_EXIT_CODE=$?
          set -e

          cat "$OUTPUT_FILE" || true

          if grep -q "FAILURE --" "$OUTPUT_FILE"; then
            echo "Detected failure text in build output"
            exit 1
          fi

          if [ "$BUILD_EXIT_CODE" -ne 0 ]; then
            echo "GNR debug build failed with exit code: $BUILD_EXIT_CODE"
            exit "$BUILD_EXIT_CODE"
          fi

      - name: Verify Automated Build Results
        env:
          BUILD_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
          VERIFICATION_RESULT=$( (echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u "${{ env.FACELESS_USER }}" bash -c "
            cd '${{ env.BUILD_BASE_PATH }}'
            find . -type f -mmin -30 2>/dev/null | head -20 || true
            find . -name '*.patch' -o -name '*.bin' -o -name '*.ucode' 2>/dev/null | head -10 || true
            find . -name '*debug*' -o -name '*css-debug*' 2>/dev/null | head -10 || true
            find . -name '*${CURRENT_VERSION}*' 2>/dev/null | head -10 || true
          " )

          echo "$VERIFICATION_RESULT"

  copy-release-collaterals:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [session-management, read-json, patch-build]
    if: ${{ success() }}

    steps:
      - name: Checkout repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          WORKDIR="${GITHUB_WORKSPACE}"
          PARENT_DIR="$(dirname "$WORKDIR")"
          REPO_DIR="$(basename "$WORKDIR")"
          BRANCH="${{ github.ref_name }}"

          mkdir -p "$PARENT_DIR"
          cd "$PARENT_DIR"

          if [ -d "$WORKDIR/.git" ]; then
            cd "$WORKDIR"
            git remote set-url origin "$REPO_URL"
            git fetch --depth=1 origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
          else
            rm -rf "$WORKDIR"
            git clone --depth=1 --branch "$BRANCH" "$REPO_URL" "$REPO_DIR"
            cd "$WORKDIR"
          fi

          git config --global --add safe.directory "$WORKDIR"

      - name: Copy Release Collaterals to GNR Host
        env:
          GNR_PASSWORD: ${{ secrets.GNR_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
          RELEASE_PATH="/nfs/site/disks/dcsg_0729/patches/GNR/B0/build/${CURRENT_VERSION}/release"
          WINDOWS_DEST='C:\Users\CEFLS_User\Desktop\sunith\pkummara\pkummara\IFWI_INC_PDB\test'
          GNR_HOST="10.138.186.168"
          GNR_USER=".\CEFLS_User"
          CURRENT_VERSION_LOWER=$(echo "$CURRENT_VERSION" | tr '[:upper:]' '[:lower:]')

          [ -d "$RELEASE_PATH" ] || { echo "Release path not found: $RELEASE_PATH"; exit 1; }

          INC_FILES=$(find "$RELEASE_PATH" -maxdepth 1 -name "m_*_*_${CURRENT_VERSION_LOWER}.inc" -type f)
          [ -n "$INC_FILES" ] || { echo "No .inc files found in $RELEASE_PATH"; exit 1; }

          PDB_FILES=$(find "$RELEASE_PATH" -maxdepth 1 -name "m_*_*_${CURRENT_VERSION_LOWER}.pdb" -type f)
          [ -n "$PDB_FILES" ] || { echo "No .pdb files found in $RELEASE_PATH"; exit 1; }

          for INC_FILE in $INC_FILES; do
            FILENAME=$(basename "$INC_FILE")
            export SRC_FILE="$INC_FILE"
            export FILENAME="$FILENAME"
            export GNR_USER="$GNR_USER"
            export GNR_HOST="$GNR_HOST"
            export WINDOWS_DEST="$WINDOWS_DEST"
            /usr/bin/expect .github/scripts/scp_transfer_gnr.exp || exit 1
          done

          for PDB_FILE in $PDB_FILES; do
            FILENAME=$(basename "$PDB_FILE")
            export SRC_FILE="$PDB_FILE"
            export FILENAME="$FILENAME"
            export GNR_USER="$GNR_USER"
            export GNR_HOST="$GNR_HOST"
            export WINDOWS_DEST="$WINDOWS_DEST"
            /usr/bin/expect .github/scripts/scp_transfer_gnr.exp || exit 1
          done

  call-gnr-login:
    needs: [session-management, copy-release-collaterals]
    if: ${{ success() }}
    uses: PrathyushaKummara23/UPIBR-automation/.github/workflows/logingnr.yml@master
    secrets: inherit
    with:
      session_id: ${{ needs.session-management.outputs.session_id }}
      trigger_source: ${{ needs.session-management.outputs.trigger_source }}
      callback_url: ${{ needs.session-management.outputs.callback_url }}

  call-read-gnr-pipeline-result:
    needs: [session-management, call-gnr-login]
    if: ${{ success() }}
    uses: PrathyushaKummara23/UPIBR-automation/.github/workflows/Read_GNR_Pipeline_Result.yml@master
    secrets: inherit
    with:
      session_id: ${{ needs.session-management.outputs.session_id }}
      trigger_source: ${{ needs.session-management.outputs.trigger_source }}
      callback_url: ${{ needs.session-management.outputs.callback_url }}

  notify-final-result:
    runs-on: [self-hosted, Linux, X64, gnrdebugbuild]
    needs: [session-management, read-json, patch-build, copy-release-collaterals, call-gnr-login, call-read-gnr-pipeline-result]
    if: ${{ always() && needs.session-management.outputs.callback_url != '' }}

    steps:
      - name: Send Final Result Notification
        shell: bash
        run: |
          set -euo pipefail

          CALLBACK_URL="${{ needs.session-management.outputs.callback_url }}"
          SESSION_ID="${{ needs.session-management.outputs.session_id }}"
          PIPELINE_STATUS="UNKNOWN"

          if [ "${{ needs.call-read-gnr-pipeline-result.result }}" = "success" ]; then
            PIPELINE_STATUS="PASSED"
          elif [ "${{ needs.call-read-gnr-pipeline-result.result }}" = "failure" ]; then
            PIPELINE_STATUS="FAILED"
          elif [ "${{ needs.call-read-gnr-pipeline-result.result }}" = "cancelled" ]; then
            PIPELINE_STATUS="CANCELLED"
          fi

          BUILD_STATUS="unknown"
          BUILD_MESSAGE="Build completed with unknown status"

          if [ "${{ needs.patch-build.result }}" = "success" ] && [ "${{ needs.copy-release-collaterals.result }}" = "success" ]; then
            if [ "$PIPELINE_STATUS" = "PASSED" ]; then
              BUILD_STATUS="success"
              BUILD_MESSAGE="GNR Debug patch build and pipeline completed successfully"
            elif [ "$PIPELINE_STATUS" = "FAILED" ]; then
              BUILD_STATUS="pipeline_failed"
              BUILD_MESSAGE="GNR Debug patch build completed but pipeline failed"
            elif [ "$PIPELINE_STATUS" = "CANCELLED" ]; then
              BUILD_STATUS="pipeline_cancelled"
              BUILD_MESSAGE="GNR Debug patch build completed but pipeline was cancelled"
            else
              BUILD_STATUS="build_success_pipeline_unknown"
              BUILD_MESSAGE="GNR Debug patch build completed successfully, pipeline status unknown"
            fi
          else
            BUILD_STATUS="build_failed"
            BUILD_MESSAGE="GNR Debug patch build failed"
          fi

          PAYLOAD=$(printf '{"session_id":"%s","status":"%s","message":"%s","workflow_run_id":"%s","timestamp":"%s","version":"%s","trigger_source":"%s","pipeline_status":"%s","build_results":{"patch_build":"%s","copy_collaterals":"%s","gnr_login":"%s","pipeline_result":"%s"},"final_summary":{"json_filename":"%s","build_description":"%s","config_file":"%s","github_repository":"%s","workflow_url":"%s"}}' \
            "$SESSION_ID" \
            "$BUILD_STATUS" \
            "$BUILD_MESSAGE" \
            "${{ github.run_id }}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ needs.read-json.outputs.current_version }}" \
            "${{ needs.session-management.outputs.trigger_source }}" \
            "$PIPELINE_STATUS" \
            "${{ needs.patch-build.result }}" \
            "${{ needs.copy-release-collaterals.result }}" \
            "${{ needs.call-gnr-login.result }}" \
            "${{ needs.call-read-gnr-pipeline-result.result }}" \
            "${{ github.event.inputs.json_filename }}" \
            "${{ github.event.inputs.build_description }}" \
            "config_${{ needs.read-json.outputs.current_version }}.ini" \
            "${{ github.repository }}" \
            "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}")

          curl --noproxy 127.0.0.1 -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Failed to send final notification"
