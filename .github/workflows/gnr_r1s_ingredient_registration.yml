name: GNR_R1S Ingredient Registration

on:
  workflow_dispatch:
    inputs:
      parent_config_ini:
        description: 'Parent GNR config ini path'
        required: true
        type: string
      pcode_path:
        description: 'Optional Pcode drop path for GNR_R1S registration'
        required: false
        type: string
      stepping:
        description: 'Stepping'
        required: false
        type: choice
        options:
          - B0
        default: B0
      trigger_source:
        description: 'Source that triggered this workflow'
        required: true
        type: choice
        options:
          - python_script
          - web_gui
          - api_call
          - manual
        default: manual
      callback_url:
        description: 'Callback URL'
        required: false
        type: string
      session_id:
        description: 'Session ID'
        required: false
        type: string
      requester_info:
        description: 'Requester info JSON'
        required: false
        type: string
        default: '{"user": "unknown", "timestamp": ""}'

permissions:
  contents: read

env:
  PYTHON_PATH: /usr/intel/bin/python3.7.4
  COPYINGR_CLI_PATH: /nfs/site/disks/dcsg_0729/fxt-tools/MUPPT_GNRWS/ManageIngredients/copyIngr_cli.py
  PROGRAM: GNR_R1S
  SSL_CERT_FILE: /var/lib/ca-certificates/ca-bundle.pem
  REQUESTS_CA_BUNDLE: /var/lib/ca-certificates/ca-bundle.pem
  NO_PROXY: localhost,127.0.0.1,.intel.com,fiv-ifwi.intel.com,af01p-sc.devtools.intel.com

jobs:
  session-management:
    runs-on: [self-hosted, Linux, X64, gnrr1sregister]
    outputs:
      session_id: ${{ steps.session.outputs.session_id }}
      trigger_source: ${{ steps.session.outputs.trigger_source }}
      callback_url: ${{ steps.session.outputs.callback_url }}
      requester_info: ${{ steps.session.outputs.requester_info }}
    steps:
      - name: Initialize Session Information
        id: session
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.session_id }}" ]; then
            SESSION_ID="${{ github.event.inputs.session_id }}"
          else
            SESSION_ID="gnr_r1s_reg_$(date +%Y%m%d_%H%M%S)_${{ github.run_id }}"
          fi
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "trigger_source=${{ github.event.inputs.trigger_source }}" >> "$GITHUB_OUTPUT"
          echo "callback_url=${{ github.event.inputs.callback_url }}" >> "$GITHUB_OUTPUT"
          echo "requester_info=${{ github.event.inputs.requester_info }}" >> "$GITHUB_OUTPUT"

  validate-inputs:
    runs-on: [self-hosted, Linux, X64, gnrr1sregister]
    needs: session-management
    outputs:
      parent_config_ini: ${{ steps.validate.outputs.parent_config_ini }}
      pcode_path: ${{ steps.validate.outputs.pcode_path }}
      stepping: ${{ steps.validate.outputs.stepping }}
      has_pcode: ${{ steps.validate.outputs.has_pcode }}
    steps:
      - name: Validate required paths and tools
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          PARENT_CONFIG="${{ github.event.inputs.parent_config_ini }}"
          PCODE_PATH="${{ github.event.inputs.pcode_path }}"
          STEPPING="${{ github.event.inputs.stepping }}"

          [ -f "${{ env.PYTHON_PATH }}" ] || { echo "Python not found: ${{ env.PYTHON_PATH }}"; exit 1; }
          [ -f "${{ env.COPYINGR_CLI_PATH }}" ] || { echo "CLI script not found: ${{ env.COPYINGR_CLI_PATH }}"; exit 1; }
          [ -f "$PARENT_CONFIG" ] || { echo "Parent config not found: $PARENT_CONFIG"; exit 1; }

          HAS_PCODE=false
          if [ -n "$PCODE_PATH" ]; then
            [ -d "$PCODE_PATH" ] || { echo "Pcode path not found: $PCODE_PATH"; exit 1; }
            HAS_PCODE=true
          fi

          echo "parent_config_ini=$PARENT_CONFIG" >> "$GITHUB_OUTPUT"
          echo "pcode_path=$PCODE_PATH" >> "$GITHUB_OUTPUT"
          echo "stepping=$STEPPING" >> "$GITHUB_OUTPUT"
          echo "has_pcode=$HAS_PCODE" >> "$GITHUB_OUTPUT"

      - name: Dry Run Validation
        shell: bash
        run: |
          set -euo pipefail
          "${{ env.PYTHON_PATH }}" "${{ env.COPYINGR_CLI_PATH }}" \
            --config "${{ steps.validate.outputs.parent_config_ini }}" \
            --program "${{ env.PROGRAM }}" \
            --dry-run

  register-ingredients:
    runs-on: [self-hosted, Linux, X64, gnrr1sregister]
    needs: [session-management, validate-inputs]
    steps:
      - name: Debug auth and env
        shell: bash
        run: |
          set -euo pipefail
          whoami
          echo "uid=$(id -u)"
          echo "KRB5CCNAME=${KRB5CCNAME:-}"
          echo "SSL_CERT_FILE=${SSL_CERT_FILE:-}"
          echo "REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-}"
          echo "NO_PROXY=${NO_PROXY:-}"
          env | egrep 'HTTP_PROXY|HTTPS_PROXY|NO_PROXY|http_proxy|https_proxy|no_proxy|REQUESTS_CA_BUNDLE|SSL_CERT_FILE|KRB5' || true
          ls -l /tmp/krb5cc_* || true
          klist || true

      - name: Run reusable ingredient registration
        shell: bash
        run: |
          set -euo pipefail
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
          export NO_PROXY="${{ env.NO_PROXY }}"
          export no_proxy="$NO_PROXY"
          export SSL_CERT_FILE="${{ env.SSL_CERT_FILE }}"
          export REQUESTS_CA_BUNDLE="${{ env.REQUESTS_CA_BUNDLE }}"

          if [ -z "${KRB5CCNAME:-}" ]; then
            USER_KRB_CACHE="/tmp/krb5cc_$(id -u)"
            if [ -r "$USER_KRB_CACHE" ]; then
              export KRB5CCNAME="FILE:$USER_KRB_CACHE"
            fi
          fi

          echo "uid=$(id -u)"
          echo "Using KRB5CCNAME=${KRB5CCNAME:-unset}"
          klist || true

          "${{ env.PYTHON_PATH }}" "${{ env.COPYINGR_CLI_PATH }}" \
            --config "${{ needs.validate-inputs.outputs.parent_config_ini }}" \
            --program "${{ env.PROGRAM }}" \
            --copy-reusable \
            --upload-reusable

      - name: Run optional Pcode upload
        if: ${{ needs.validate-inputs.outputs.has_pcode == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
          export NO_PROXY="${{ env.NO_PROXY }}"
          export no_proxy="$NO_PROXY"
          export SSL_CERT_FILE="${{ env.SSL_CERT_FILE }}"
          export REQUESTS_CA_BUNDLE="${{ env.REQUESTS_CA_BUNDLE }}"

          if [ -z "${KRB5CCNAME:-}" ]; then
            USER_KRB_CACHE="/tmp/krb5cc_$(id -u)"
            if [ -r "$USER_KRB_CACHE" ]; then
              export KRB5CCNAME="FILE:$USER_KRB_CACHE"
            fi
          fi

          echo "uid=$(id -u)"
          echo "Using KRB5CCNAME=${KRB5CCNAME:-unset}"
          klist || true

          "${{ env.PYTHON_PATH }}" "${{ env.COPYINGR_CLI_PATH }}" \
            --config "${{ needs.validate-inputs.outputs.parent_config_ini }}" \
            --program "${{ env.PROGRAM }}" \
            --upload-pcode \
            --pcode-path "${{ needs.validate-inputs.outputs.pcode_path }}" \
            --stepping "${{ needs.validate-inputs.outputs.stepping }}"

      - name: Append Success Summary
        if: ${{ success() }}
        shell: bash
        run: |
          {
            echo "# GNR_R1S Ingredient Registration"
            echo ""
            echo "Reusable ingredient registration completed successfully."
            if [ "${{ needs.validate-inputs.outputs.has_pcode }}" = "true" ]; then
              echo "Pcode upload was also executed."
            else
              echo "Pcode upload was skipped because no pcode_path was provided."
            fi
            echo ""
            echo "Next step: manually trigger the GNR_R1S Debug Patch Build workflow."
          } >> "$GITHUB_STEP_SUMMARY"
