name: Read Pipeline Result

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      SRF_PASSWORD:
        required: true

jobs:
  read-pipeline-result:
    name: Read Pipeline Result
    runs-on: [self-hosted, node16]

    steps:
      - name: Read pipeline_result.txt from Windows host
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        run: |
          echo "================================================="
          echo "  Reading pipeline_result.txt from Windows Host"
          echo "================================================="

          cat > /tmp/read_result_${{ github.run_id }}.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 60
          set password $env(SRF_PASSWORD)

          log_user 0
          spawn ssh -tt \
            -o StrictHostKeyChecking=no \
            -o ForwardX11=no \
            -o ForwardX11Trusted=no \
            CEFLS_User@10.138.186.133
          log_user 1

          expect {
            "*assword:*" { send "$password\r" }
            timeout      { puts "FAILURE: Connection timed out"; exit 1 }
          }

          # absorb banner + escape noise
          expect {
            -re {[>$#%\]]} { }
            timeout { puts "FAILURE: Shell prompt not received"; exit 1 }
          }

          send "@echo off\r"

          expect {
            -re {[>$#%\]]} { }
            timeout { puts "FAILURE: echo off did not complete"; exit 1 }
          }

          send "type C:\\pkummara\\logs\\pipeline_result.txt\r"

          # capture result
          expect {
            -re {(PASSED|FAILED[^\r\n]*|RUNNING)} {
              puts "FILE_CONTENT=$expect_out(0,string)"
            }
            timeout { puts "FAILURE: Could not read result file"; exit 1 }
          }

          # ── No prompt wait — send exit immediately ───────────────
          send "exit\r"
          expect eof
          EOF

          chmod +x /tmp/read_result_${{ github.run_id }}.exp

          /usr/bin/expect /tmp/read_result_${{ github.run_id }}.exp \
            > /tmp/result_output_${{ github.run_id }}.txt 2>&1 || true

          rm -f /tmp/read_result_${{ github.run_id }}.exp

          echo "========== pipeline_result.txt CONTENTS =========="
          cat /tmp/result_output_${{ github.run_id }}.txt
          echo "==================================================="

          if grep -q "PASSED" /tmp/result_output_${{ github.run_id }}.txt; then
            echo ""
            echo "✅ PIPELINE RESULT: PASSED"
            PIPELINE_STATUS="PASSED"
          elif grep -q "FAILED" /tmp/result_output_${{ github.run_id }}.txt; then
            FAILED_REASON=$(grep "FAILED" /tmp/result_output_${{ github.run_id }}.txt | head -1)
            echo ""
            echo "❌ PIPELINE RESULT: $FAILED_REASON"
            PIPELINE_STATUS="FAILED"
          elif grep -q "RUNNING" /tmp/result_output_${{ github.run_id }}.txt; then
            echo ""
            echo "⚠️  PIPELINE RESULT: Still RUNNING"
            PIPELINE_STATUS="RUNNING"
          else
            echo ""
            echo "❓ PIPELINE RESULT: Unknown"
            PIPELINE_STATUS="UNKNOWN"
          fi

          rm -f /tmp/result_output_${{ github.run_id }}.txt

          # ═══════════════════════════════════════════════════════════
          # 📄 CREATE OUTPUT FILE WITH PIPELINE STATUS
          # ═══════════════════════════════════════════════════════════
          
          OUTPUT_STATUS_FILE="Output_pipeline_Status.txt"
          
          echo "================================================="
          echo "        📄 CREATING OUTPUT STATUS FILE"
          echo "================================================="
          echo "📁 Creating file: $OUTPUT_STATUS_FILE"
          echo "📊 Pipeline Status: $PIPELINE_STATUS"
          
          # Create the output file with pipeline status
          echo "$PIPELINE_STATUS" > "$OUTPUT_STATUS_FILE"
          
          # Verify file creation
          if [ -f "$OUTPUT_STATUS_FILE" ]; then
            echo "✅ SUCCESS: Output file created successfully!"
            echo "📄 File: $OUTPUT_STATUS_FILE"
            echo "📁 Location: $(pwd)/$OUTPUT_STATUS_FILE"
            echo "📊 File size: $(wc -c < "$OUTPUT_STATUS_FILE") bytes"
            echo ""
            echo "========== $OUTPUT_STATUS_FILE CONTENTS =========="
            cat "$OUTPUT_STATUS_FILE"
            echo "================================================="
          else
            echo "❌ ERROR: Failed to create output file!"
            exit 1
          fi

          {
            echo "## 📄 Pipeline Result"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Result File | \`C:\pkummara\logs\pipeline_result.txt\` |"
            echo "| Status | **${PIPELINE_STATUS}** |"
            echo "| Windows Host | \`10.138.186.133\` |"
            echo ""
            echo "## 📁 Output Status File"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Output File | \`$OUTPUT_STATUS_FILE\` |"
            echo "| Content | \`$PIPELINE_STATUS\` |"
            echo "| Size | $(wc -c < "$OUTPUT_STATUS_FILE") bytes |"
            echo "| Location | \`$(pwd)/$OUTPUT_STATUS_FILE\` |"
          } >> $GITHUB_STEP_SUMMARY

          if [ "$PIPELINE_STATUS" != "PASSED" ]; then
            exit 1
          fi

      - name: Upload Output_pipeline_Status.txt as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-status-output-${{ github.run_id }}
          path: Output_pipeline_Status.txt
          retention-days: 30
          if-no-files-found: error
