name: Read Pipeline Result

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      SRF_PASSWORD:
        required: true

jobs:
  read-pipeline-result:
    name: Read Pipeline Result
    runs-on: [self-hosted, node16]

    steps:
      - name: Read pipeline_result.txt from Windows host
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        run: |
          echo "================================================="
          echo "  Reading pipeline_result.txt from Windows Host"
          echo "================================================="

          cat > /tmp/read_result_${{ github.run_id }}.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 60
          set password $env(SRF_PASSWORD)

          log_user 0
          spawn ssh -tt \
            -o StrictHostKeyChecking=no \
            -o ForwardX11=no \
            -o ForwardX11Trusted=no \
            CEFLS_User@10.138.186.133
          log_user 1

          expect {
            "*assword:*" { send "$password\r" }
            timeout      { puts "FAILURE: Connection timed out"; exit 1 }
          }

          # absorb banner + escape noise
          expect {
            -re {[>$#%\]]} { }
            timeout { puts "FAILURE: Shell prompt not received"; exit 1 }
          }

          send "@echo off\r"

          expect {
            -re {[>$#%\]]} { }
            timeout { puts "FAILURE: echo off did not complete"; exit 1 }
          }

          send "type C:\\pkummara\\logs\\pipeline_result.txt\r"

          # capture result
          expect {
            -re {(PASSED|FAILED[^\r\n]*|RUNNING)} {
              puts "FILE_CONTENT=$expect_out(0,string)"
            }
            timeout { puts "FAILURE: Could not read result file"; exit 1 }
          }

          send "exit\r"
          expect eof
          EOF

          chmod +x /tmp/read_result_${{ github.run_id }}.exp

          /usr/bin/expect /tmp/read_result_${{ github.run_id }}.exp \
            > /tmp/result_output_${{ github.run_id }}.txt 2>&1 || true

          rm -f /tmp/read_result_${{ github.run_id }}.exp

          echo "========== pipeline_result.txt CONTENTS =========="
          cat /tmp/result_output_${{ github.run_id }}.txt
          echo "==================================================="

          if grep -q "PASSED" /tmp/result_output_${{ github.run_id }}.txt; then
            echo ""
            echo "✅ PIPELINE RESULT: PASSED"
            PIPELINE_STATUS="PASSED"
          elif grep -q "FAILED" /tmp/result_output_${{ github.run_id }}.txt; then
            FAILED_REASON=$(grep "FAILED" /tmp/result_output_${{ github.run_id }}.txt | head -1)
            echo ""
            echo "❌ PIPELINE RESULT: $FAILED_REASON"
            PIPELINE_STATUS="FAILED"
          elif grep -q "RUNNING" /tmp/result_output_${{ github.run_id }}.txt; then
            echo ""
            echo "⚠️  PIPELINE RESULT: Still RUNNING"
            PIPELINE_STATUS="RUNNING"
          else
            echo ""
            echo "❓ PIPELINE RESULT: Unknown"
            PIPELINE_STATUS="UNKNOWN"
          fi

          rm -f /tmp/result_output_${{ github.run_id }}.txt

          echo ""
          echo "================================================="
          echo "           📄 PIPELINE RESULT SUMMARY"
          echo "================================================="
          echo ""
          echo "## 📄 Pipeline Result"
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Result File | \`C:\pkummara\logs\pipeline_result.txt\` |"
          echo "| Status | **${PIPELINE_STATUS}** |"
          echo "| Windows Host | \`10.138.186.133\` |"
          echo ""
          echo "================================================="
          echo "         📄 SUMMARY ECHOED TO CONSOLE LOGS"
          echo "================================================="

          OUTPUT_FILE="pipeline_result.txt"
          echo "📁 Creating output file: $OUTPUT_FILE"

          cat > "$OUTPUT_FILE" << 'FILEEOF'
          ## 📄 Pipeline Result
          
          | Field | Value |
          |-------|-------|
          | Result File | `C:\pkummara\logs\pipeline_result.txt` |
          | Status | **PIPELINE_STATUS_PLACEHOLDER** |
          | Windows Host | `10.138.186.133` |
          | Workflow Run ID | WORKFLOW_RUN_ID_PLACEHOLDER |
          | Timestamp | TIMESTAMP_PLACEHOLDER |
          | Repository | REPOSITORY_PLACEHOLDER |
          | Triggered By | TRIGGERED_BY_PLACEHOLDER |
          | Branch/Ref | BRANCH_REF_PLACEHOLDER |
          
          ---
          
          ### 📊 Additional Details
          - **Workflow Name**: WORKFLOW_NAME_PLACEHOLDER
          - **Job Name**: JOB_NAME_PLACEHOLDER
          - **Runner**: RUNNER_NAME_PLACEHOLDER
          - **Event**: EVENT_NAME_PLACEHOLDER
          
          ---
          **Generated by GitHub Actions Workflow**
          **File: pipeline_result.txt (Fixed Filename)**
          FILEEOF

          # Replace placeholders with actual values
          sed -i "s/PIPELINE_STATUS_PLACEHOLDER/${PIPELINE_STATUS}/g" "$OUTPUT_FILE"
          sed -i "s/WORKFLOW_RUN_ID_PLACEHOLDER/${{ github.run_id }}/g" "$OUTPUT_FILE"
          sed -i "s/TIMESTAMP_PLACEHOLDER/$(date -u '+%Y-%m-%d %H:%M:%S UTC')/g" "$OUTPUT_FILE"
          sed -i "s|REPOSITORY_PLACEHOLDER|${{ github.repository }}|g" "$OUTPUT_FILE"
          sed -i "s/TRIGGERED_BY_PLACEHOLDER/${{ github.actor }}/g" "$OUTPUT_FILE"
          sed -i "s|BRANCH_REF_PLACEHOLDER|${{ github.ref }}|g" "$OUTPUT_FILE"
          sed -i "s/WORKFLOW_NAME_PLACEHOLDER/${{ github.workflow }}/g" "$OUTPUT_FILE"
          sed -i "s/JOB_NAME_PLACEHOLDER/${{ github.job }}/g" "$OUTPUT_FILE"
          sed -i "s/RUNNER_NAME_PLACEHOLDER/${{ runner.name }}/g" "$OUTPUT_FILE"
          sed -i "s/EVENT_NAME_PLACEHOLDER/${{ github.event_name }}/g" "$OUTPUT_FILE"

          echo "✅ Output file created successfully!"
          echo ""
          echo "📄 File: $OUTPUT_FILE"
          echo "📁 Location: $(pwd)/$OUTPUT_FILE"
          echo "📊 File size: $(wc -c < "$OUTPUT_FILE") bytes"
          echo ""
          echo "========== pipeline_result.txt FILE CONTENTS =========="
          cat "$OUTPUT_FILE"
          echo "========================================================"

          {
            echo "## 📄 Pipeline Result"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Result File | \`C:\pkummara\logs\pipeline_result.txt\` |"
            echo "| Status | **${PIPELINE_STATUS}** |"
            echo "| Windows Host | \`10.138.186.133\` |"
            echo ""
            echo "## 📁 Generated Output File"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Output File | \`pipeline_result.txt\` |"
            echo "| Location | \`$(pwd)/pipeline_result.txt\` |"
            echo "| Size | $(wc -c < "$OUTPUT_FILE") bytes |"
            echo "| Created | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
          } >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "================================================="
          echo "              🎯 WORKFLOW COMPLETION"
          echo "================================================="

          if [ "$PIPELINE_STATUS" != "PASSED" ]; then
            echo "💥 WORKFLOW FAILED: Pipeline status is $PIPELINE_STATUS"
            echo "📄 Check the pipeline_result.txt file for details"
            echo "================================================="
            exit 1
          else
            echo "🎉 WORKFLOW SUCCESS: Pipeline status is PASSED"
            echo "📄 Results saved to pipeline_result.txt"
            echo "================================================="
          fi

      - name: Upload pipeline_result.txt as artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: pipeline-result
          path: pipeline_result.txt
          retention-days: 30
