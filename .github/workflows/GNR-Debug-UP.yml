name: GNR Engineering Debug UP Build - Complete Pipeline

on:
  workflow_dispatch:
    inputs:
      baseline_version:
        description: 'Baseline version (used to locate source config, e.g. 81200410)'
        required: true
        type: string
      current_version:
        description: 'Current version being built (used for new config filename and version fields, e.g. 81200411)'
        required: true
        type: string
      build_description:
        description: 'Build description'
        required: false
        type: string
        default: 'GNR Engineering Debug UP Automated Build'

env:
  BUILD_BASE_PATH: /nfs/site/disks/dcsg_0729/users/pkummara
  KTAB_PATH: /usr/intel/bin/ktab
  KCRON_PATH: /usr/intel/bin/kcron
  PYTHON_PATH: /usr/intel/bin/python3.7.4
  FXT_TOOL_PATH: /nfs/site/disks/dcsg_0729/fxt-tools/MUPPET/fxtMuppet.py
  EXPECT_PATH: /usr/bin/expect
  GNR_BUILD_BASE: /nfs/site/disks/dcsg_0729/patches/GNR/B0/build

jobs:
  read-config:
    runs-on: [self-hosted, node16]
    permissions:
      contents: read
    outputs:
      baseline_version: ${{ steps.read.outputs.baseline_version }}
      current_version: ${{ steps.read.outputs.current_version }}
      config_source_path: ${{ steps.read.outputs.config_source_path }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Read and Display Baseline Config
      id: read
      run: |
        BASELINE_VERSION="${{ github.event.inputs.baseline_version }}"
        CURRENT_VERSION="${{ github.event.inputs.current_version }}"
        SOURCE_DIR="${{ env.GNR_BUILD_BASE }}/${BASELINE_VERSION}/release"
        SOURCE_CONFIG="${SOURCE_DIR}/config_${BASELINE_VERSION}.ini"

        echo "🔍 GNR Debug UP Build - Read Baseline Config"
        echo "=================================================="
        echo "📋 Baseline Version : $BASELINE_VERSION"
        echo "📋 Current Version  : $CURRENT_VERSION"
        echo "📂 Source Directory : $SOURCE_DIR"
        echo "📄 Source Config    : $SOURCE_CONFIG"
        echo "=================================================="

        # Validate source directory
        if [ ! -d "$SOURCE_DIR" ]; then
          echo "❌ Error: Source directory not found: $SOURCE_DIR"
          echo ""
          echo "📁 Available builds in GNR B0 build path:"
          if [ -d "${{ env.GNR_BUILD_BASE }}" ]; then
            ls -la "${{ env.GNR_BUILD_BASE }}" | grep '^d' | awk '{print "  - " $9}' | grep -v '^\.$\|^\.\.$' || echo "  No directories found"
          else
            echo "  Build base path '${{ env.GNR_BUILD_BASE }}' does not exist"
          fi
          exit 1
        fi

        # Validate source config file
        if [ ! -f "$SOURCE_CONFIG" ]; then
          echo "❌ Error: Source config not found: $SOURCE_CONFIG"
          echo ""
          echo "📁 Available files in source directory:"
          ls -la "$SOURCE_DIR" 2>/dev/null || echo "  Cannot list files in source directory"
          exit 1
        fi

        echo "✅ Source config found: $SOURCE_CONFIG"
        echo ""

        # Display all *code paths from the baseline config
        echo "📦 *CODE PATHS FROM BASELINE CONFIG:"
        echo "====================================="
        grep -E '^\s*(ucode|xucode|mcheck|tcode|acode|icode|oobmsm|pcode-io|pcode-c|s3m|pcode)\s*=' "$SOURCE_CONFIG" | while IFS= read -r line; do
          key=$(echo "$line" | awk -F '=' '{print $1}' | xargs)
          val=$(echo "$line" | cut -d'=' -f2- | xargs)
          if [ -n "$val" ] && [ "$val" != "none" ]; then
            echo "  ✅ $key = $val"
          else
            echo "  ⚠️  $key = [NOT SET / none]"
          fi
        done
        echo ""

        # Display full config for reference
        echo "📋 FULL BASELINE CONFIG CONTENTS:"
        echo "==================================="
        cat "$SOURCE_CONFIG"
        echo ""
        echo "==================================="

        # Set outputs
        echo "baseline_version=$BASELINE_VERSION" >> $GITHUB_OUTPUT
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "config_source_path=$SOURCE_CONFIG" >> $GITHUB_OUTPUT

        echo "✅ Baseline config read successfully!"

    - name: Create Summary
      run: |
        BASELINE_VERSION="${{ github.event.inputs.baseline_version }}"
        CURRENT_VERSION="${{ github.event.inputs.current_version }}"
        SOURCE_CONFIG="${{ env.GNR_BUILD_BASE }}/${BASELINE_VERSION}/release/config_${BASELINE_VERSION}.ini"

        {
          echo "# 📊 GNR Engineering Debug UP Build Pipeline"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Baseline Version | \`$BASELINE_VERSION\` |"
          echo "| Current Version  | \`$CURRENT_VERSION\` |"
          echo "| Source Config    | \`$SOURCE_CONFIG\` |"
          echo "| New Config File  | \`config_${CURRENT_VERSION}.ini\` |"
          echo "| version field    | \`0x${CURRENT_VERSION}\` |"
          echo "| prev_version field | \`0x${CURRENT_VERSION}\` |"
          echo ""
          echo "## 📦 *Code Paths (from baseline config)"
          echo "| Component | Path |"
          echo "|-----------|------|"
          if [ -f "$SOURCE_CONFIG" ]; then
            grep -E '^\s*(ucode|xucode|mcheck|tcode|acode|icode|oobmsm|pcode-io|pcode-c|s3m|pcode)\s*=' "$SOURCE_CONFIG" | while IFS= read -r line; do
              key=$(echo "$line" | awk -F '=' '{print $1}' | xargs)
              val=$(echo "$line" | cut -d'=' -f2- | xargs)
              echo "| $key | \`$val\` |"
            done
          fi
        } >> $GITHUB_STEP_SUMMARY

  copy-config:
    runs-on: [self-hosted, node16]
    permissions: {}
    needs: read-config
    if: ${{ needs.read-config.outputs.baseline_version != '' }}

    steps:
    - name: Copy Config File, Set Permissions and Rename
      run: |
        BASELINE_VERSION="${{ needs.read-config.outputs.baseline_version }}"
        CURRENT_VERSION="${{ needs.read-config.outputs.current_version }}"
        SOURCE_DIR="${{ env.GNR_BUILD_BASE }}/${BASELINE_VERSION}/release"
        SOURCE_CONFIG="${SOURCE_DIR}/config_${BASELINE_VERSION}.ini"
        DEST_PATH="${{ env.BUILD_BASE_PATH }}"
        DEST_CONFIG="${DEST_PATH}/config_${BASELINE_VERSION}.ini"
        FINAL_CONFIG="${DEST_PATH}/config_${CURRENT_VERSION}.ini"

        echo "🔍 Config File Copy Operation"
        echo "=================================================="
        echo "📋 Baseline Version : $BASELINE_VERSION"
        echo "📋 Current Version  : $CURRENT_VERSION"
        echo "📥 Source           : $SOURCE_CONFIG"
        echo "📤 Destination      : $DEST_CONFIG"
        echo "🔄 Final Renamed    : $FINAL_CONFIG"
        echo "=================================================="

        # Check source config exists
        if [ ! -f "$SOURCE_CONFIG" ]; then
          echo "❌ Error: Source config file not found: $SOURCE_CONFIG"
          exit 1
        fi

        echo "✅ Source config found: $SOURCE_CONFIG"

        SOURCE_SIZE=$(stat -c%s "$SOURCE_CONFIG" 2>/dev/null || echo "unknown")
        echo "📊 Source file size: $SOURCE_SIZE bytes"

        # Create destination directory if needed
        if [ ! -d "$DEST_PATH" ]; then
          echo "📁 Creating destination directory: $DEST_PATH"
          mkdir -p "$DEST_PATH"
          if [ $? -eq 0 ]; then
            echo "✅ Destination directory created"
          else
            echo "❌ Failed to create destination directory"
            exit 1
          fi
        else
          echo "✅ Destination directory exists: $DEST_PATH"
        fi

        # Copy config file
        echo ""
        echo "📋 Copying config file..."
        cp "$SOURCE_CONFIG" "$DEST_CONFIG"

        if [ $? -eq 0 ]; then
          echo "✅ Config file copied successfully"
          DEST_SIZE=$(stat -c%s "$DEST_CONFIG" 2>/dev/null || echo "unknown")
          if [ "$SOURCE_SIZE" = "$DEST_SIZE" ]; then
            echo "✅ File integrity verified (sizes match: $SOURCE_SIZE bytes)"
          else
            echo "⚠️  Warning: File sizes don't match (Source: $SOURCE_SIZE, Dest: $DEST_SIZE)"
          fi
        else
          echo "❌ Failed to copy config file"
          exit 1
        fi

        # Set permissions to 777
        echo ""
        echo "🔐 Setting permissions to 777..."
        chmod 777 "$DEST_CONFIG"

        if [ $? -eq 0 ]; then
          NEW_PERMS=$(ls -la "$DEST_CONFIG" | awk '{print $1}')
          echo "✅ Permissions set to 777: $NEW_PERMS"
        else
          echo "❌ Failed to change permissions"
          exit 1
        fi

        # Rename to current version
        echo ""
        echo "🔄 Renaming config file to current version..."
        mv "$DEST_CONFIG" "$FINAL_CONFIG"

        if [ $? -eq 0 ]; then
          echo "✅ Config file renamed successfully"
          FINAL_SIZE=$(stat -c%s "$FINAL_CONFIG" 2>/dev/null || echo "unknown")
          FINAL_PERMS=$(ls -la "$FINAL_CONFIG" | awk '{print $1}')
          echo "📊 Final file size: $FINAL_SIZE bytes"
          echo "🔐 Final file permissions: $FINAL_PERMS"
        else
          echo "❌ Failed to rename config file"
          exit 1
        fi

        echo ""
        echo "✅ Config file copy, permission, and rename completed successfully!"

  prepare-config:
    runs-on: [self-hosted, node16]
    permissions:
      contents: read
    needs: [read-config, copy-config]
    if: ${{ needs.read-config.outputs.current_version != '' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Update Config File with Current Version Values
      run: |
        CURRENT_VERSION="${{ needs.read-config.outputs.current_version }}"
        DEST_PATH="${{ env.BUILD_BASE_PATH }}"
        CONFIG_FILE="${DEST_PATH}/config_${CURRENT_VERSION}.ini"

        echo "🔧 Preparing GNR Debug UP Config File"
        echo "=================================================="
        echo "📋 Current Version : $CURRENT_VERSION"
        echo "📄 Config File     : $CONFIG_FILE"
        echo "=================================================="

        # Check config file exists
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ Error: Config file not found: $CONFIG_FILE"
          exit 1
        fi

        echo "✅ Config file found: $CONFIG_FILE"

        # Create backup
        BACKUP_CONFIG="${CONFIG_FILE}.backup"
        cp "$CONFIG_FILE" "$BACKUP_CONFIG"
        echo "📋 Backup created: $BACKUP_CONFIG"

        echo ""
        echo "🔧 Updating config file values..."

        # Update version field: version = 0x<current_version>
        sed -i "s/^version = .*/version = 0x${CURRENT_VERSION}/" "$CONFIG_FILE"
        echo "✅ Updated: version = 0x${CURRENT_VERSION}"

        # Update prev_version field: prev_version = 0x<current_version>
        sed -i "s/^prev_version = .*/prev_version = 0x${CURRENT_VERSION}/" "$CONFIG_FILE"
        echo "✅ Updated: prev_version = 0x${CURRENT_VERSION}"

        # Ensure sign types are css-debug
        sed -i "s/^soc_sign = .*/soc_sign = css-debug/" "$CONFIG_FILE"
        echo "✅ Updated: soc_sign = css-debug"
        sed -i "s/^fit1_sign = .*/fit1_sign = css-debug/" "$CONFIG_FILE"
        echo "✅ Updated: fit1_sign = css-debug"

        echo ""
        echo "📋 UPDATED CONFIG FILE CONTENTS:"
        echo "================================="
        cat "$CONFIG_FILE"
        echo ""
        echo "================================="

        echo ""
        echo "✅ Config file preparation completed successfully!"
        echo ""
        echo "📋 OPERATION SUMMARY:"
        echo "===================="
        echo "✅ Config file   : $CONFIG_FILE"
        echo "✅ Backup file   : $BACKUP_CONFIG"
        echo "✅ version       : 0x${CURRENT_VERSION}"
        echo "✅ prev_version  : 0x${CURRENT_VERSION}"
        echo "✅ soc_sign      : css-debug"
        echo "✅ fit1_sign     : css-debug"
        echo "✅ *code paths   : retained from baseline config"
        echo "✅ Status        : SUCCESS"

  upload-config:
    runs-on: [self-hosted, node16]
    permissions:
      contents: write
    needs: [read-config, copy-config, prepare-config]
    if: ${{ needs.read-config.outputs.current_version != '' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Config File to Repository
      run: |
        CURRENT_VERSION="${{ needs.read-config.outputs.current_version }}"
        DEST_PATH="${{ env.BUILD_BASE_PATH }}"
        CONFIG_FILE="${DEST_PATH}/config_${CURRENT_VERSION}.ini"
        REPO_OUTPUT_DIR="output_paths"
        REPO_CONFIG_FILE="${REPO_OUTPUT_DIR}/config_${CURRENT_VERSION}.ini"

        echo "📤 Uploading Config File to Repository"
        echo "=================================================="
        echo "📋 Current Version         : $CURRENT_VERSION"
        echo "📄 Source Config File      : $CONFIG_FILE"
        echo "📁 Repository Output Dir   : $REPO_OUTPUT_DIR"
        echo "📄 Repository Config File  : $REPO_CONFIG_FILE"
        echo "=================================================="

        # Check if config file exists
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ Error: Config file not found: $CONFIG_FILE"
          exit 1
        fi

        echo "✅ Config file found: $CONFIG_FILE"

        # Create output_paths directory if needed
        if [ ! -d "$REPO_OUTPUT_DIR" ]; then
          echo "📁 Creating output_paths directory..."
          mkdir -p "$REPO_OUTPUT_DIR"
          echo "✅ Directory created: $REPO_OUTPUT_DIR"
        else
          echo "✅ Directory exists: $REPO_OUTPUT_DIR"
        fi

        # Copy config to repository
        echo ""
        echo "📋 Copying config file to repository..."
        cp "$CONFIG_FILE" "$REPO_CONFIG_FILE"

        if [ $? -eq 0 ]; then
          echo "✅ Config file copied to repository"
          REPO_SIZE=$(stat -c%s "$REPO_CONFIG_FILE" 2>/dev/null || echo "unknown")
          SOURCE_SIZE=$(stat -c%s "$CONFIG_FILE" 2>/dev/null || echo "unknown")
          if [ "$SOURCE_SIZE" = "$REPO_SIZE" ]; then
            echo "✅ File integrity verified (sizes match: $SOURCE_SIZE bytes)"
          else
            echo "⚠️  Warning: File sizes don't match (Source: $SOURCE_SIZE, Repo: $REPO_SIZE)"
          fi
        else
          echo "❌ Failed to copy config file to repository"
          exit 1
        fi

        # Configure git and commit
        echo ""
        echo "🔧 Configuring git..."
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        echo ""
        echo "📋 Adding and committing config file..."
        git add "$REPO_CONFIG_FILE"

        if git diff --staged --quiet; then
          echo "ℹ️  No changes to commit (file already exists with same content)"
        else
          echo "📝 Committing changes..."
          git commit -m "Add prepared GNR Debug UP config: config_${CURRENT_VERSION}.ini

- Baseline Version: ${{ needs.read-config.outputs.baseline_version }}
- Current Version: 0x${CURRENT_VERSION}
- version = 0x${CURRENT_VERSION}
- prev_version = 0x${CURRENT_VERSION}
- Automated by GitHub Actions workflow
- Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          echo "✅ Config file committed"

          echo ""
          echo "📤 Pushing changes to repository..."
          git push

          if [ $? -eq 0 ]; then
            echo "✅ Changes pushed to repository"
          else
            echo "❌ Failed to push changes to repository"
            exit 1
          fi
        fi

        echo ""
        echo "✅ Config file upload operation completed successfully!"

  validate-config:
    runs-on: [self-hosted, node16]
    permissions: {}
    needs: [read-config, copy-config, prepare-config, upload-config]
    outputs:
      config_validated: ${{ steps.validate.outputs.config_validated }}
      config_path: ${{ steps.validate.outputs.config_path }}

    steps:
      - name: Validate prepared config file exists
        id: validate
        env:
          BUILD_PASSWORD: ${{ secrets.GNR_BUILD_PASSWORD }}
        run: |
          echo "=== VALIDATING PREPARED CONFIG FILE FOR GNR DEBUG UP BUILD ==="
          CURRENT_VERSION="${{ needs.read-config.outputs.current_version }}"
          CONFIG_FILE="config_${CURRENT_VERSION}.ini"
          CONFIG_PATH="${{ env.BUILD_BASE_PATH }}/$CONFIG_FILE"

          echo "🔍 Checking prepared config file: $CONFIG_FILE"
          echo "📍 Full path: $CONFIG_PATH"

          CONFIG_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build bash -c "
            if [[ -f '$CONFIG_PATH' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")

          if [[ "$CONFIG_CHECK" == "EXISTS" ]]; then
            echo "✅ Prepared config file found: $CONFIG_PATH"
            echo "config_validated=true" >> $GITHUB_OUTPUT
            echo "config_path=$CONFIG_PATH" >> $GITHUB_OUTPUT
          else
            echo "❌ ERROR: Prepared config file not found: $CONFIG_PATH"
            echo "config_validated=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Display prepared config file contents
        env:
          BUILD_PASSWORD: ${{ secrets.GNR_BUILD_PASSWORD }}
        run: |
          echo "=== PREPARED CONFIG FILE CONTENTS ==="
          CONFIG_PATH="${{ steps.validate.outputs.config_path }}"

          CONFIG_CONTENTS=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build bash -c "
            cat '$CONFIG_PATH'
          ")

          echo "$CONFIG_CONTENTS"
          echo "=== END PREPARED CONFIG FILE CONTENTS ==="

  kerberos-setup:
    runs-on: [self-hosted, node16]
    permissions: {}
    needs: [read-config, validate-config]
    if: ${{ needs.validate-config.outputs.config_validated == 'true' }}

    steps:
      - name: Switch to build account for Kerberos setup
        env:
          BUILD_PASSWORD: ${{ secrets.GNR_BUILD_PASSWORD }}
        run: |
          echo "Switching to build account for Kerberos setup..."
          CURRENT_USER=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build whoami)
          echo "Expected user: grp_gnr_fit1_build"
          echo "Actual user: $CURRENT_USER"

          if [ "$CURRENT_USER" = "grp_gnr_fit1_build" ]; then
            echo "SUCCESS: User switch to build account successful"
          else
            echo "FAILURE: User switch failed"
            exit 1
          fi

      - name: Initialize Kerberos Ticket (ktab)
        env:
          BUILD_PASSWORD: ${{ secrets.GNR_BUILD_PASSWORD }}
          FA_PASSWORD: ${{ secrets.GNR_FA_PASSWORD }}
        run: |
          echo "Initializing Kerberos Ticket with ktab for automated build..."

          KTAB_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build bash -c "
            echo '$FA_PASSWORD' | ${{ env.KTAB_PATH }} -i 2>&1
          ")

          echo "ktab output: $KTAB_RESULT"

          if echo "$KTAB_RESULT" | grep -q -i "error\|failed\|denied"; then
            echo "ERROR: ktab initialization failed"
            exit 1
          else
            echo "SUCCESS: ktab initialization completed"
          fi

      - name: Initialize Kerberos Cron (kcron)
        env:
          BUILD_PASSWORD: ${{ secrets.GNR_BUILD_PASSWORD }}
        run: |
          echo "Initializing Kerberos Cron with kcron for automated build..."

          KCRON_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build bash -c "
            echo 'y' | ${{ env.KCRON_PATH }} -i 2>&1
          ")

          echo "kcron output: $KCRON_RESULT"

          if echo "$KCRON_RESULT" | grep -q -i "error\|failed\|denied"; then
            echo "ERROR: kcron initialization failed"
            exit 1
          else
            echo "SUCCESS: kcron initialization completed"
          fi

  patch-build:
    runs-on: [self-hosted, node16]
    permissions: {}
    needs: [read-config, validate-config, kerberos-setup]
    if: ${{ needs.validate-config.outputs.config_validated == 'true' }}

    steps:
      - name: Switch to faceless account for build
        env:
          BUILD_PASSWORD: ${{ secrets.GNR_BUILD_PASSWORD }}
        run: |
          echo "Switching to faceless account for GNR Debug UP automated build..."
          CURRENT_USER=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build whoami)
          echo "Expected user: grp_gnr_fit1_build"
          echo "Actual user: $CURRENT_USER"

          if [ "$CURRENT_USER" = "grp_gnr_fit1_build" ]; then
            echo "SUCCESS: User switch successful"
          else
            echo "FAILURE: User switch failed"
            exit 1
          fi

      - name: Verify build tools exist
        env:
          BUILD_PASSWORD: ${{ secrets.GNR_BUILD_PASSWORD }}
        run: |
          echo "Verifying build tools for GNR Debug UP automated build..."

          # Check Python
          PYTHON_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build bash -c "
            if [[ -f '${{ env.PYTHON_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")

          if [[ "$PYTHON_CHECK" == "EXISTS" ]]; then
            echo "✅ Python found: ${{ env.PYTHON_PATH }}"
          else
            echo "❌ Python not found: ${{ env.PYTHON_PATH }}"
            exit 1
          fi

          # Check FXT Muppet tool
          FXT_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build bash -c "
            if [[ -f '${{ env.FXT_TOOL_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")

          if [[ "$FXT_CHECK" == "EXISTS" ]]; then
            echo "✅ FXT Muppet tool found: ${{ env.FXT_TOOL_PATH }}"
          else
            echo "❌ FXT Muppet tool not found: ${{ env.FXT_TOOL_PATH }}"
            exit 1
          fi

          # Check expect
          EXPECT_CHECK=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build bash -c "
            if [[ -f '${{ env.EXPECT_PATH }}' ]]; then
              echo 'EXISTS'
            else
              echo 'NOT_FOUND'
            fi
          ")

          if [[ "$EXPECT_CHECK" == "EXISTS" ]]; then
            echo "✅ expect found: ${{ env.EXPECT_PATH }}"
          else
            echo "❌ expect not found: ${{ env.EXPECT_PATH }}"
            exit 1
          fi

          echo "All build tools verified successfully"

      - name: Execute GNR Debug UP automated build
        env:
          BUILD_PASSWORD: ${{ secrets.GNR_BUILD_PASSWORD }}
          CSS_PASSWORD: ${{ secrets.GNR_CSS_PASSWORD }}
        run: |
          echo "Starting GNR Debug UP automated build..."

          CURRENT_VERSION="${{ needs.read-config.outputs.current_version }}"
          CONFIG_FILE="config_${CURRENT_VERSION}.ini"

          echo "Automated Build Configuration:"
          echo "  - Working Directory : ${{ env.BUILD_BASE_PATH }}"
          echo "  - Config File       : $CONFIG_FILE"
          echo "  - Build Description : ${{ github.event.inputs.build_description }}"
          echo "  - Baseline Version  : ${{ needs.read-config.outputs.baseline_version }}"
          echo "  - Current Version   : 0x${CURRENT_VERSION}"
          echo "  - Python Path       : ${{ env.PYTHON_PATH }}"
          echo "  - FXT Muppet Tool   : ${{ env.FXT_TOOL_PATH }}"
          echo "  - PRQ Bit           : 1 (--set_prq)"
          echo ""

          BUILD_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build bash -c "
            cd '${{ env.BUILD_BASE_PATH }}'
            echo 'Current directory: \$(pwd)'

            # Create expect script for CSS password
            cat > automated_build_expect.exp << 'EOF'
          #!${{ env.EXPECT_PATH }} -f
          set timeout 1800

          set css_password \$env(CSS_PASSWORD)

          spawn ${{ env.PYTHON_PATH }} ${{ env.FXT_TOOL_PATH }} --conf $CONFIG_FILE --set_prq

          expect {
            \"Enter your CSS password:\" {
              send \"\$css_password\r\"
              exp_continue
            }
            \"Enter your CSS password: \" {
              send \"\$css_password\r\"
              exp_continue
            }
            -re \".*assword.*\" {
              send \"\$css_password\r\"
              exp_continue
            }
            eof {
              catch wait result
              exit [lindex \$result 3]
            }
            timeout {
              puts \"Automated build timed out after 30 minutes\"
              exit 124
            }
          }
          EOF

            chmod +x automated_build_expect.exp
            echo 'Starting GNR Debug UP automated build with expect script...'

            export CSS_PASSWORD='$CSS_PASSWORD'
            ./automated_build_expect.exp 2>&1
            BUILD_EXIT=\$?

            rm -f automated_build_expect.exp

            echo \"Automated build completed with exit code: \$BUILD_EXIT\"
            exit \$BUILD_EXIT
          ")

          BUILD_EXIT_CODE=$?

          echo "Automated build output:"
          echo "$BUILD_RESULT"
          echo ""
          echo "Automated build exit code: $BUILD_EXIT_CODE"

          if [[ $BUILD_EXIT_CODE -eq 0 ]]; then
            echo "✅ SUCCESS: GNR Debug UP automated build completed successfully"
          elif [[ $BUILD_EXIT_CODE -eq 124 ]]; then
            echo "⏰ TIMEOUT: Automated build timed out after 30 minutes"
            exit $BUILD_EXIT_CODE
          else
            echo "❌ FAILURE: Automated build failed with exit code: $BUILD_EXIT_CODE"
            exit $BUILD_EXIT_CODE
          fi

      - name: Verify automated build results
        env:
          BUILD_PASSWORD: ${{ secrets.GNR_BUILD_PASSWORD }}
        run: |
          echo "Verifying GNR Debug UP automated build results..."

          CURRENT_VERSION="${{ needs.read-config.outputs.current_version }}"

          VERIFICATION_RESULT=$((echo "$BUILD_PASSWORD"; sleep 1) | sudo -S -u grp_gnr_fit1_build bash -c "
            cd '${{ env.BUILD_BASE_PATH }}'
            echo 'Checking for automated build artifacts...'

            echo 'Recent files (last 30 minutes):'
            find . -type f -mmin -30 2>/dev/null | head -20 || echo 'No recent files found'
            echo ''

            echo 'Looking for patch/binary files:'
            find . -name '*.patch' -o -name '*.bin' -o -name '*.ucode' 2>/dev/null | head -10 || echo 'No patch files found'
            echo ''

            echo 'Looking for debug artifacts:'
            find . -name '*debug*' -o -name '*css-debug*' 2>/dev/null | head -10 || echo 'No debug files found'
            echo ''

            echo 'Looking for version-specific files:'
            find . -name '*${CURRENT_VERSION}*' 2>/dev/null | head -10 || echo 'No version-specific files found'
            echo ''

            echo 'Directory listing:'
            ls -la | head -20
          ")

          echo "$VERIFICATION_RESULT"

      - name: Display automated build summary
        run: |
          CURRENT_VERSION="${{ needs.read-config.outputs.current_version }}"
          BASELINE_VERSION="${{ needs.read-config.outputs.baseline_version }}"

          {
            echo ""
            echo "## 🚀 GNR Engineering Debug UP Automated Build Summary"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Build Type       | GNR Engineering Debug UP (Not for Production) |"
            echo "| Baseline Version | \`$BASELINE_VERSION\` |"
            echo "| Current Version  | \`0x${CURRENT_VERSION}\` |"
            echo "| Config File      | \`config_${CURRENT_VERSION}.ini\` |"
            echo "| version field    | \`0x${CURRENT_VERSION}\` |"
            echo "| prev_version     | \`0x${CURRENT_VERSION}\` |"
            echo "| PRQ Bit          | 1 (--set_prq) |"
            echo "| Build Description | ${{ github.event.inputs.build_description }} |"
            echo "| Build Directory  | \`${{ env.BUILD_BASE_PATH }}\` |"
            echo "| Account          | grp_gnr_fit1_build (faceless account) |"
            echo ""
            echo "### 🔄 Complete Pipeline Process:"
            echo "1. ✅ **Config Read**: Read baseline config and displayed all *code paths"
            echo "2. ✅ **Config Copy**: Copied baseline config and renamed to current version"
            echo "3. ✅ **Config Prepare**: Updated version, prev_version, and sign types"
            echo "4. ✅ **Repository Upload**: Uploaded prepared config to GitHub"
            echo "5. ✅ **Config Validation**: Verified prepared config file exists and is readable"
            echo "6. ✅ **Kerberos Setup**: Initialized ktab and kcron for authentication"
            echo "7. ✅ **Tool Verification**: Confirmed all build tools are available"
            echo "8. ✅ **Build Execution**: Executed fxtMuppet.py with --set_prq flag"
            echo "9. ✅ **Result Verification**: Checked for build artifacts"
            echo ""
            echo "### 🎯 GNR Debug Features:"
            echo "- **INI-Driven**: Reads *code paths directly from baseline .ini config"
            echo "- **Version Management**: Sets both version and prev_version to 0x<current_version>"
            echo "- **PRQ Bit=1**: Build uses --set_prq flag"
            echo "- **Debug Signed**: soc_sign and fit1_sign set to css-debug"
            echo "- **Security**: Uses GNR-specific GitHub Secrets"
            echo ""
            echo "### 📊 Source Config:"
            echo "- **Baseline**: \`${{ env.GNR_BUILD_BASE }}/${BASELINE_VERSION}/release/config_${BASELINE_VERSION}.ini\`"
            echo "- **Generated**: \`config_${CURRENT_VERSION}.ini\`"
            echo "- **GitHub Repository**: [View Config](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/output_paths/config_${CURRENT_VERSION}.ini)"
            echo ""
            echo "🎉 **GNR Engineering Debug UP automated build pipeline completed successfully!**"

          } >> $GITHUB_STEP_SUMMARY
