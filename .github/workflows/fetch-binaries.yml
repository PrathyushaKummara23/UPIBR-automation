name: Fetch Binary Files from Entry Criteria
on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  fetch-binaries:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install jq for JSON parsing
      run: |
        sudo apt-get update
        sudo apt-get install -y jq
    - name: Create output directory
      run: |
        echo "=== CREATING OUTPUT DIRECTORY ==="
        echo "Current working directory: $(pwd)"
        mkdir -p output_paths
        echo "Created output directory at: $(realpath output_paths)"
        echo "=== END DIRECTORY CREATION ==="
    - name: Check for existing JSON file or create sample
      run: |
        JSON_FILE=".github/entry_criteria_output.json"
        echo "=== JSON FILE HANDLING ==="
        if [ ! -f "$JSON_FILE" ]; then
          echo "Creating sample entry_criteria_output.json file..."
          mkdir -p .github
          cat > "$JSON_FILE" << 'EOF'
        {
          "ucode": [
            {
              "sr_no": 1,
              "check_list_item": "ucode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/uCode/main/m_01_a06f3_e200102b"
            }
          ],
          "xucode": [
            {
              "sr_no": 1,
              "check_list_item": "xucode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_XuCode/main/xucode-cmt-c0--0.22.00.235/patch.xusection.inc"
            }
          ],
          "mcheck": [
            {
              "sr_no": 1,
              "check_list_item": "mcheck Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/Mcheck/main/26ww04/MCHECK_SECTION.inc"
            }
          ],
          "tcode": [
            {
              "sr_no": 1,
              "check_list_item": "tcode Post Binary Staging Area",
              "selection": "No",
              "entry": ""
            }
          ],
          "acode": [
            {
              "sr_no": 1,
              "check_list_item": "acode Post Binary Staging Area",
              "selection": "No",
              "entry": ""
            }
          ],
          "icode": [
            {
              "sr_no": 1,
              "check_list_item": "icode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_iCode/main/0x24164200/icode_enc_dbug.bin"
            }
          ],
          "oobmsm": [
            {
              "sr_no": 1,
              "check_list_item": "oobmsm Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/OOBMSM/main/26ww7.3a/OCODE_SRF_C0_2.8.1.39_patchlet_enc_dbug.bin"
            }
          ],
          "pcode": [
            {
              "sr_no": 1,
              "check_list_item": "pcode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/Pcode/main/26ww08_UPLR4/gnr_atom_b0/pcode-c_enc_dbug.bin"
            }
          ],
          "s3m": [
            {
              "sr_no": 1,
              "check_list_item": "s3m Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/S3M/main/26ww08/26ww08.4_T6104_s3m_fw_SESVN0_SVN1_REVID2.0.0.00171_C0/S3M_1_0_2.0.0.00171_enc_dbug.IP_0100.bin"
            }
          ]
        }
        EOF
        fi
        echo "Using JSON file: $(realpath "$JSON_FILE")"
        echo "=== END JSON FILE HANDLING ==="
    - name: Extract paths from JSON and create configuration file
      run: |
        JSON_FILE=".github/entry_criteria_output.json"
        echo "=== EXTRACTING PATHS FROM JSON ==="
        echo "Processing JSON file: $(realpath "$JSON_FILE")"
        config_file="output_paths/all_paths_config.txt"
        echo "Creating configuration file: $(realpath "$config_file")"
        
        # Remove existing file if it exists to prevent appending
        rm -f "$config_file"
        
        # Extract all paths and create the file in one go
        UCODE_PATH=$(jq -r '.ucode[0].entry // ""' "$JSON_FILE")
        XUCODE_PATH=$(jq -r '.xucode[0].entry // ""' "$JSON_FILE")
        MCHECK_PATH=$(jq -r '.mcheck[0].entry // ""' "$JSON_FILE")
        TCODE_PATH=$(jq -r '.tcode[0].entry // ""' "$JSON_FILE")
        ACODE_PATH=$(jq -r '.acode[0].entry // ""' "$JSON_FILE")
        ICODE_PATH=$(jq -r '.icode[0].entry // ""' "$JSON_FILE")
        OOBMSM_PATH=$(jq -r '.oobmsm[0].entry // ""' "$JSON_FILE")
        PCODE_PATH=$(jq -r '.pcode[0].entry // ""' "$JSON_FILE")
        S3M_PATH=$(jq -r '.s3m[0].entry // ""' "$JSON_FILE")
        
        # Create the configuration file with all paths at once
        cat > "$config_file" << EOF
        ucode=$UCODE_PATH
        xucode=$XUCODE_PATH
        mcheck=$MCHECK_PATH
        tcode=$TCODE_PATH
        acode=$ACODE_PATH
        icode=$ICODE_PATH
        oobmsm=$OOBMSM_PATH
        pcode=$PCODE_PATH
        s3m=$S3M_PATH
        EOF
        
        echo "Configuration file created successfully at: $(realpath "$config_file")"
        echo "=== END PATH EXTRACTION ==="
    - name: Display created configuration file
      run: |
        config_file="output_paths/all_paths_config.txt"
        echo "=== CONFIGURATION FILE CONTENTS ==="
        echo "File location: $(realpath "$config_file")"
        echo "File contents:"
        cat "$config_file"
        echo ""
        echo "File size: $(stat -c%s "$config_file") bytes"
        echo "Line count: $(wc -l < "$config_file")"
        echo "=== END FILE DISPLAY ==="
    - name: Upload configuration file as artifact
      uses: actions/upload-artifact@v5
      with:
        name: paths-config-${{ github.run_number }}
        path: output_paths/all_paths_config.txt
        retention-days: 30
    - name: Commit configuration file to repository
      run: |
        echo "=== COMMITTING FILE TO REPOSITORY ==="
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output_paths/all_paths_config.txt
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Add paths configuration from entry criteria - Run ${{ github.run_number }}"
          git push
          echo "Configuration file committed and pushed to repository"
        else
          echo "No changes to commit"
        fi
        echo "=== END COMMIT ==="
    - name: Display final status
      run: |
        echo "=== FINAL WORKFLOW STATUS ==="
        echo "Current working directory: $(pwd)"
        echo "Output directory: $(realpath output_paths)"
        echo ""
        echo "Path extraction: Completed"
        echo "Configuration file: Created"
        echo ""
        echo "Created file:"
        echo "  - all_paths_config.txt: $(realpath output_paths/all_paths_config.txt)"
        echo ""
        echo "Final file contents:"
        cat output_paths/all_paths_config.txt
        echo ""
        echo "Artifact uploaded: paths-config-${{ github.run_number }}"
        echo "File committed to repository: Yes"
        echo "=== END FINAL STATUS ==="
