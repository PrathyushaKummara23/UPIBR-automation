name: Fetch Binary Files from Entry Criteria

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-binaries:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: Basic system check
      run: |
        echo "=== BASIC SYSTEM CHECK ==="
        echo "Current user: $(whoami)"
        echo "Current directory: $(pwd)"
        echo "Available disk space:"
        df -h
        echo "=== END BASIC CHECK ==="
      
    - name: Complete repository analysis
      run: |
        echo "=== COMPLETE REPOSITORY ANALYSIS ==="
        echo "Repository root contents:"
        ls -la
        echo ""
        echo "All directories in repository:"
        find . -type d -name ".*" -o -type d ! -name ".*" | head -20
        echo ""
        echo "All files in repository (first 50):"
        find . -type f | head -50
        echo ""
        echo "Specifically looking for .github:"
        ls -la .github 2>/dev/null || echo ".github directory does not exist"
        echo ""
        echo "Looking for any JSON files anywhere:"
        find . -name "*.json" -type f 2>/dev/null || echo "No JSON files found"
        echo ""
        echo "Git status:"
        git status 2>/dev/null || echo "Not a git repository or git not available"
        echo "=== END ANALYSIS ==="

    - name: Install basic tools
      run: |
        echo "Installing jq..."
        sudo apt-get update -qq
        sudo apt-get install -y jq
        echo "jq version: $(jq --version)"

    - name: Create directories and sample files
      run: |
        echo "Creating required directories..."
        mkdir -p fetched_binaries
        mkdir -p .github
        
        echo "Creating sample JSON file..."
        cat > .github/entry_criteria_output.json << 'EOF'
        {
          "ucode": {
            "entry": "/sample/path/ucode"
          },
          "xucode": {
            "entry": "/sample/path/xucode"
          },
          "mcheck": {
            "entry": "/sample/path/mcheck"
          },
          "tcode": {
            "entry": ""
          },
          "acode": {
            "entry": ""
          },
          "icode": {
            "entry": "/sample/path/icode"
          },
          "oobmsm": {
            "entry": "/sample/path/oobmsm"
          },
          "pcode": {
            "entry": "/sample/path/pcode"
          },
          "s3m": {
            "entry": "/sample/path/s3m"
          }
        }
        EOF
        
        echo "Verifying created files:"
        ls -la .github/
        echo "JSON content:"
        cat .github/entry_criteria_output.json

    - name: Test JSON parsing
      run: |
        echo "Testing JSON parsing..."
        JSON_FILE=".github/entry_criteria_output.json"
        
        echo "File exists check:"
        if [ -f "$JSON_FILE" ]; then
          echo "✓ File exists"
        else
          echo "✗ File does not exist"
          exit 1
        fi
        
        echo "JSON syntax check:"
        if jq empty "$JSON_FILE"; then
          echo "✓ JSON is valid"
        else
          echo "✗ JSON is invalid"
          exit 1
        fi
        
        echo "Extracting sample values:"
        UCODE_PATH=$(jq -r '.ucode.entry // ""' "$JSON_FILE")
        echo "UCODE_PATH: '$UCODE_PATH'"
        
        if [ "$UCODE_PATH" = "/sample/path/ucode" ]; then
          echo "✓ JSON parsing works correctly"
        else
          echo "✗ JSON parsing failed"
          exit 1
        fi

    - name: Create configuration file
      run: |
        echo "Creating paths configuration..."
        JSON_FILE=".github/entry_criteria_output.json"
        
        # Extract all paths
        UCODE_PATH=$(jq -r '.ucode.entry // ""' "$JSON_FILE")
        XUCODE_PATH=$(jq -r '.xucode.entry // ""' "$JSON_FILE")
        MCHECK_PATH=$(jq -r '.mcheck.entry // ""' "$JSON_FILE")
        TCODE_PATH=$(jq -r '.tcode.entry // ""' "$JSON_FILE")
        ACODE_PATH=$(jq -r '.acode.entry // ""' "$JSON_FILE")
        ICODE_PATH=$(jq -r '.icode.entry // ""' "$JSON_FILE")
        OOBMSM_PATH=$(jq -r '.oobmsm.entry // ""' "$JSON_FILE")
        PCODE_PATH=$(jq -r '.pcode.entry // ""' "$JSON_FILE")
        S3M_PATH=$(jq -r '.s3m.entry // ""' "$JSON_FILE")
        
        # Create config file
        cat > fetched_binaries/paths_config.txt << EOF
        ucode=$UCODE_PATH
        xucode=$XUCODE_PATH
        mcheck=$MCHECK_PATH
        tcode=$TCODE_PATH
        acode=$ACODE_PATH
        icode=$ICODE_PATH
        oobmsm=$OOBMSM_PATH
        pcode=$PCODE_PATH
        s3m=$S3M_PATH
        EOF
        
        echo "Configuration file created:"
        cat fetched_binaries/paths_config.txt

    - name: Simulate binary collection
      run: |
        echo "Simulating binary collection process..."
        
        # Create some dummy files to simulate the process
        echo "Creating sample binary files for testing..."
        echo "dummy ucode binary" > fetched_binaries/ucode_sample.bin
        echo "dummy icode binary" > fetched_binaries/icode_sample.bin
        echo "Path not accessible: /sample/path/xucode" > fetched_binaries/xucode_path_not_accessible.txt
        echo "No path specified" > fetched_binaries/tcode_no_path.txt
        
        echo "Sample files created:"
        ls -la fetched_binaries/

    - name: Create summary report
      run: |
        echo "Creating summary report..."
        cat > fetched_binaries/collection_summary.md << EOF
        # Binary Collection Summary (Test Run)
        
        **Collection Details:**
        - Date: $(date)
        - Workflow Run: #${{ github.run_number }}
        - Repository: ${{ github.repository }}
        - Branch: ${{ github.ref_name }}
        - Status: Test run completed successfully
        
        ## Test Results
        - JSON file parsing: ✓ Success
        - Configuration file creation: ✓ Success  
        - Directory creation: ✓ Success
        - Sample file creation: ✓ Success
        
        ## Files Created
        EOF
        
        find fetched_binaries/ -type f | while read file; do
          echo "- $(basename "$file")" >> fetched_binaries/collection_summary.md
        done
        
        echo "Summary report:"
        cat fetched_binaries/collection_summary.md

    - name: Upload test artifacts
      uses: actions/upload-artifact@v5
      with:
        name: test-run-${{ github.run_number }}
        path: fetched_binaries/
        retention-days: 7

    - name: Final status
      run: |
        echo "=== WORKFLOW COMPLETED SUCCESSFULLY ==="
        echo "This was a test run to verify the workflow structure."
        echo "All basic functionality is working correctly."
        echo ""
        echo "Files created:"
        ls -la fetched_binaries/
        echo ""
        echo "Next steps:"
        echo "1. Verify your actual entry_criteria_output.json file exists"
        echo "2. Update the JSON file with real paths"
        echo "3. Consider using self-hosted runners for NFS access"
        echo "=== END ==="
