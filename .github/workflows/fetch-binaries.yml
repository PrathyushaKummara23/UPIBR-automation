name: Fetch Binary Files from Entry Criteria
on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  fetch-binaries:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install jq for JSON parsing
      run: |
        sudo apt-get update
        sudo apt-get install -y jq
    - name: Create output directory
      run: |
        echo "=== CREATING OUTPUT DIRECTORY ==="
        echo "Current working directory: $(pwd)"
        mkdir -p output_paths
        echo "Created output directory at: $(realpath output_paths)"
        echo "=== END DIRECTORY CREATION ==="
    - name: Check for existing JSON file or create sample
      run: |
        JSON_FILE=".github/entry_criteria_output.json"
        echo "=== JSON FILE HANDLING ==="
        if [ ! -f "$JSON_FILE" ]; then
          echo "Creating sample entry_criteria_output.json file..."
          mkdir -p .github
          cat > "$JSON_FILE" << 'EOF'
        {
          "ucode": [
            {
              "sr_no": 1,
              "check_list_item": "ucode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/uCode/main/m_01_a06f3_e200102b"
            }
          ],
          "xucode": [
            {
              "sr_no": 1,
              "check_list_item": "xucode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_XuCode/main/xucode-cmt-c0--0.22.00.235/patch.xusection.inc"
            }
          ],
          "mcheck": [
            {
              "sr_no": 1,
              "check_list_item": "mcheck Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/Mcheck/main/26ww04/MCHECK_SECTION.inc"
            }
          ],
          "tcode": [
            {
              "sr_no": 1,
              "check_list_item": "tcode Post Binary Staging Area",
              "selection": "No",
              "entry": ""
            }
          ],
          "acode": [
            {
              "sr_no": 1,
              "check_list_item": "acode Post Binary Staging Area",
              "selection": "No",
              "entry": ""
            }
          ],
          "icode": [
            {
              "sr_no": 1,
              "check_list_item": "icode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/build_area_0x83000392/C0_iCode/main/0x24164200/icode_enc_dbug.bin"
            }
          ],
          "oobmsm": [
            {
              "sr_no": 1,
              "check_list_item": "oobmsm Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/OOBMSM/main/26ww7.3a/OCODE_SRF_C0_2.8.1.39_patchlet_enc_dbug.bin"
            }
          ],
          "pcode": [
            {
              "sr_no": 1,
              "check_list_item": "pcode Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/Pcode/main/26ww08_UPLR4/gnr_atom_b0/pcode-c_enc_dbug.bin"
            }
          ],
          "s3m": [
            {
              "sr_no": 1,
              "check_list_item": "s3m Post Binary Staging Area",
              "selection": "Yes",
              "entry": "/nfs/site/disks/dcsg_0729/patches/SRF/C0/staging/S3M/main/26ww08/26ww08.4_T6104_s3m_fw_SESVN0_SVN1_REVID2.0.0.00171_C0/S3M_1_0_2.0.0.00171_enc_dbug.IP_0100.bin"
            }
          ]
        }
        EOF
        fi
        echo "Using JSON file: $(realpath "$JSON_FILE")"
        echo "=== END JSON FILE HANDLING ==="
    - name: Extract paths from JSON and create individual output files
      run: |
        JSON_FILE=".github/entry_criteria_output.json"
        echo "=== EXTRACTING PATHS FROM JSON ==="
        echo "Processing JSON file: $(realpath "$JSON_FILE")"
        components=("ucode" "xucode" "mcheck" "tcode" "acode" "icode" "oobmsm" "pcode" "s3m")
        for component in "${components[@]}"; do
          echo "Processing component: $component"
          path=$(jq -r ".${component}[0].entry // \"\"" "$JSON_FILE")
          output_file="output_paths/${component}_path.txt"
          if [ -n "$path" ] && [ "$path" != "" ] && [ "$path" != "null" ]; then
            echo "${component}=${path}" > "$output_file"
            echo "Created ${component} path file: $(realpath "$output_file")"
            echo "Content: ${component}=${path}"
          else
            echo "${component}=" > "$output_file"
            echo "Created ${component} path file (empty path): $(realpath "$output_file")"
            echo "Content: ${component}="
          fi
        done
        echo "=== END PATH EXTRACTION ==="
    - name: Create consolidated paths configuration file
      run: |
        JSON_FILE=".github/entry_criteria_output.json"
        echo "=== CREATING CONSOLIDATED CONFIGURATION ==="
        consolidated_file="output_paths/all_paths_config.txt"
        echo "Creating consolidated configuration file: $(realpath "$consolidated_file")"
        components=("ucode" "xucode" "mcheck" "tcode" "acode" "icode" "oobmsm" "pcode" "s3m")
        for component in "${components[@]}"; do
          path=$(jq -r ".${component}[0].entry // \"\"" "$JSON_FILE")
          if [ -n "$path" ] && [ "$path" != "" ] && [ "$path" != "null" ]; then
            echo "${component}=${path}" >> "$consolidated_file"
          else
            echo "${component}=" >> "$consolidated_file"
          fi
        done
        echo "Consolidated configuration file created at: $(realpath "$consolidated_file")"
        echo "Contents:"
        cat "$consolidated_file"
        echo "=== END CONSOLIDATED CONFIGURATION ==="
    - name: Display all created files
      run: |
        echo "=== ALL CREATED OUTPUT FILES ==="
        echo "Output directory: $(realpath output_paths)"
        echo "Files created:"
        ls -la output_paths/
        echo ""
        echo "Individual component files:"
        for file in output_paths/*_path.txt; do
          if [ -f "$file" ]; then
            echo "File: $(realpath "$file")"
            echo "Content: $(cat "$file")"
            echo ""
          fi
        done
        echo "Consolidated file:"
        echo "File: $(realpath output_paths/all_paths_config.txt)"
        echo "Content:"
        cat output_paths/all_paths_config.txt
        echo "=== END FILE DISPLAY ==="
    - name: Create summary report
      run: |
        JSON_FILE=".github/entry_criteria_output.json"
        echo "=== CREATING SUMMARY REPORT ==="
        summary_file="output_paths/extraction_summary.md"
        cat > "$summary_file" << EOF
        # Path Extraction Summary
        **Extraction Details:**
        - Date: $(date)
        - Workflow Run: #${{ github.run_number }}
        - Repository: ${{ github.repository }}
        - Branch: ${{ github.ref_name }}
        - Commit: ${{ github.sha }}
        - Source JSON: $(realpath "$JSON_FILE")
        - Output Directory: $(realpath output_paths)
        ## Extracted Paths
        | Component | Path | Status |
        |-----------|------|--------|
        EOF
        components=("ucode" "xucode" "mcheck" "tcode" "acode" "icode" "oobmsm" "pcode" "s3m")
        for component in "${components[@]}"; do
          path=$(jq -r ".${component}[0].entry // \"\"" "$JSON_FILE")
          if [ -n "$path" ] && [ "$path" != "" ] && [ "$path" != "null" ]; then
            status="Path extracted"
          else
            status="No path specified"
          fi
          echo "| $component | \`$path\` | $status |" >> "$summary_file"
        done
        cat >> "$summary_file" << EOF
        ## Output Files Created
        EOF
        find output_paths/ -name "*.txt" | sort | while read file; do
          echo "- \`$(basename "$file")\` - Full path: \`$(realpath "$file")\`" >> "$summary_file"
        done
        cat >> "$summary_file" << EOF
        ---
        *Generated by GitHub Actions workflow - Path extraction only*
        EOF
        echo "Summary report created at: $(realpath "$summary_file")"
        echo "Summary contents:"
        cat "$summary_file"
        echo "=== END SUMMARY REPORT ==="
    - name: Upload output files as artifacts
      uses: actions/upload-artifact@v5
      with:
        name: extracted-paths-${{ github.run_number }}
        path: output_paths/
        retention-days: 30
    - name: Commit output files to repository
      run: |
        echo "=== COMMITTING FILES TO REPOSITORY ==="
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output_paths/
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Add extracted paths from entry criteria - Run ${{ github.run_number }}"
          git push
          echo "Files committed and pushed to repository"
        else
          echo "No changes to commit"
        fi
        echo "=== END COMMIT ==="
    - name: Display final status
      run: |
        echo "=== FINAL WORKFLOW STATUS ==="
        echo "Current working directory: $(pwd)"
        echo "Output directory: $(realpath output_paths)"
        echo ""
        echo "Path extraction: Completed"
        echo "Individual files: Created"
        echo "Consolidated file: Created"
        echo "Summary report: Created"
        echo ""
        echo "Files created:"
        find output_paths/ -type f -exec echo "  - {}" \; -exec realpath {} \;
        echo ""
        echo "Artifacts uploaded: extracted-paths-${{ github.run_number }}"
        echo "Files committed to repository: Yes"
        echo "=== END FINAL STATUS ==="
