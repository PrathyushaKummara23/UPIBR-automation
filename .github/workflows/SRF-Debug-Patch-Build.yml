name: Read Configuration File from Output Paths
on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Select configuration file to read'
        required: true
        type: choice
        options:
          - 'List files first'
          - 'Milestone_UPLR0.txt'
          - 'Milestone_UPLR1.txt'
          - 'Milestone_UPLR2.txt'
          - 'Milestone_UPLR3.txt'
          - 'Milestone_UPLR4.txt'
          - 'Milestone_default.txt'
      custom_filename:
        description: 'Or enter custom filename (optional - overrides dropdown selection)'
        required: false
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  read-config-file:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: List available files in output_paths
      run: |
        echo "=== AVAILABLE FILES IN OUTPUT_PATHS ==="
        if [ -d "output_paths" ]; then
          echo "Files found in output_paths directory:"
          ls -la output_paths/
          echo ""
          echo "Text files (.txt) in output_paths:"
          find output_paths -name "*.txt" -type f | sort
          echo ""
          echo "Total .txt files: $(find output_paths -name "*.txt" -type f | wc -l)"
        else
          echo "output_paths directory does not exist"
          echo "Creating output_paths directory..."
          mkdir -p output_paths
          echo "Directory created. No files available yet."
        fi
        echo "=== END FILE LISTING ==="

    - name: Determine target file
      run: |
        echo "=== DETERMINING TARGET FILE ==="
        CUSTOM_FILE="${{ github.event.inputs.custom_filename }}"
        SELECTED_FILE="${{ github.event.inputs.config_file }}"
        
        if [ -n "$CUSTOM_FILE" ] && [ "$CUSTOM_FILE" != "" ]; then
          TARGET_FILE="$CUSTOM_FILE"
          echo "Using custom filename: $TARGET_FILE"
        elif [ "$SELECTED_FILE" != "List files first" ]; then
          TARGET_FILE="$SELECTED_FILE"
          echo "Using selected file: $TARGET_FILE"
        else
          echo "No specific file selected. Will list files only."
          TARGET_FILE=""
        fi
        
        echo "TARGET_FILE=$TARGET_FILE" >> $GITHUB_ENV
        echo "Final target file: $TARGET_FILE"
        echo "=== END FILE DETERMINATION ==="

    - name: Validate and read configuration file
      run: |
        echo "=== READING CONFIGURATION FILE ==="
        TARGET_FILE="${{ env.TARGET_FILE }}"
        
        if [ -z "$TARGET_FILE" ]; then
          echo "No file specified to read. Showing available files only."
          exit 0
        fi
        
        FILE_PATH="output_paths/$TARGET_FILE"
        echo "Target file path: $(pwd)/$FILE_PATH"
        
        # Check if file exists
        if [ ! -f "$FILE_PATH" ]; then
          echo "❌ ERROR: File '$TARGET_FILE' not found in output_paths directory"
          echo ""
          echo "Available files:"
          if [ -d "output_paths" ]; then
            ls -la output_paths/ || echo "No files in output_paths"
          else
            echo "output_paths directory does not exist"
          fi
          exit 1
        fi
        
        # File exists, read and display contents
        echo "✅ File found: $TARGET_FILE"
        echo "File size: $(stat -c%s "$FILE_PATH") bytes"
        echo "Last modified: $(stat -c%y "$FILE_PATH")"
        echo ""
        echo "=== FILE CONTENTS START ==="
        cat "$FILE_PATH"
        echo "=== FILE CONTENTS END ==="
        echo ""
        echo "Line count: $(wc -l < "$FILE_PATH")"
        echo "Word count: $(wc -w < "$FILE_PATH")"
        echo "Character count: $(wc -c < "$FILE_PATH")"
        echo "=== END FILE READING ==="

    - name: Parse configuration values
      run: |
        echo "=== PARSING CONFIGURATION VALUES ==="
        TARGET_FILE="${{ env.TARGET_FILE }}"
        
        if [ -z "$TARGET_FILE" ]; then
          echo "No file to parse."
          exit 0
        fi
        
        FILE_PATH="output_paths/$TARGET_FILE"
        
        if [ ! -f "$FILE_PATH" ]; then
          echo "File not found for parsing."
          exit 1
        fi
        
        echo "Parsing key-value pairs from: $TARGET_FILE"
        echo ""
        
        # Parse each line and extract key-value pairs
        while IFS='=' read -r key value; do
          if [ -n "$key" ] && [ -n "$value" ]; then
            # Remove leading/trailing whitespace
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            echo "📋 $key: $value"
            
            # Set as environment variable for potential use in subsequent steps
            # Replace spaces and special characters in key for env var name
            ENV_KEY=$(echo "$key" | tr ' ' '_' | tr '[:lower:]' '[:upper:]' | sed 's/[^A-Z0-9_]//g')
            echo "$ENV_KEY=$value" >> $GITHUB_ENV
          fi
        done < "$FILE_PATH"
        
        echo ""
        echo "Configuration values have been parsed and set as environment variables."
        echo "=== END PARSING ==="

    - name: Display summary
      run: |
        echo "=== WORKFLOW SUMMARY ==="
        echo "Selected file: ${{ env.TARGET_FILE }}"
        echo "Custom filename input: '${{ github.event.inputs.custom_filename }}'"
        echo "Dropdown selection: '${{ github.event.inputs.config_file }}'"
        echo ""
        
        if [ -n "${{ env.TARGET_FILE }}" ]; then
          FILE_PATH="output_paths/${{ env.TARGET_FILE }}"
          if [ -f "$FILE_PATH" ]; then
            echo "✅ File successfully read and parsed"
            echo "📁 File location: $(realpath "$FILE_PATH")"
            echo "📊 File statistics:"
            echo "   - Size: $(stat -c%s "$FILE_PATH") bytes"
            echo "   - Lines: $(wc -l < "$FILE_PATH")"
            echo "   - Last modified: $(stat -c%y "$FILE_PATH")"
          else
            echo "❌ File not found"
          fi
        else
          echo "ℹ️  No file was selected for reading"
        fi
        
        echo ""
        echo "Available files in output_paths:"
        if [ -d "output_paths" ]; then
          find output_paths -name "*.txt" -type f | sort | sed 's/^/   - /'
        else
          echo "   - No output_paths directory found"
        fi
        echo "=== END SUMMARY ==="

    - name: Create file selection helper (Optional)
      run: |
        echo "=== CREATING FILE SELECTION HELPER ==="
        
        # Create a helper script for future reference
        cat > list_config_files.sh << 'EOF'
        #!/bin/bash
        echo "Available configuration files in output_paths:"
        if [ -d "output_paths" ]; then
          find output_paths -name "*.txt" -type f | sort
        else
          echo "No output_paths directory found"
        fi
        EOF
        
        chmod +x list_config_files.sh
        echo "Helper script created: list_config_files.sh"
        
        # Run the helper to show current files
        echo ""
        ./list_config_files.sh
        echo "=== END HELPER CREATION ==="
